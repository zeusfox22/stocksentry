<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;
    const XLSX_LIB = window.XLSX;
    const XLSX = { read: XLSX_LIB.read, utils: XLSX_LIB.utils };

const STORAGE_KEY = “paytrack-v5”;

const DEMO_CUSTOMERS = [
{ id: 1, name: “ABC Trading Sdn Bhd”, creditTerm: 30, contact: “Ahmad”, phone: “012-3456789”, email: “ahmad@abc.com” },
{ id: 2, name: “XYZ Retail Bhd”, creditTerm: 60, contact: “Siti”, phone: “016-9876543”, email: “siti@xyz.com” },
{ id: 3, name: “Golden Supply Co”, creditTerm: 14, contact: “Tan Wei”, phone: “011-2233445”, email: “tan@golden.com” },
];
const DEMO_INVOICES = [
{ id: 1, customerId: 1, invoiceNo: “INV-2025-001”, amount: 12500, invoiceDate: “2026-01-15”, paidAmount: 0, status: “unpaid”, notes: “” },
{ id: 2, customerId: 1, invoiceNo: “INV-2025-002”, amount: 8750.5, invoiceDate: “2026-02-01”, paidAmount: 0, status: “unpaid”, notes: “” },
{ id: 3, customerId: 2, invoiceNo: “INV-2025-003”, amount: 23000, invoiceDate: “2026-01-20”, paidAmount: 23000, status: “paid”, notes: “Paid via TT” },
{ id: 4, customerId: 2, invoiceNo: “INV-2025-004”, amount: 15400, invoiceDate: “2026-02-10”, paidAmount: 5000, status: “partial”, notes: “” },
{ id: 5, customerId: 3, invoiceNo: “INV-2025-005”, amount: 4200, invoiceDate: “2026-02-20”, paidAmount: 0, status: “unpaid”, notes: “” },
];
const DEMO_PAYMENTS = [
{ id: 1, invoiceId: 3, customerId: 2, invoiceNo: “INV-2025-003”, customerName: “XYZ Retail Bhd”, amount: 23000, date: “2026-02-15”, note: “Full payment via TT” },
{ id: 2, invoiceId: 4, customerId: 2, invoiceNo: “INV-2025-004”, customerName: “XYZ Retail Bhd”, amount: 5000, date: “2026-02-20”, note: “Partial payment” },
];

// ── helpers ──────────────────────────────────────────────────────────────────
const COL_ALIASES = {
customerName: [“customer name”,“debtor name”,“company name”,“name”,“customer”,“debtor”,“acc name”,“account name”],
invoiceNo:    [“invoice no”,“inv no”,“doc no”,“document no”,“invoice number”,“ref no”,“bill no”],
invoiceDate:  [“invoice date”,“inv date”,“doc date”,“date”,“bill date”,“transaction date”],
amount:       [“amount”,“invoice amount”,“total amount”,“original amount”,“gross amount”,“total”,“amt”],
outstanding:  [“outstanding”,“balance”,“outstanding amount”,“balance due”,“o/s amount”,“outstanding bal”,“o/s”,“bal”],
paidAmount:   [“paid”,“paid amount”,“payment”,“amount paid”,“paid to date”],
creditTerm:   [“credit term”,“terms”,“payment term”,“credit days”,“days”],
};
function guessMapping(headers) {
const map = {};
const lc = headers.map(h => (h||””).toString().toLowerCase().trim());
Object.entries(COL_ALIASES).forEach(([field, aliases]) => {
const idx = lc.findIndex(h => aliases.includes(h));
if (idx !== -1) map[field] = headers[idx];
});
return map;
}
function parseExcelDate(val) {
if (!val) return null;
if (val instanceof Date) return val.toISOString().split(“T”)[0];
if (typeof val === “number”) { const d = new Date(Math.round((val-25569)*86400*1000)); return d.toISOString().split(“T”)[0]; }
if (typeof val === “string”) {
const dmy = val.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{4})$/);
if (dmy) return `${dmy[3]}-${dmy[2].padStart(2,"0")}-${dmy[1].padStart(2,"0")}`;
const ymd = val.match(/^(\d{4})[/-](\d{1,2})[/-](\d{1,2})$/);
if (ymd) return `${ymd[1]}-${ymd[2].padStart(2,"0")}-${ymd[3].padStart(2,"0")}`;
const d = new Date(val); if (!isNaN(d)) return d.toISOString().split(“T”)[0];
}
return null;
}
function getDueDate(invoiceDate, creditTerm) { const d = new Date(invoiceDate); d.setDate(d.getDate()+creditTerm); return d; }
function getDaysOverdue(due) { const t=new Date(); t.setHours(0,0,0,0); const d=new Date(due); d.setHours(0,0,0,0); return Math.floor((t-d)/86400000); }
function ageBucket(d) { if(d<=0)return”current”; if(d<=30)return”1-30”; if(d<=60)return”31-60”; if(d<=90)return”61-90”; return”90+”; }
function fmyr(n) { return “RM “+Number(n||0).toLocaleString(“en-MY”,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fshort(n) { const v=Number(n||0); if(v>=1000000)return”RM “+(v/1000000).toFixed(1)+“M”; if(v>=1000)return”RM “+(v/1000).toFixed(1)+“K”; return”RM “+v.toFixed(0); }
function fdate(d) { if(!d)return”-”; try { return new Date(d).toLocaleDateString(“en-MY”,{day:“2-digit”,month:“short”,year:“numeric”}); } catch(e) { return”-”; } }
function fdshort(d) { if(!d)return”-”; try { return new Date(d).toLocaleDateString(“en-MY”,{day:“2-digit”,month:“short”}); } catch(e) { return”-”; } }
function monthKey(ds) { if(!ds)return”?”; const d=new Date(ds); return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; }
function monthLabel(k) { if(!k||k===”?”)return”Unknown”; const [y,m]=k.split(”-”); return new Date(Number(y),Number(m)-1,1).toLocaleDateString(“en-MY”,{month:“long”,year:“numeric”}); }

const SCFG = {
current:    {label:“Current”,  bg:”#1a3a2a”,color:”#4ade80”,border:”#166534”},
“due-soon”: {label:“Due Soon”, bg:”#3a2a0a”,color:”#fbbf24”,border:”#92400e”},
overdue:    {label:“Overdue”,  bg:”#3a0a0a”,color:”#f87171”,border:”#991b1b”},
paid:       {label:“Paid”,     bg:”#0a1a2a”,color:”#60a5fa”,border:”#1e40af”},
partial:    {label:“Partial”,  bg:”#2a1a3a”,color:”#c084fc”,border:”#7e22ce”},
};
const ACLR = {current:”#4ade80”,“1-30”:”#a3e635”,“31-60”:”#fbbf24”,“61-90”:”#fb923c”,“90+”:”#f87171”};
const SCLR = {overdue:”#f87171”,“due-soon”:”#fbbf24”,current:”#4ade80”,partial:”#c084fc”,paid:”#60a5fa”};

function useIsMobile() {
const [m,setM] = useState(window.innerWidth<768);
useEffect(()=>{ const f=()=>setM(window.innerWidth<768); window.addEventListener(“resize”,f); return()=>window.removeEventListener(“resize”,f); },[]);
return m;
}

// ── component ─────────────────────────────────────────────────────────────────
function ZeusPayTrack() {
const mob = useIsMobile();

// data
const [customers, setCustomers] = useState([]);
const [invoices,  setInvoices]  = useState([]);
const [payments,  setPayments]  = useState([]);
const [waLog,     setWaLog]     = useState([]);
const [company,   setCompany]   = useState(“G Wira Trading (M) Sdn Bhd”);

// ui
const [tab,       setTab]       = useState(“dashboard”);
const [subTab,    setSubTab]    = useState(“alerts”);   // reminders: alerts | whatsapp  |  reports: monthly | history | walog
const [dismissed, setDismissed] = useState([]);
const [fStatus,   setFStatus]   = useState(“all”);
const [fSearch,   setFSearch]   = useState(””);
const [selInv,    setSelInv]    = useState(null);
const [payModal,  setPayModal]  = useState(null);
const [payAmt,    setPayAmt]    = useState(””);
const [payNote,   setPayNote]   = useState(””);
const [showInv,   setShowInv]   = useState(false);
const [showCust,  setShowCust]  = useState(false);
const [newInv,    setNewInv]    = useState({customerId:””,invoiceNo:””,amount:””,invoiceDate:new Date().toISOString().split(“T”)[0],paidAmount:“0”,notes:””});
const [newCust,   setNewCust]   = useState({name:””,creditTerm:30,contact:””,phone:””,email:””});
const [waCopied,  setWaCopied]  = useState({});
const [hSearch,   setHSearch]   = useState(””);
const [rMonth,    setRMonth]    = useState(””);

// import
const [iStage,    setIStage]    = useState(“idle”);
const [iRows,     setIRows]     = useState([]);
const [iHeaders,  setIHeaders]  = useState([]);
const [iMap,      setIMap]      = useState({});
const [iPrev,     setIPrev]     = useState([]);
const [iMode,     setIMode]     = useState(“merge”);
const [iStats,    setIStats]    = useState(null);
const [iFile,     setIFile]     = useState(””);
const [dragOver,  setDragOver]  = useState(false);
const fileRef = useRef();

// ── persist ──
useEffect(()=>{
try {
const s = localStorage.getItem(STORAGE_KEY);
if (s) {
const d = JSON.parse(s);
setCustomers(d.customers||DEMO_CUSTOMERS);
setInvoices(d.invoices||DEMO_INVOICES);
setPayments(d.payments||DEMO_PAYMENTS);
setWaLog(d.waLog||[]);
setCompany(d.company||“G Wira Trading (M) Sdn Bhd”);
} else {
setCustomers(DEMO_CUSTOMERS);
setInvoices(DEMO_INVOICES);
setPayments(DEMO_PAYMENTS);
}
} catch(e) {
setCustomers(DEMO_CUSTOMERS);
setInvoices(DEMO_INVOICES);
setPayments(DEMO_PAYMENTS);
}
},[]);

useEffect(()=>{
if (customers.length||invoices.length) {
localStorage.setItem(STORAGE_KEY, JSON.stringify({customers,invoices,payments,waLog,company}));
}
},[customers,invoices,payments,waLog,company]);

// ── enriched invoices ──
const enrich = useCallback((invs, custs) => invs.map(inv => {
const cust = custs.find(c => c.id===inv.customerId);
if (!cust) return {…inv, customer:null, dueDate:null, daysOverdue:0, outstanding:inv.amount-inv.paidAmount, displayStatus:inv.status||“unpaid”, aging:“current”};
const dueDate     = getDueDate(inv.invoiceDate, cust.creditTerm);
const daysOverdue = getDaysOverdue(dueDate);
const outstanding = inv.amount - inv.paidAmount;
const ds = inv.status===“paid” ? “paid” : daysOverdue>0 ? “overdue” : inv.status===“partial” ? “partial” : daysOverdue>-7 ? “due-soon” : “current”;
return {…inv, customer:cust, dueDate, daysOverdue, outstanding, displayStatus:ds, aging:ageBucket(daysOverdue)};
}),[]);

const enriched  = useMemo(()=>enrich(invoices,customers),[invoices,customers,enrich]);
const reminders = useMemo(()=>enriched.filter(i=>(i.displayStatus===“overdue”||i.displayStatus===“due-soon”)&&!dismissed.includes(i.id)).sort((a,b)=>b.daysOverdue-a.daysOverdue),[enriched,dismissed]);

const stats = useMemo(()=>{
const a = enriched.filter(i=>i.displayStatus!==“paid”);
return {
totalOut: a.reduce((s,i)=>s+i.outstanding,0),
overdue:  a.filter(i=>i.displayStatus===“overdue”).reduce((s,i)=>s+i.outstanding,0),
dueSoon:  a.filter(i=>i.displayStatus===“due-soon”).reduce((s,i)=>s+i.outstanding,0),
current:  a.filter(i=>i.displayStatus===“current”).reduce((s,i)=>s+i.outstanding,0),
overdueN: a.filter(i=>i.displayStatus===“overdue”).length,
dueSoonN: a.filter(i=>i.displayStatus===“due-soon”).length,
};
},[enriched]);

const aging = useMemo(()=>{
const b={current:0,“1-30”:0,“31-60”:0,“61-90”:0,“90+”:0};
enriched.filter(i=>i.displayStatus!==“paid”).forEach(i=>{b[i.aging]=(b[i.aging]||0)+i.outstanding;});
return b;
},[enriched]);

const filtered = useMemo(()=>enriched.filter(i=>{
if (fStatus!==“all”&&i.displayStatus!==fStatus) return false;
if (fSearch) { const q=fSearch.toLowerCase(); if(!i.invoiceNo.toLowerCase().includes(q)&&!i.customer?.name.toLowerCase().includes(q)) return false; }
return true;
}).sort((a,b)=>b.daysOverdue-a.daysOverdue),[enriched,fStatus,fSearch]);

// ── WA stats ──
const waStats = useMemo(()=>{
const s={};
waLog.forEach(l=>{
if(!s[l.customerId]) s[l.customerId]={count:0,lastDate:null};
s[l.customerId].count++;
if(!s[l.customerId].lastDate||l.date>s[l.customerId].lastDate) s[l.customerId].lastDate=l.date;
});
return s;
},[waLog]);

const daysSinceWa = (cid) => {
const last = waStats[cid]?.lastDate;
if (!last) return null;
return Math.floor((new Date()-new Date(last))/86400000);
};

// ── WA message ──
const genWaMsg = useCallback((cid)=>{
const cust = customers.find(c=>c.id===Number(cid));
if (!cust) return “”;
const invs = enriched.filter(i=>i.customerId===cust.id&&i.displayStatus!==“paid”);
if (!invs.length) return “”;
const total = invs.reduce((s,i)=>s+i.outstanding,0);
const hasOD = invs.some(i=>i.displayStatus===“overdue”);
const lines = invs.map(i=>`• ${i.invoiceNo} | Due: ${fdate(i.dueDate)} | ${fmyr(i.outstanding)}${i.daysOverdue>0?` *(${i.daysOverdue} days overdue)*`:""}`).join(”\n”);
const opener = hasOD ? “We would like to kindly remind you that the following invoice(s) are now overdue:” : “This is a friendly reminder that the following invoice(s) will be due soon:”;
return `Dear *${cust.name}*,\n\nWe hope this message finds you well.\n\n${opener}\n\n${lines}\n\n*Total Outstanding: ${fmyr(total)}*\n\nKindly arrange payment at your earliest convenience. If payment has already been made, please disregard this message.\n\nThank you for your continued support.\n\nBest regards,\n*${company}*`;
},[customers,enriched,company]);

const logWa = (cid) => {
const cust = customers.find(c=>c.id===Number(cid));
setWaLog(p=>[{id:Date.now(),customerId:Number(cid),customerName:cust?.name||””,date:new Date().toISOString().split(“T”)[0]},…p]);
};
const copyWa = (cid) => {
navigator.clipboard.writeText(genWaMsg(cid)).then(()=>{
logWa(cid);
setWaCopied(p=>({…p,[cid]:true}));
setTimeout(()=>setWaCopied(p=>({…p,[cid]:false})),2500);
});
};
const openWa = (cid) => {
const cust = customers.find(c=>c.id===Number(cid));
const phone = (cust?.phone||””).replace(/[^0-9]/g,””);
const intl  = phone.startsWith(“0”) ? “60”+phone.slice(1) : phone;
logWa(cid);
window.open(`https://wa.me/${intl}?text=${encodeURIComponent(genWaMsg(cid))}`,”_blank”);
};

// ── monthly report ──
const monthlyData = useMemo(()=>{
const m={};
payments.forEach(p=>{
const k=monthKey(p.date);
if(!m[k]) m[k]={key:k,label:monthLabel(k),collected:0,payCount:0};
m[k].collected+=p.amount; m[k].payCount++;
});
invoices.forEach(inv=>{
const k=monthKey(inv.invoiceDate);
if(!m[k]) m[k]={key:k,label:monthLabel(k),collected:0,payCount:0};
if(!m[k].invoiced) m[k].invoiced=0;
m[k].invoiced=(m[k].invoiced||0)+inv.amount;
});
return Object.values(m).sort((a,b)=>b.key.localeCompare(a.key));
},[payments,invoices]);

// ── CRUD ──
const addInvoice = () => {
if(!newInv.customerId||!newInv.invoiceNo||!newInv.amount) return;
const paid=parseFloat(newInv.paidAmount)||0, amt=parseFloat(newInv.amount)||0;
setInvoices(p=>[…p,{id:Date.now(),customerId:Number(newInv.customerId),invoiceNo:newInv.invoiceNo,amount:amt,invoiceDate:newInv.invoiceDate,paidAmount:paid,notes:newInv.notes,status:paid>=amt?“paid”:paid>0?“partial”:“unpaid”}]);
setNewInv({customerId:””,invoiceNo:””,amount:””,invoiceDate:new Date().toISOString().split(“T”)[0],paidAmount:“0”,notes:””});
setShowInv(false);
};
const addCustomer = () => {
if(!newCust.name) return;
setCustomers(p=>[…p,{…newCust,id:Date.now(),creditTerm:Number(newCust.creditTerm)}]);
setNewCust({name:””,creditTerm:30,contact:””,phone:””,email:””});
setShowCust(false);
};
const recordPayment = () => {
const a=parseFloat(payAmt); if(!a||!payModal) return;
const cust=customers.find(c=>c.id===payModal.customerId);
setPayments(p=>[{id:Date.now(),invoiceId:payModal.id,customerId:payModal.customerId,invoiceNo:payModal.invoiceNo,customerName:cust?.name||””,amount:a,date:new Date().toISOString().split(“T”)[0],note:payNote||“Payment recorded”},…p]);
setInvoices(p=>p.map(i=>{ if(i.id!==payModal.id)return i; const np=Math.min(i.paidAmount+a,i.amount); return{…i,paidAmount:np,status:np>=i.amount?“paid”:“partial”}; }));
setPayModal(null); setPayAmt(””); setPayNote(””);
};

// ── import ──
const handleFile = (file) => {
if(!file) return; setIFile(file.name);
const reader=new FileReader();
reader.onload=(e)=>{
try {
const wb=XLSX.read(new Uint8Array(e.target.result),{type:“array”,cellDates:true});
const ws=wb.Sheets[wb.SheetNames[0]];
const rows=XLSX.utils.sheet_to_json(ws,{defval:””,raw:false});
if(!rows.length){alert(“File appears empty.”);return;}
const headers=Object.keys(rows[0]);
setIHeaders(headers); setIRows(rows); setIMap(guessMapping(headers));
setIStage(“mapping”); setTab(“import”);
} catch(err){alert(“Could not read file: “+err.message);}
};
reader.readAsArrayBuffer(file);
};
const buildPreview = () => {
if(!iMap.invoiceNo||!iMap.customerName){alert(“Please map Invoice No and Customer Name.”);return;}
const rows=iRows.map(row=>{
const invNo=(row[iMap.invoiceNo]||””).toString().trim();
const custName=(row[iMap.customerName]||””).toString().trim();
if(!invNo||!custName) return null;
const amt=parseFloat((row[iMap.amount]||“0”).toString().replace(/[^0-9.-]/g,””))||0;
const rawOS=iMap.outstanding?parseFloat((row[iMap.outstanding]||“0”).toString().replace(/[^0-9.-]/g,””)):null;
const rawPd=iMap.paidAmount?parseFloat((row[iMap.paidAmount]||“0”).toString().replace(/[^0-9.-]/g,””)):null;
const outstanding=rawOS!==null?Math.max(0,rawOS):rawPd!==null?Math.max(0,amt-rawPd):amt;
const paidAmt=Math.max(0,amt-outstanding);
const invDate=iMap.invoiceDate?parseExcelDate(row[iMap.invoiceDate]):null;
const creditTerm=iMap.creditTerm?parseInt((row[iMap.creditTerm]||“30”).toString())||30:30;
const status=paidAmt>=amt?“paid”:paidAmt>0?“partial”:“unpaid”;
return{invNo,custName,amt,paidAmt,outstanding,invDate,creditTerm,status};
}).filter(Boolean);
setIPrev(rows); setIStage(“preview”);
};
const doImport = () => {
let nc=[…customers], ni=iMode===“replace”?[]:[…invoices];
let added=0,updated=0,custCreated=0;
iPrev.forEach(row=>{
let cust=nc.find(c=>c.name.toLowerCase()===row.custName.toLowerCase());
if(!cust){cust={id:Date.now()+Math.random(),name:row.custName,creditTerm:row.creditTerm||30,contact:””,phone:””,email:””};nc.push(cust);custCreated++;}
const ex=ni.find(i=>i.invoiceNo===row.invNo);
if(ex){Object.assign(ex,{amount:row.amt,paidAmount:row.paidAmt,status:row.status,invoiceDate:row.invDate||ex.invoiceDate});updated++;}
else{ni.push({id:Date.now()+Math.random(),customerId:cust.id,invoiceNo:row.invNo,amount:row.amt,invoiceDate:row.invDate||new Date().toISOString().split(“T”)[0],paidAmount:row.paidAmt,status:row.status,notes:“Imported”});added++;}
});
setCustomers(nc); setInvoices(ni);
setIStats({added,updated,custCreated,total:iPrev.length});
setIStage(“done”);
};
const resetImport = () => {setIStage(“idle”);setIRows([]);setIHeaders([]);setIMap({});setIPrev([]);setIStats(null);setIFile(””);if(fileRef.current)fileRef.current.value=””;};

// ── styles ──
const C = {bg:”#0d0f14”,card:”#111827”,bdr:”#1e2d4a”,txt:”#e2e8f0”,mut:”#64748b”,sub:”#94a3b8”,blue:”#60a5fa”,red:”#f87171”,grn:”#4ade80”,yel:”#fbbf24”,pur:”#c084fc”,wa:”#25d366”};
const INP = {background:C.card,border:`1px solid ${C.bdr}`,borderRadius:“10px”,padding:“12px 14px”,color:C.txt,fontSize:“15px”,width:“100%”,outline:“none”,boxSizing:“border-box”};
const LBL = {fontSize:“12px”,color:C.mut,marginBottom:“6px”,display:“block”,fontWeight:“600”,textTransform:“uppercase”,letterSpacing:“0.4px”};
const CARD = {background:C.card,border:`1px solid ${C.bdr}`,borderRadius:“14px”,overflow:“hidden”};
const MODAL_OUTER = {position:“fixed”,inset:0,background:“rgba(0,0,0,.82)”,display:“flex”,alignItems:“flex-end”,justifyContent:“center”,zIndex:1000,backdropFilter:“blur(6px)”};

                <div style={{fontSize:"12px",color:C.mut}}>Due {fdshort(inv.dueDate)} · Net {inv.customer?.creditTerm}{inv.displayStatus!=="paid"&&inv.daysOverdue>0&&<span style={{color:C.red,marginLeft:"6px",fontWeight:"600"}}>▲{inv.daysOverdue}d late</span>}{inv.displayStatus!=="paid"&&inv.daysOverdue<=0&&inv.daysOverdue>-7&&<span style={{color:C.yel,marginLeft:"6px"}}>⚡{Math.abs(inv.daysOverdue)}d left</span>}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontWeight:"700",color:inv.outstanding>0&&inv.daysOverdue>0?C.red:C.txt,fontSize:"15px",marginBottom:"4px"}}>{fshort(inv.outstanding)}</div>
                <span style={bdg(SCFG[inv.displayStatus]||SCFG.current)}>{SCFG[inv.displayStatus]?.label}</span>
              </div>
            </div>
          ))}
          {filtered.length===0&&<div style={{padding:"40px",textAlign:"center",color:C.mut}}>No invoices found</div>}
        </div>
      </div>
    )}

    {/* ── REMINDERS (Alerts + WhatsApp) ── */}
    {tab==="reminders"&&(
      <div>
        <div style={{display:"flex",gap:"4px",background:C.card,borderRadius:"12px",padding:"4px",border:`1px solid ${C.bdr}`,marginBottom:"16px"}}>
          {[{id:"alerts",label:"🔔 Alerts"},{id:"whatsapp",label:"💬 WhatsApp"}].map(s=>(
            <button key={s.id} onClick={()=>setSubTab(s.id)} style={{...btn(subTab===s.id?"primary":"ghost"),flex:1,border:"none",padding:"10px"}}>{s.label}</button>
          ))}
        </div>

        {subTab==="alerts"&&(
          <div>
            {reminders.length===0
              ?<div style={{...CARD,padding:"48px",textAlign:"center"}}><div style={{fontSize:"32px",marginBottom:"8px"}}>✅</div><div style={{color:C.grn,fontWeight:"600",fontSize:"15px"}}>All clear!</div></div>
              :reminders.map(inv=>(
                <div key={inv.id} style={{...CARD,marginBottom:"10px",borderLeft:`4px solid ${inv.displayStatus==="overdue"?C.red:C.yel}`}}>
                  <div style={{padding:"14px 16px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:"700",fontSize:"15px",color:C.txt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{inv.customer?.name}</div>
                        <div style={{fontSize:"12px",color:C.blue}}>{inv.invoiceNo}</div>
                      </div>
                      <span style={{...bdg(SCFG[inv.displayStatus]),marginLeft:"10px",flexShrink:0}}>{SCFG[inv.displayStatus]?.label}</span>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"12px"}}>
                      {[["Due Date",fdate(inv.dueDate)],["Outstanding",fmyr(inv.outstanding)],["Contact",inv.customer?.contact||"—"],["Phone",inv.customer?.phone||"—"]].map(([l,v])=>(
                        <div key={l}><div style={{fontSize:"11px",color:C.mut,fontWeight:"600"}}>{l}</div><div style={{fontSize:"13px",color:C.txt,fontWeight:"600"}}>{v}</div></div>
                      ))}
                    </div>
                    {inv.daysOverdue>0
                      ?<div style={{padding:"8px 12px",background:"#3a0a0a",borderRadius:"8px",fontSize:"13px",color:"#fca5a5",marginBottom:"12px"}}>⚠️ {inv.daysOverdue} days past due (Net {inv.customer?.creditTerm})</div>
                      :<div style={{padding:"8px 12px",background:"#3a2a0a",borderRadius:"8px",fontSize:"13px",color:"#fcd34d",marginBottom:"12px"}}>⏰ Due in {Math.abs(inv.daysOverdue)} day{Math.abs(inv.daysOverdue)!==1?"s":""}</div>}
                    <div style={{display:"flex",gap:"8px"}}>
                      <button style={{...btn("success"),flex:1}} onClick={()=>{setPayModal(inv);setPayAmt("");setPayNote("");}}>💰 Record Payment</button>
                      <button style={{...btn("ghost"),padding:"12px 16px"}} onClick={()=>setDismissed(p=>[...p,inv.id])}>✕</button>
                    </div>
                  </div>
                </div>
              ))}
          </div>
        )}

        {subTab==="whatsapp"&&(
          <div>
            <div style={{...CARD,marginBottom:"16px",padding:"14px 16px",background:"linear-gradient(90deg,#0a1a0f,#111827)"}}>
              <div style={{fontWeight:"700",color:C.wa,fontSize:"15px",marginBottom:"4px"}}>💬 WhatsApp Reminder Generator</div>
              <div style={{fontSize:"13px",color:C.mut}}>Tap a customer to generate & send a personalised payment reminder.</div>
            </div>
            <div style={{marginBottom:"14px"}}>
              <label style={LBL}>Your Company Name</label>
              <input style={INP} value={company} onChange={e=>setCompany(e.target.value)}/>
            </div>
            {custsWithOS.length===0
              ?<div style={{...CARD,padding:"40px",textAlign:"center"}}><div style={{fontSize:"28px",marginBottom:"8px"}}>🎉</div><div style={{color:C.grn,fontWeight:"600"}}>No outstanding invoices!</div></div>
              :custsWithOS.map(cust=>{
                const custInvs=enriched.filter(i=>i.customerId===cust.id&&i.displayStatus!=="paid");
                const totalOS=custInvs.reduce((s,i)=>s+i.outstanding,0);
                const hasOD=custInvs.some(i=>i.displayStatus==="overdue");
                const ws=waStats[cust.id];
                const ds=daysSinceWa(cust.id);
                const needsChase=ds===null||(hasOD&&ds>=3)||(!hasOD&&ds>=7);
                return (
                  <div key={cust.id} style={{...CARD,marginBottom:"12px",borderLeft:`4px solid ${needsChase?(hasOD?C.red:C.yel):C.wa}`}}>
                    <div style={{padding:"14px 16px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:"700",fontSize:"15px",color:C.txt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cust.name}</div>
                          <div style={{fontSize:"12px",color:C.mut,marginTop:"2px"}}>{cust.contact||"—"} · {cust.phone||"No phone"}</div>
                        </div>
                        <div style={{textAlign:"right",flexShrink:0,marginLeft:"10px"}}>
                          <div style={{fontWeight:"700",color:hasOD?C.red:C.yel,fontSize:"15px"}}>{fmyr(totalOS)}</div>
                          <div style={{fontSize:"11px",color:C.mut}}>{custInvs.length} invoice{custInvs.length!==1?"s":""}</div>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:"8px",marginBottom:"12px",flexWrap:"wrap"}}>
                        {ws
                          ?<>
                            <div style={{background:"#0a1a0f",border:"1px solid #166534",borderRadius:"8px",padding:"6px 12px",fontSize:"12px",display:"flex",alignItems:"center",gap:"6px"}}>
                              <span>💬</span><span style={{color:C.grn,fontWeight:"700"}}>{ws.count}x</span><span style={{color:C.mut}}>reminded</span>
                            </div>
                            <div style={{background:C.bg,border:`1px solid ${C.bdr}`,borderRadius:"8px",padding:"6px 12px",fontSize:"12px",display:"flex",alignItems:"center",gap:"6px"}}>
                              <span>🕐</span><span style={{color:C.sub}}>Last:</span><span style={{color:C.txt,fontWeight:"600"}}>{ds===0?"Today":ds===1?"Yesterday":`${ds}d ago`}</span>
                            </div>
                            {needsChase&&(
                              <div style={{background:hasOD?"#3a0a0a":"#3a2a0a",border:`1px solid ${hasOD?"#991b1b":"#92400e"}`,borderRadius:"8px",padding:"6px 12px",fontSize:"12px",display:"flex",alignItems:"center",gap:"6px"}}>
                                <span>🔔</span><span style={{color:hasOD?C.red:C.yel,fontWeight:"700"}}>Time to follow up!</span>
                              </div>
                            )}
                          </>
                          :<div style={{background:"#3a2a0a",border:"1px solid #92400e",borderRadius:"8px",padding:"6px 12px",fontSize:"12px",display:"flex",alignItems:"center",gap:"6px"}}>
                            <span>⚠️</span><span style={{color:C.yel,fontWeight:"700"}}>Not reminded yet</span>
                          </div>}
                      </div>
                      <div style={{background:C.bg,borderRadius:"10px",padding:"12px",marginBottom:"12px",fontSize:"12px",color:C.sub,lineHeight:"1.6",maxHeight:"120px",overflowY:"auto",whiteSpace:"pre-wrap",fontFamily:"monospace",border:`1px solid ${C.bdr}`}}>
                        {genWaMsg(cust.id)}
                      </div>
                      <div style={{display:"flex",gap:"8px"}}>
                        <button style={{...btn("ghost"),flex:1,fontSize:"13px"}} onClick={()=>copyWa(cust.id)}>
                          {waCopied[cust.id]?"✅ Copied!":"📋 Copy Text"}
                        </button>
                        {cust.phone&&(
                          <button style={{...btn("wa"),flex:1,fontSize:"13px"}} onClick={()=>openWa(cust.id)}>
                            <span style={{fontSize:"16px"}}>📱</span> Open WhatsApp
                          </button>
                        )}
                      </div>
                    </div>
                  </div>
                );
              })}
          </div>
        )}
      </div>
    )}

    {/* ── REPORTS ── */}
    {tab==="reports"&&(
      <div>
        <div style={{display:"flex",gap:"4px",background:C.card,borderRadius:"12px",padding:"4px",border:`1px solid ${C.bdr}`,marginBottom:"16px"}}>
          {[{id:"monthly",label:"📅 Monthly"},{id:"history",label:"📜 Payments"},{id:"walog",label:"💬 WA Log"}].map(s=>(
            <button key={s.id} onClick={()=>setSubTab(s.id)} style={{...btn(subTab===s.id?"primary":"ghost"),flex:1,border:"none",padding:"10px"}}>{s.label}</button>
          ))}
        </div>

        {subTab==="monthly"&&(
          <div>
            <div style={{fontWeight:"700",color:C.txt,fontSize:"16px",marginBottom:"4px"}}>📅 Monthly Collection Report</div>
            <div style={{fontSize:"13px",color:C.mut,marginBottom:"16px"}}>Overview of payments collected each month.</div>
            {monthlyData.length===0&&<div style={{...CARD,padding:"40px",textAlign:"center",color:C.mut}}>No data yet. Record some payments first.</div>}
            {monthlyData.map(m=>{
              const mPays=payments.filter(p=>monthKey(p.date)===m.key);
              const mInvs=invoices.filter(i=>monthKey(i.invoiceDate)===m.key);
              const invoiced=mInvs.reduce((s,i)=>s+i.amount,0);
              const collected=mPays.reduce((s,p)=>s+p.amount,0);
              const rate=invoiced>0?Math.round((collected/invoiced)*100):0;
              const isOpen=rMonth===m.key;
              return (
                <div key={m.key} onClick={()=>setRMonth(isOpen?"":m.key)} style={{...CARD,marginBottom:"10px",cursor:"pointer",border:isOpen?`1px solid ${C.blue}`:undefined}}
                  onMouseEnter={e=>e.currentTarget.style.background="#131c2e"} onMouseLeave={e=>e.currentTarget.style.background=""}>
                  <div style={{padding:"14px 16px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
                      <div style={{fontWeight:"700",fontSize:"15px",color:C.txt}}>{m.label}</div>
                      <div style={{fontSize:"12px",color:C.mut}}>{mPays.length} payment{mPays.length!==1?"s":""}</div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginBottom:"10px"}}>
                      {[["Invoiced",fshort(invoiced),C.sub],["Collected",fshort(collected),C.grn],["Rate",`${rate}%`,rate>=80?C.grn:rate>=50?C.yel:C.red]].map(([l,v,col])=>(
                        <div key={l} style={{background:C.bg,borderRadius:"8px",padding:"10px 12px"}}>
                          <div style={{fontSize:"11px",color:C.mut,marginBottom:"3px"}}>{l}</div>
                          <div style={{fontWeight:"700",color:col,fontSize:"15px"}}>{v}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{height:"6px",background:C.bdr,borderRadius:"4px",overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${Math.min(rate,100)}%`,background:rate>=80?C.grn:rate>=50?C.yel:C.red,borderRadius:"4px",transition:"width .5s"}}/>
                    </div>
                  </div>
                  {isOpen&&mPays.length>0&&(
                    <div style={{borderTop:`1px solid ${C.bdr}`,padding:"12px 16px"}}>
                      <div style={{fontSize:"12px",fontWeight:"600",color:C.sub,textTransform:"uppercase",letterSpacing:"0.4px",marginBottom:"8px"}}>Payments this month</div>
                      {mPays.map(p=>(
                        <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.bdr}`}}>
                          <div>
                            <div style={{fontSize:"13px",fontWeight:"600",color:C.txt}}>{p.customerName}</div>
                            <div style={{fontSize:"12px",color:C.mut}}>{p.invoiceNo} · {fdate(p.date)}</div>
                          </div>
                          <div style={{fontWeight:"700",color:C.grn,fontSize:"14px"}}>{fmyr(p.amount)}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {subTab==="history"&&(
          <div>
            <div style={{fontWeight:"700",color:C.txt,fontSize:"16px",marginBottom:"4px"}}>📜 Payment History</div>
            <div style={{fontSize:"13px",color:C.mut,marginBottom:"14px"}}>Every payment recorded in the system.</div>
            <input style={{...INP,marginBottom:"14px",padding:"10px 14px"}} placeholder="🔍 Search customer or invoice…" value={hSearch} onChange={e=>setHSearch(e.target.value)}/>

              ?<div style={{...CARD,padding:"40px",textAlign:"center",color:C.mut}}>No payment history yet.</div>
              :<div style={CARD}>
                {filteredHistory.map(p=>(
                  <div key={p.id} style={{padding:"13px 16px",borderBottom:`1px solid ${C.bdr}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:"12px"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:"700",fontSize:"14px",color:C.txt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.customerName}</div>
                      <div style={{fontSize:"12px",color:C.blue}}>{p.invoiceNo}</div>
                      <div style={{fontSize:"12px",color:C.mut,marginTop:"2px"}}>{fdate(p.date)}{p.note&&<span style={{marginLeft:"8px"}}>· {p.note}</span>}</div>
                    </div>
                    <div style={{fontWeight:"700",color:C.grn,fontSize:"16px",flexShrink:0}}>{fmyr(p.amount)}</div>
                  </div>
                ))}
                <div style={{padding:"14px 16px",background:"#0a1a0f",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontWeight:"700",color:C.txt,fontSize:"14px"}}>Total ({filteredHistory.length})</div>
                  <div style={{fontWeight:"700",color:C.grn,fontSize:"16px"}}>{fmyr(filteredHistory.reduce((s,p)=>s+p.amount,0))}</div>
                </div>
              </div>}
          </div>
        )}

        {subTab==="walog"&&(
          <div>
            <div style={{fontWeight:"700",color:C.txt,fontSize:"16px",marginBottom:"4px"}}>💬 WhatsApp Reminder Log</div>
            <div style={{fontSize:"13px",color:C.mut,marginBottom:"16px"}}>Every reminder you've sent, tracked automatically.</div>
            {customers.filter(c=>waStats[c.id]).length>0&&(
              <div style={{...CARD,marginBottom:"16px"}}>
                <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.bdr}`}}><span style={{fontWeight:"600",color:C.txt,fontSize:"14px"}}>Reminder Count by Customer</span></div>
                {customers.filter(c=>waStats[c.id]).sort((a,b)=>(waStats[b.id]?.count||0)-(waStats[a.id]?.count||0)).map(c=>{
                  const ws=waStats[c.id];
                  const ds=daysSinceWa(c.id);
                  const hasOS=enriched.some(i=>i.customerId===c.id&&i.displayStatus!=="paid");
                  return (
                    <div key={c.id} style={{padding:"12px 16px",borderBottom:`1px solid ${C.bdr}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:"12px"}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:"600",fontSize:"14px",color:C.txt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
                        <div style={{fontSize:"12px",color:C.mut,marginTop:"2px"}}>Last sent: {ds===0?"Today":ds===1?"Yesterday":`${ds} days ago`} · {fdate(ws.lastDate)}</div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:"10px",flexShrink:0}}>
                        {hasOS&&ds!==null&&ds>=3&&<span style={{fontSize:"11px",color:C.red,fontWeight:"700"}}>⚠️ Chase!</span>}
                        <div style={{background:"#0a1a0f",border:"1px solid #166534",borderRadius:"20px",padding:"4px 12px",fontWeight:"700",color:C.grn,fontSize:"14px"}}>{ws.count}x</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            <div style={{fontWeight:"600",color:C.sub,fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.4px",marginBottom:"8px"}}>Full Log ({waLog.length} total)</div>
            {waLog.length===0
              ?<div style={{...CARD,padding:"40px",textAlign:"center",color:C.mut}}>No reminders sent yet. Use the WhatsApp tab!</div>
              :<div style={CARD}>
                {waLog.map(l=>(
                  <div key={l.id} style={{padding:"11px 16px",borderBottom:`1px solid ${C.bdr}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:"13px",fontWeight:"600",color:C.txt}}>{l.customerName}</div>
                      <div style={{fontSize:"12px",color:C.mut}}>{fdate(l.date)}</div>
                    </div>
                    <div style={{fontSize:"12px",color:C.wa,fontWeight:"600"}}>💬 Sent</div>
                  </div>
                ))}
              </div>}
          </div>
        )}
      </div>
    )}

    {/* ── IMPORT ── */}
    {tab==="import"&&<ImportUI/>}
  </div>

  {/* BOTTOM NAV (mobile) */}
  {mob&&(
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#111827",borderTop:`1px solid ${C.bdr}`,display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom)"}}>
      {TABS.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 4px 8px",border:"none",cursor:"pointer",background:"transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",color:tab===t.id?C.blue:C.mut,position:"relative"}}>
          <span style={{fontSize:"20px",lineHeight:1}}>{t.icon}</span>
          <span style={{fontSize:"10px",fontWeight:tab===t.id?"700":"500"}}>{t.label}</span>
          {t.badge>0&&<span style={{position:"absolute",top:"6px",right:"calc(50% - 16px)",background:C.red,color:"white",borderRadius:"10px",padding:"1px 5px",fontSize:"9px",fontWeight:"700"}}>{t.badge}</span>}
          {tab===t.id&&<div style={{position:"absolute",top:0,left:"20%",right:"20%",height:"2px",background:C.blue,borderRadius:"0 0 2px 2px"}}/>}
        </button>
      ))}
    </div>
  )}

  {selInv&&<InvDetail inv={selInv}/>}

  {/* ADD INVOICE */}
  {showInv&&(
    <div style={MODAL_OUTER} onClick={()=>setShowInv(false)}>
      <div style={MODAL_INNER} onClick={e=>e.stopPropagation()}>
        {mob&&<div style={DRAG_HANDLE}/>}
        <div style={{fontSize:"17px",fontWeight:"700",color:C.txt,marginBottom:"20px"}}>➕ New Invoice</div>
        <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
          <div><label style={LBL}>Customer *</label>
            <select style={INP} value={newInv.customerId} onChange={e=>setNewInv(p=>({...p,customerId:e.target.value}))}>
              <option value="">Select customer…</option>
              {customers.map(c=><option key={c.id} value={c.id}>{c.name} (Net {c.creditTerm})</option>)}
            </select>
          </div>
          <div><label style={LBL}>Invoice No *</label><input style={INP} placeholder="INV-XXX" value={newInv.invoiceNo} onChange={e=>setNewInv(p=>({...p,invoiceNo:e.target.value}))}/></div>
          <div><label style={LBL}>Invoice Date</label><input type="date" style={INP} value={newInv.invoiceDate} onChange={e=>setNewInv(p=>({...p,invoiceDate:e.target.value}))}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
            <div><label style={LBL}>Amount (RM) *</label><input type="number" style={INP} placeholder="0.00" value={newInv.amount} onChange={e=>setNewInv(p=>({...p,amount:e.target.value}))}/></div>
            <div><label style={LBL}>Paid (RM)</label><input type="number" style={INP} placeholder="0.00" value={newInv.paidAmount} onChange={e=>setNewInv(p=>({...p,paidAmount:e.target.value}))}/></div>
          </div>
          <div><label style={LBL}>Notes</label><input style={INP} placeholder="Optional…" value={newInv.notes} onChange={e=>setNewInv(p=>({...p,notes:e.target.value}))}/></div>
          <div style={{display:"flex",gap:"10px"}}>
            <button style={{...btn("ghost"),flex:1}} onClick={()=>setShowInv(false)}>Cancel</button>
            <button style={{...btn("primary"),flex:1}} onClick={addInvoice}>Save Invoice</button>
          </div>
        </div>
      </div>
    </div>
  )}

  {/* ADD CUSTOMER */}
  {showCust&&(
    <div style={MODAL_OUTER} onClick={()=>setShowCust(false)}>
      <div style={MODAL_INNER} onClick={e=>e.stopPropagation()}>
        {mob&&<div style={DRAG_HANDLE}/>}
        <div style={{fontSize:"17px",fontWeight:"700",color:C.txt,marginBottom:"20px"}}>👤 New Customer</div>
        <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
          <div><label style={LBL}>Company Name *</label><input style={INP} placeholder="ABC Trading Sdn Bhd" value={newCust.name} onChange={e=>setNewCust(p=>({...p,name:e.target.value}))}/></div>
          <div><label style={LBL}>Credit Term (days)</label><input type="number" style={INP} placeholder="30" value={newCust.creditTerm} onChange={e=>setNewCust(p=>({...p,creditTerm:e.target.value}))}/></div>
          <div><label style={LBL}>Contact Person</label><input style={INP} value={newCust.contact} onChange={e=>setNewCust(p=>({...p,contact:e.target.value}))}/></div>
          <div><label style={LBL}>Phone (for WhatsApp)</label><input type="tel" style={INP} placeholder="012-3456789" value={newCust.phone} onChange={e=>setNewCust(p=>({...p,phone:e.target.value}))}/></div>
          <div><label style={LBL}>Email</label><input type="email" style={INP} placeholder="email@company.com" value={newCust.email} onChange={e=>setNewCust(p=>({...p,email:e.target.value}))}/></div>
          <div style={{display:"flex",gap:"10px"}}>
            <button style={{...btn("ghost"),flex:1}} onClick={()=>setShowCust(false)}>Cancel</button>
            <button style={{...btn("primary"),flex:1}} onClick={addCustomer}>Save Customer</button>
          </div>
        </div>
      </div>
    </div>
  )}

  {/* PAYMENT MODAL */}
  {payModal&&(
    <div style={MODAL_OUTER} onClick={()=>setPayModal(null)}>
      <div style={MODAL_INNER} onClick={e=>e.stopPropagation()}>
        {mob&&<div style={DRAG_HANDLE}/>}
        <div style={{fontSize:"17px",fontWeight:"700",color:C.txt,marginBottom:"4px"}}>💰 Record Payment</div>
        <div style={{fontSize:"13px",color:C.mut,marginBottom:"18px"}}>{payModal.customer?.name} · {payModal.invoiceNo}</div>
        <div style={{background:C.bg,borderRadius:"10px",padding:"14px",marginBottom:"16px"}}>
          {[["Invoice Amount",fmyr(payModal.amount),"#e2e8f0"],["Already Paid",fmyr(payModal.paidAmount),C.grn],["Outstanding",fmyr(payModal.outstanding),C.red]].map(([l,v,col],i,a)=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:i===a.length-1?"10px 0 0":"0 0 10px",borderTop:i===a.length-1?`1px solid ${C.bdr}`:"none"}}>
              <span style={{color:C.mut,fontSize:"14px"}}>{l}</span>
              <span style={{color:col,fontWeight:i===a.length-1?"700":"500",fontSize:"14px"}}>{v}</span>
            </div>
          ))}
        </div>
        <label style={LBL}>Payment Amount (RM)</label>
        <input type="number" style={{...INP,marginBottom:"10px",fontSize:"18px",fontWeight:"600"}} placeholder={`Max: ${payModal.outstanding.toFixed(2)}`} value={payAmt} onChange={e=>setPayAmt(e.target.value)} autoFocus/>
        <div style={{display:"flex",gap:"8px",marginBottom:"12px"}}>
          <button style={{...btn("ghost"),flex:1,fontSize:"13px"}} onClick={()=>setPayAmt(payModal.outstanding.toFixed(2))}>Full Amount</button>
          <button style={{...btn("ghost"),flex:1,fontSize:"13px"}} onClick={()=>setPayAmt((payModal.outstanding/2).toFixed(2))}>Half</button>
        </div>
        <label style={LBL}>Note (optional)</label>
        <input style={{...INP,marginBottom:"16px"}} placeholder="e.g. Paid via TT, Cash, Cheque…" value={payNote} onChange={e=>setPayNote(e.target.value)}/>
        <div style={{display:"flex",gap:"10px"}}>
          <button style={{...btn("ghost"),flex:1}} onClick={()=>setPayModal(null)}>Cancel</button>
          <button style={{...btn("success"),flex:1}} onClick={recordPayment}>Confirm Payment</button>
        </div>
      </div>
    </div>
  )}
</div>
