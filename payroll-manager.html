<html lang="en">

<style>

<body>
<div id="root"></div>
<script>
(function(){
'use strict';
var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useCallback = React.useCallback;

/* ── Storage ── */
var S = {
get:function(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}},
set:function(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
};

/* ── Helpers ── */
function uid(){return Math.random().toString(36).slice(2,9)}
function fmt(n){return Number(n||0).toLocaleString(‘en-MY’,{minimumFractionDigits:2,maximumFractionDigits:2})}
function toDay(){return new Date().toISOString().slice(0,10)}
function mkey(y,m){return y+’-’+(m<10?‘0’+m:m)}
var MONTHS=[‘January’,‘February’,‘March’,‘April’,‘May’,‘June’,‘July’,‘August’,‘September’,‘October’,‘November’,‘December’];
function aColor(name){
var cols=[’#10b981’,’#6366f1’,’#f59e0b’,’#ef4444’,’#8b5cf6’,’#ec4899’,’#14b8a6’,’#f97316’];
var hh=0; var s=(name||’?’);
for(var i=0;i<s.length;i++) hh=(hh*31+s.charCodeAt(i))&0xffffffff;
return cols[Math.abs(hh)%cols.length];
}
function inits(name){return (name||’?’).trim().split(’ ‘).slice(0,2).map(function(w){return w[0]?w[0].toUpperCase():’’}).join(’’)}

var DAILY=10;
function calcPay(emp,rec){
rec=rec||{};
var base=+(emp.baseSalary)||0, hr=+(emp.hourlyRate)||0;
var phRate=hr||base/208;
var hours=+(rec.hoursWorked)||0, phH=+(rec.publicHolidayHours)||0;
var ad=+(rec.allowanceDays)||0, allow=ad*DAILY;
var adv=(rec.advances||[]).reduce(function(s,a){return s+(+(a.amount)||0)},0);
var gross=emp.payType===‘monthly’?base:0;
if(hours>0) gross+=hours*hr;
if(phH>0) gross+=phH*phRate*2;
gross+=allow;
return {gross:gross,advances:adv,net:gross-adv,allowance:allow,allowDays:ad,phRate:phRate};
}

/* ── Colors ── */
var G={
bg:’#09100d’,card:’#101a14’,card2:’#141f17’,border:’#1c2c20’,border2:’#21332a’,
green:’#10b981’,greenD:’#059669’,greenL:’#34d399’,gold:’#f59e0b’,red:’#f87171’,blue:’#60a5fa’,
text:’#e2ede8’,sub:’#6b8f7a’,muted:’#3d5449’
};

/* ── Print slip ── */
function printSlip(emp,rec,year,month){
var p=calcPay(emp,rec), hr=+(emp.hourlyRate)||0, period=MONTHS[month-1]+’ ‘+year;
var w=window.open(’’,’_blank’);
w.document.write(’<!DOCTYPE html><html><head><title>Pay Slip</title>’+
‘<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">’+
’<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8f7f4;color:#1a1a1a;padding:32px;max-width:600px;margin:auto;-webkit-print-color-adjust:exact;print-color-adjust:exact}.top{background:linear-gradient(135deg,#064e3b,#047857);color:#fff;padding:28px;border-radius:16px;margin-bottom:20px;position:relative;overflow:hidden}.top::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.06)}.badge{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 12px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}.co{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:3px}.per{font-size:13px;opacity:.7}.er{display:flex;align-items:center;gap:14px;margin-top:18px;padding-top:18px;border-top:1px solid rgba(255,255,255,.15)}.av{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}.en{font-family:'Playfair Display',serif;font-size:19px;margin-bottom:2px}.es{font-size:12px;opacity:.65}section{background:#fff;border-radius:12px;padding:18px 20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}.st{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:#6b7280;margin-bottom:12px;font-weight:600}.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:13.5px}.row:last-child{border:none}.lb{color:#4b5563}.vl{font-weight:600}.gb{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:10px}.gb .lb{font-size:13px;color:#166534;font-weight:600}.gb .vl{font-family:'Playfair Display',serif;font-size:24px;color:#14532d}.nb{background:linear-gradient(135deg,#064e3b,#047857);color:#fff;border-radius:12px;padding:20px 24px;display:flex;justify-content:space-between;align-items:center}.nb .lb{font-size:13px;opacity:.75}.nb .vl{font-family:'Playfair Display',serif;font-size:32px}.dd{color:#ef4444}.ft{text-align:center;font-size:11px;color:#9ca3af;margin-top:22px;padding-top:14px;border-top:1px solid #e5e7eb}.sr{display:flex;justify-content:space-around;margin-top:28px}.sl{width:140px;border-top:1px solid #d1d5db;margin-bottom:6px}.sl2{font-size:11px;color:#9ca3af;text-align:center}.pb{display:block;width:100%;background:#064e3b;color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-top:20px}@media print{.pb{display:none}}</style></head><body>’+
‘<div class="top"><div class="badge">Official Pay Slip</div><div class="co">PayRoll</div><div class="per">Period: ‘+period+’</div>’+
‘<div class="er"><div class="av">’+inits(emp.name)+’</div><div><div class="en">’+emp.name+’</div><div class="es">’+(emp.position||’—’)+’ · ID: ‘+emp.id.toUpperCase()+’</div></div></div></div>’+
‘<section><div class="st">Earnings</div>’+
(emp.payType===‘monthly’?’<div class="row"><span class="lb">Base Monthly Salary</span><span class="vl">RM ‘+fmt(emp.baseSalary)+’</span></div>’:’’)+
(+(rec.hoursWorked)>0?’<div class="row"><span class="lb">’+(emp.payType===‘hourly’?‘Regular’:‘Extra’)+’ Hours (’+rec.hoursWorked+‘h × RM ‘+fmt(hr)+’)</span><span class="vl">RM ‘+fmt((+(rec.hoursWorked))*hr)+’</span></div>’:’’)+
(+(rec.publicHolidayHours)>0?’<div class="row"><span class="lb">Public Holiday (’+rec.publicHolidayHours+‘h × 2×)</span><span class="vl" style="color:#0891b2">RM ‘+fmt((+(rec.publicHolidayHours))*p.phRate*2)+’</span></div>’:’’)+
(p.allowDays>0?’<div class="row"><span class="lb"><span style="background:#fef3c7;color:#92400e;border-radius:4px;padding:2px 6px;font-size:10px;font-weight:600;margin-right:6px">ALLOWANCE</span>Daily (’+p.allowDays+’ days × RM10)</span><span class="vl" style="color:#d97706">RM ‘+fmt(p.allowance)+’</span></div>’:’’)+
‘<div class="gb"><span class="lb">Gross Pay</span><span class="vl">RM ‘+fmt(p.gross)+’</span></div></section>’+
(p.advances>0?’<section><div class="st">Deductions</div>’+(rec.advances||[]).map(function(a){return ‘<div class="row"><div><div class="lb">’+(a.note||‘Salary Advance’)+’</div><div style="font-size:11px;color:#9ca3af">’+a.date+’</div></div><span class="vl dd">−RM ‘+fmt(a.amount)+’</span></div>’}).join(’’)+’</section>’:’’)+
‘<div class="nb"><div><div class="lb">Net Amount Payable</div><div style="font-size:11px;opacity:.5;margin-top:2px">’+period+’</div></div><div class="vl">RM ‘+fmt(p.net)+’</div></div>’+
‘<div class="sr"><div><div class="sl"></div><div class="sl2">Employee Signature</div></div><div><div class="sl"></div><div class="sl2">Authorised Signatory</div></div></div>’+
‘<div class="ft">Generated ‘+new Date().toLocaleDateString(‘en-MY’,{day:‘numeric’,month:‘long’,year:‘numeric’})+’ · Computer-generated document</div>’+
‘<button class="pb" onclick="window.print()">🖨 Print / Save as PDF</button>’+
‘</body></html>’);
w.document.close();
}

/* ── Avatar ── */
function Avatar(props){
var name=props.name||’?’, size=props.size||42, bg=aColor(name);
return h(‘div’,{style:{width:size,height:size,borderRadius:Math.round(size*.27),background:bg+‘1e’,border:’1.5px solid ’+bg+‘44’,display:‘flex’,alignItems:‘center’,justifyContent:‘center’,fontSize:Math.round(size*.38),fontWeight:700,color:bg,flexShrink:0}},inits(name));
}

/* ── Sheet ── */
function Sheet(props){
if(!props.open) return null;
return h(‘div’,{onClick:props.onClose,style:{position:‘fixed’,inset:0,background:‘rgba(0,0,0,.82)’,zIndex:300,display:‘flex’,flexDirection:‘column’,justifyContent:‘flex-end’,WebkitBackdropFilter:‘blur(6px)’,backdropFilter:‘blur(6px)’}},
h(‘div’,{onClick:function(e){e.stopPropagation()},style:{background:G.card,borderRadius:‘22px 22px 0 0’,maxHeight:‘92vh’,overflow:‘hidden’,display:‘flex’,flexDirection:‘column’,animation:‘slideUp .3s cubic-bezier(.32,1.15,.54,1)’}},
h(‘div’,{style:{padding:‘14px 20px 0’,flexShrink:0}},
h(‘div’,{style:{width:38,height:4,background:G.border2,borderRadius:2,margin:‘0 auto 14px’}}),
h(‘div’,{style:{display:‘flex’,justifyContent:‘space-between’,alignItems:‘center’,marginBottom:20}},
h(‘span’,{style:{fontFamily:”‘Playfair Display’,serif”,fontSize:21,color:G.text}},props.title),
h(‘button’,{onClick:props.onClose,className:‘tap’,style:{width:32,height:32,borderRadius:‘50%’,background:G.card2,border:’1px solid ’+G.border,color:G.sub,fontSize:15,display:‘flex’,alignItems:‘center’,justifyContent:‘center’,border:’1px solid ’+G.border}},‘✕’)
)
),
h(‘div’,{style:{overflowY:‘auto’,padding:‘0 20px 32px’,flexGrow:1}},props.children)
)
);
}

/* ── Inp ── */
function Inp(props){
var label=props.label; var rest=Object.assign({},props); delete rest.label;
return h(‘div’,{style:{marginBottom:15}},
label&&h(‘div’,{style:{fontSize:11,textTransform:‘uppercase’,letterSpacing:’.12em’,color:G.sub,marginBottom:7,fontWeight:600}},label),
h(‘input’,Object.assign({},rest,{style:{width:‘100%’,background:G.card2,border:’1.5px solid ’+G.border2,borderRadius:11,padding:‘13px 14px’,color:G.text,fontSize:15}}))
);
}

/* ── Sel ── */
function Sel(props){
var label=props.label,children=props.children; var rest=Object.assign({},props); delete rest.label; delete rest.children;
return h(‘div’,{style:{marginBottom:15}},
label&&h(‘div’,{style:{fontSize:11,textTransform:‘uppercase’,letterSpacing:’.12em’,color:G.sub,marginBottom:7,fontWeight:600}},label),
h(‘select’,Object.assign({},rest,{style:{width:‘100%’,background:G.card2,border:’1.5px solid ’+G.border2,borderRadius:11,padding:‘13px 14px’,color:G.text,fontSize:15}}),children)
);
}

/* ── Btn ── */
function Btn(props){
var variant=props.variant||‘primary’,children=props.children,sty=props.style||{};
var rest=Object.assign({},props); delete rest.variant; delete rest.children; delete rest.style;
var base={border:‘none’,borderRadius:13,padding:‘14px 20px’,fontSize:15,fontWeight:700,width:‘100%’,display:‘block’,fontFamily:‘inherit’,cursor:‘pointer’};
var vs={
primary:{background:‘linear-gradient(135deg,’+G.green+’,’+G.greenD+’)’,color:’#fff’,boxShadow:‘0 4px 22px rgba(16,185,129,.4)’},
ghost:{background:‘transparent’,color:G.sub,border:‘1.5px solid ‘+G.border2},
danger:{background:‘rgba(248,113,113,.1)’,color:G.red,border:‘1.5px solid rgba(248,113,113,.25)’},
gold:{background:‘linear-gradient(135deg,’+G.gold+’,#d97706)’,color:’#111’,boxShadow:‘0 4px 22px rgba(245,158,11,.35)’}
};
return h(‘button’,Object.assign({},rest,{className:‘tap’,style:Object.assign({},base,vs[variant],sty)}),children);
}

/* ── Row ── */
function ERow(props){
var emp=props.emp,r=props.r,onClick=props.onClick,idx=props.idx;
var p=calcPay(emp,r), isPaid=r.status===‘paid’;
return h(‘div’,{className:‘rtp tap’,onClick:onClick,style:{background:G.card,border:’1px solid ’+G.border,borderRadius:18,padding:‘14px 15px’,animation:’fadeIn .3s ease ’+(idx*0.06)+‘s both’}},
h(‘div’,{style:{display:‘flex’,alignItems:‘center’,gap:11,marginBottom:11}},
h(Avatar,{name:emp.name,size:44}),
h(‘div’,{style:{flex:1,minWidth:0}},
h(‘div’,{style:{fontWeight:700,fontSize:15,color:G.text,marginBottom:1}},emp.name),
h(‘div’,{style:{fontSize:12,color:G.sub}},emp.position||’—’)
),
h(‘div’,{style:{background:isPaid?‘rgba(16,185,129,.12)’:‘rgba(245,158,11,.1)’,color:isPaid?G.green:G.gold,border:‘1px solid ‘+(isPaid?G.green+‘30’:G.gold+‘30’),borderRadius:20,padding:‘3px 10px’,fontSize:11,fontWeight:600,flexShrink:0}},isPaid?‘✓ Paid’:‘Pending’)
),
h(‘div’,{style:{display:‘grid’,gridTemplateColumns:p.advances>0?‘1fr 1fr 1fr’:‘1fr 1fr’,gap:7}},
h(‘div’,{style:{background:G.card2,borderRadius:10,padding:‘9px 11px’}},
h(‘div’,{style:{fontSize:9,color:G.muted,marginBottom:3,textTransform:‘uppercase’,letterSpacing:’.08em’}},‘Gross’),
h(‘div’,{style:{fontSize:14,fontWeight:700,color:G.text}},‘RM ‘+fmt(p.gross))
),
p.advances>0&&h(‘div’,{style:{background:G.card2,borderRadius:10,padding:‘9px 11px’}},
h(‘div’,{style:{fontSize:9,color:G.muted,marginBottom:3,textTransform:‘uppercase’,letterSpacing:’.08em’}},‘Advances’),
h(‘div’,{style:{fontSize:14,fontWeight:700,color:G.red}},‘−’+fmt(p.advances))
),
h(‘div’,{style:{background:‘rgba(16,185,129,.07)’,border:‘1px solid rgba(16,185,129,.14)’,borderRadius:10,padding:‘9px 11px’}},
h(‘div’,{style:{fontSize:9,color:G.greenL+‘88’,marginBottom:3,textTransform:‘uppercase’,letterSpacing:’.08em’}},‘Net Pay’),
h(‘div’,{style:{fontSize:14,fontWeight:700,color:G.green}},’RM ’+fmt(p.net))
)
)
);
}

/* ══ APP ══ */
function App(){
var _e=useState([]),employees=_e[0],setEmployees=_e[1];
var _p=useState({}),payroll=_p[0],setPayroll=_p[1];
var _s=useState(‘home’),screen=_s[0],setScreen=_s[1];
var _si=useState(null),selId=_si[0],setSelId=_si[1];
var _sh=useState(null),sheet=_sh[0],setSheet=_sh[1];
var _rm=useState(null),restoreMsg=_rm[0],setRestoreMsg=_rm[1];
var now=new Date();
var _vm=useState({y:now.getFullYear(),m:now.getMonth()+1}),vm=_vm[0],setVm=_vm[1];
var _ef=useState({payType:‘monthly’}),ef=_ef[0],setEf=_ef[1];
var _af=useState({amount:’’,note:’’,date:toDay()}),af=_af[0],setAf=_af[1];
var _hf=useState({hoursWorked:’’,publicHolidayHours:’’,allowanceDays:’’}),hf=_hf[0],setHf=_hf[1];

useEffect(function(){
var e=S.get(‘pr_emp’),p=S.get(‘pr_pay’);
if(e) setEmployees(e); if(p) setPayroll(p);
},[]);

function saveEmp(d){setEmployees(d);S.set(‘pr_emp’,d);}
function savePay(d){setPayroll(d);S.set(‘pr_pay’,d);}

var mk=mkey(vm.y,vm.m);
function getRec(id){return (payroll[id]&&payroll[id][mk])||{};}
var selEmp=employees.find(function(e){return e.id===selId;});

function adjMonth(dir){setVm(function(p){var d=new Date(p.y,p.m-1+dir);return {y:d.getFullYear(),m:d.getMonth()+1};});}

function saveEmployee(){
if(!ef.name||!ef.name.trim()) return;
var list=ef.id?employees.map(function(e){return e.id===ef.id?Object.assign({},ef):e}):[…employees,Object.assign({},ef,{id:uid()})];
saveEmp(list); setSheet(null);
}
function deleteEmployee(){
saveEmp(employees.filter(function(e){return e.id!==selId;}));
setScreen(‘home’); setSelId(null); setSheet(null);
}
function addAdvance(){
if(!af.amount||!selId) return;
var r=getRec(selId), newAdv=Object.assign({id:uid()},af);
var upd=Object.assign({},payroll);
upd[selId]=Object.assign({},upd[selId]);
upd[selId][mk]=Object.assign({},r,{advances:[…(r.advances||[]),newAdv]});
savePay(upd); setAf({amount:’’,note:’’,date:toDay()}); setSheet(null);
}
function removeAdvance(aid){
var r=getRec(selId);
var upd=Object.assign({},payroll);
upd[selId]=Object.assign({},upd[selId]);
upd[selId][mk]=Object.assign({},r,{advances:(r.advances||[]).filter(function(a){return a.id!==aid;})});
savePay(upd);
}
function saveHours(){
if(!selId) return;
var r=getRec(selId);
var upd=Object.assign({},payroll);
upd[selId]=Object.assign({},upd[selId]);
upd[selId][mk]=Object.assign({},r,hf);
savePay(upd); setSheet(null);
}
function togglePaid(){
var r=getRec(selId);
var upd=Object.assign({},payroll);
upd[selId]=Object.assign({},upd[selId]);
upd[selId][mk]=Object.assign({},r,{status:r.status===‘paid’?‘pending’:‘paid’});
savePay(upd);
}
function downloadBackup(){
var data={version:1,exportedAt:new Date().toISOString(),employees:employees,payroll:payroll};
var blob=new Blob([JSON.stringify(data,null,2)],{type:‘application/json’});
var url=URL.createObjectURL(blob);
var a=document.createElement(‘a’);
a.href=url; a.download=‘payroll-backup-’+new Date().toISOString().slice(0,10)+’.json’;
document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}
function handleRestore(e){
var file=e.target.files&&e.target.files[0]; if(!file) return;
var reader=new FileReader();
reader.onload=function(ev){
try{
var data=JSON.parse(ev.target.result);
if(!data.employees||!data.payroll) throw new Error(‘bad’);
saveEmp(data.employees); savePay(data.payroll);
setRestoreMsg({ok:true,msg:‘✅ Restored ‘+data.employees.length+’ employee’+(data.employees.length!==1?‘s’:’’)+’ successfully.’});
}catch(err){setRestoreMsg({ok:false,msg:‘❌ Invalid file. Please use a PayRoll .json backup.’});}
};
reader.readAsText(file); e.target.value=’’;
}

var periodLabel=MONTHS[vm.m-1]+’ ’+vm.y;
var totalGross=employees.reduce(function(s,e){return s+calcPay(e,getRec(e.id)).gross;},0);
var totalAdv=employees.reduce(function(s,e){return s+calcPay(e,getRec(e.id)).advances;},0);
var totalNet=employees.reduce(function(s,e){return s+calcPay(e,getRec(e.id)).net;},0);
var paidCount=employees.filter(function(e){return getRec(e.id).status===‘paid’;}).length;

/* header */
var header=h(‘div’,{style:{position:‘sticky’,top:0,zIndex:100,background:G.bg+‘f2’,WebkitBackdropFilter:‘blur(18px)’,backdropFilter:‘blur(18px)’,padding:‘13px 18px 11px’,borderBottom:‘1px solid ‘+G.border}},
h(‘div’,{style:{display:‘flex’,alignItems:‘center’,justifyContent:‘space-between’}},
h(‘div’,{style:{display:‘flex’,alignItems:‘center’,gap:9}},
screen===‘detail’&&h(‘button’,{className:‘tap’,onClick:function(){setScreen(‘home’);},style:{width:32,height:32,borderRadius:9,background:G.card2,border:‘1px solid ‘+G.border,color:G.sub,fontSize:18,display:‘flex’,alignItems:‘center’,justifyContent:‘center’,marginRight:2}},’‹’),
h(‘div’,{style:{width:30,height:30,borderRadius:9,background:‘linear-gradient(135deg,’+G.green+’,’+G.greenD+’)’,display:‘flex’,alignItems:‘center’,justifyContent:‘center’,fontSize:16,boxShadow:‘0 3px 12px ‘+G.green+‘44’}},‘₿’),
h(‘span’,{style:{fontFamily:”‘Playfair Display’,serif”,fontSize:19,color:G.text}},screen===‘detail’&&selEmp?selEmp.name.split(’ ‘)[0]:‘PayRoll’)
