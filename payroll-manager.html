<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>PayRoll Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#09100d;font-family:'Plus Jakarta Sans',sans-serif;color:#e2ede8;overscroll-behavior:none}
input,select,button,label{font-family:'Plus Jakarta Sans',sans-serif}
input:focus,select:focus{outline:none;border-color:#10b981!important;box-shadow:0 0 0 3px rgba(16,185,129,.15)!important}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#21332a;border-radius:2px}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ani{animation:fadeIn .3s ease}
button{cursor:pointer}
button:active,label:active{opacity:.7;transform:scale(.97)}

/* layout */
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative}
#header{position:sticky;top:0;z-index:100;background:rgba(9,16,13,.94);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);padding:13px 18px 11px;border-bottom:1px solid #1c2c20;display:flex;align-items:center;justify-content:space-between}
#content{padding-bottom:90px}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(16,26,20,.96);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-top:1px solid #1c2c20;display:flex;z-index:150}
.nav-btn{flex:1;background:none;border:none;padding:12px 8px 14px;display:flex;flex-direction:column;align-items:center;gap:4}
.nav-icon{font-size:21px;transition:all .2s;opacity:.35}
.nav-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3d5449;transition:color .2s}
.nav-dot{width:0;height:2px;background:#10b981;border-radius:1px;transition:width .25s cubic-bezier(.34,1.56,.64,1)}
.nav-btn.active .nav-icon{opacity:1;filter:drop-shadow(0 0 6px #10b981)}
.nav-btn.active .nav-label{color:#10b981}
.nav-btn.active .nav-dot{width:18px}

/* hero */
.hero{margin:14px 14px 0;background:linear-gradient(140deg,#064e3b 0%,#065f46 60%,#047857 100%);border-radius:22px;padding:22px 22px 20px;position:relative;overflow:hidden;box-shadow:0 10px 40px rgba(6,78,59,.5)}
.hero-circle1{position:absolute;top:-50px;right:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.045)}
.hero-circle2{position:absolute;bottom:-30px;left:-20px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.03)}
.hero-content{position:relative}
.hero-sub{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,.55);margin-bottom:4px;font-weight:600}
.hero-amount{font-family:‘Playfair Display’,serif;font-size:38px;color:#fff;line-height:1.05;margin-bottom:16px}
.hero-stats{display:flex;background:rgba(255,255,255,.08);border-radius:14px;overflow:hidden}
.hero-stat{flex:1;padding:10px 12px;border-left:1px solid rgba(255,255,255,.12)}
.hero-stat:first-child{border-left:none}
.hero-stat-l{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.45);margin-bottom:3px}
.hero-stat-v{font-size:14px;font-weight:700}

/* cards */
.card{background:#101a14;border:1px solid #1c2c20;border-radius:20px;overflow:hidden;margin:10px 14px 0}
.card-inner{padding:17px 18px}
.section-label{font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:#6b8f7a;font-weight:600;margin-bottom:14px}
.pay-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #1c2c20}
.pay-row:last-child{border:none}
.pay-label{font-size:14px;color:#6b8f7a}
.pay-value{font-size:14px;font-weight:600;color:#e2ede8}
.allow-badge{background:rgba(245,158,11,.15);color:#f59e0b;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700;margin-right:7px}
.gross-row{display:flex;justify-content:space-between;padding:12px 0 0}
.gross-label{font-size:15px;font-weight:700;color:#e2ede8}
.gross-val{font-family:‘Playfair Display’,serif;font-size:21px;color:#f59e0b}

/* net box */
.net-box{margin:10px 14px 0;background:linear-gradient(140deg,#064e3b,#047857);border-radius:20px;padding:20px;box-shadow:0 8px 32px rgba(6,78,59,.45);display:flex;justify-content:space-between;align-items:center}
.net-label{font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:rgba(255,255,255,.55);margin-bottom:4px;font-weight:600}
.net-amount{font-family:‘Playfair Display’,serif;font-size:34px;color:#fff;line-height:1.1}
.net-sub{font-size:12px;color:rgba(255,255,255,.45);margin-top:4px}
.net-icon{width:50px;height:50px;border-radius:14px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:22px}

/* emp card */
.emp-card{background:#101a14;border:1px solid #1c2c20;border-radius:18px;padding:14px 15px;margin-bottom:10px}
.emp-card:active{background:#141f17}
.emp-top{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.emp-name-text{font-weight:700;font-size:15px;color:#e2ede8;margin-bottom:1px}
.emp-pos{font-size:12px;color:#6b8f7a}
.status-badge{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;flex-shrink:0}
.status-paid{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.3)}
.status-pending{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.mini-stats{display:grid;gap:7px}
.mini-stat{background:#141f17;border-radius:10px;padding:9px 11px}
.mini-stat-l{font-size:9px;color:#3d5449;margin-bottom:3px;text-transform:uppercase;letter-spacing:.08em}
.mini-stat-v{font-size:14px;font-weight:700;color:#e2ede8}
.mini-stat.net{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.14)}
.mini-stat.net .mini-stat-l{color:rgba(52,211,153,.53)}
.mini-stat.net .mini-stat-v{color:#10b981}
.mini-stat.adv .mini-stat-v{color:#f87171}

/* avatar */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}

/* buttons */
.btn{border:none;border-radius:13px;padding:14px 20px;font-size:15px;font-weight:700;width:100%;display:block;font-family:inherit;transition:opacity .15s}
.btn:active{opacity:.75}
.btn-primary{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 4px 22px rgba(16,185,129,.4)}
.btn-ghost{background:transparent;color:#6b8f7a;border:1.5px solid #21332a}
.btn-danger{background:rgba(248,113,113,.1);color:#f87171;border:1.5px solid rgba(248,113,113,.25)}
.btn-gold{background:linear-gradient(135deg,#f59e0b,#d97706);color:#111;box-shadow:0 4px 22px rgba(245,158,11,.35)}
.btn-red{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;box-shadow:0 4px 18px rgba(239,68,68,.35)}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.btn-sm{font-size:13px}

/* inputs */
.field{margin-bottom:15px}
.field-label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#6b8f7a;margin-bottom:7px;font-weight:600;display:block}
.inp{width:100%;background:#141f17;border:1.5px solid #21332a;border-radius:11px;padding:13px 14px;color:#e2ede8;font-size:15px;font-family:‘Plus Jakarta Sans’,sans-serif}
select.inp{cursor:pointer}

/* sheet overlay */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:300;display:flex;flex-direction:column;justify-content:flex-end;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.sheet-box{background:#101a14;border-radius:22px 22px 0 0;max-height:92vh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.32,1.15,.54,1)}
.sheet-handle{width:38px;height:4px;background:#21332a;border-radius:2px;margin:14px auto 0}
.sheet-header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 0}
.sheet-title{font-family:‘Playfair Display’,serif;font-size:21px;color:#e2ede8}
.sheet-close{width:32px;height:32px;border-radius:50%;background:#141f17;border:1px solid #1c2c20;color:#6b8f7a;font-size:15px;display:flex;align-items:center;justify-content:center}
.sheet-body{padding:16px 20px 32px}

/* section header row */
.section-row{display:flex;justify-content:space-between;align-items:center;padding:18px 14px 0}
.see-all{font-size:12px;color:#10b981;background:none;border:none;font-weight:600}

/* info card in profile */
.profile-box{margin:14px 14px 0;background:linear-gradient(140deg,#0a1f16,#0d2a1a);border:1px solid #1c2c20;border-radius:20px;padding:20px;overflow:hidden;position:relative}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:0}
.action-btn{background:#141f17;border:1px solid #21332a;border-radius:12px;padding:11px 10px;font-size:13px;font-weight:600;color:#e2ede8;display:flex;align-items:center;justify-content:center;gap:6px}
.action-btn.red{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.2);color:#f87171}

/* advance row */
.adv-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1c2c20}
.adv-row:last-child{border:none}
.adv-note{font-size:14px;color:#e2ede8}
.adv-date{font-size:11px;color:#3d5449;margin-top:2px}
.adv-del{width:27px;height:27px;border-radius:50%;background:rgba(248,113,113,.1);border:none;color:#f87171;font-size:16px;display:flex;align-items:center;justify-content:center}

/* settings */
.settings-card{background:#101a14;border:1px solid #1c2c20;border-radius:20px;overflow:hidden;margin-bottom:12px}
.settings-card-header{padding:16px 18px 14px;border-bottom:1px solid #1c2c20}
.settings-card-title{font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:#6b8f7a;font-weight:600;margin-bottom:4px}
.settings-card-desc{font-size:13px;color:#3d5449;line-height:1.55}
.settings-row{padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.settings-row-label{font-size:14px;font-weight:600;color:#e2ede8}
.settings-row-sub{font-size:12px;color:#3d5449;margin-top:2px}
.export-btn{background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:12px;padding:11px 18px;color:#fff;font-weight:700;font-size:13px;box-shadow:0 4px 16px rgba(16,185,129,.44);flex-shrink:0;cursor:pointer}
.restore-lbl{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);border-radius:12px;padding:11px 18px;color:#60a5fa;font-weight:700;font-size:13px;flex-shrink:0;cursor:pointer;display:inline-block}
.restore-msg{margin:0 18px 16px;padding:11px 14px;border-radius:10px;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:10}
.restore-msg.ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#10b981}
.restore-msg.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:#f87171}
.about-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #1c2c20}
.about-row:last-child{border:none}
.about-key{font-size:14px;color:#6b8f7a}
.about-val{font-size:14px;font-weight:600;color:#e2ede8}

/* misc */
.empty{text-align:center;padding:44px 20px;color:#3d5449}
.empty-icon{font-size:48px;margin-bottom:10px}
.empty-title{font-family:‘Playfair Display’,serif;font-size:18px;color:#6b8f7a;margin-bottom:6px}
.empty-sub{font-size:13px;margin-bottom:20px;line-height:1.6}
.add-big{background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:12px;padding:12px 24px;color:#fff;font-weight:700;font-size:14px;box-shadow:0 4px 18px rgba(16,185,129,.44)}
.tip-box{padding:12px 14px;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.18);border-radius:10px;margin-bottom:16px;font-size:13px;color:#93c5fd;line-height:1.55}
.allow-tip{padding:10px 14px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:10px;margin-bottom:14px;font-size:13px;color:#f59e0b}
.divider{height:1px;background:#21332a;margin:4px 0 16px}
.chip{background:rgba(245,158,11,.15);color:#f59e0b;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700}
.emp-meta{font-size:11px;color:#3d5449;margin-top:3px}
.back-btn{width:32px;height:32px;border-radius:9px;background:#141f17;border:1px solid #1c2c20;color:#6b8f7a;font-size:18px;display:flex;align-items:center;justify-content:center;margin-right:2px}

.hidden{display:none!important}
</style>

</head>
<body>
<div id="app">
  <div id="header">
    <div style="display:flex;align-items:center;gap:9px">
      <button id="back-btn" class="back-btn hidden" onclick="goBack()">‹</button>
      <div style="width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 12px rgba(16,185,129,.44)">₿</div>
      <span id="header-title" style="font-family:'Playfair Display',serif;font-size:19px;color:#e2ede8">PayRoll</span>
    </div>
    <div style="display:flex;align-items:center;gap:5px;background:#101a14;border:1px solid #1c2c20;border-radius:20px;padding:5px 8px">
      <button onclick="adjMonth(-1)" style="width:24px;height:24px;border-radius:6px;background:none;border:none;color:#6b8f7a;font-size:14px;display:flex;align-items:center;justify-content:center">‹</button>
      <span id="month-label" style="font-size:12px;color:#6b8f7a;font-weight:600;min-width:88px;text-align:center"></span>
      <button onclick="adjMonth(1)" style="width:24px;height:24px;border-radius:6px;background:none;border:none;color:#6b8f7a;font-size:14px;display:flex;align-items:center;justify-content:center">›</button>
    </div>
  </div>

  <div id="content"></div>

  <div id="nav">
    <button class="nav-btn active" id="nav-home" onclick="setScreen('home')">
      <span class="nav-icon">⬡</span>
      <span class="nav-label">Overview</span>
      <div class="nav-dot"></div>
    </button>
    <button class="nav-btn" id="nav-staff" onclick="setScreen('staff')">
      <span class="nav-icon">◎</span>
      <span class="nav-label">Staff</span>
      <div class="nav-dot"></div>
    </button>
    <button class="nav-btn" id="nav-settings" onclick="setScreen('settings')">
      <span class="nav-icon">◈</span>
      <span class="nav-label">Settings</span>
      <div class="nav-dot"></div>
    </button>
  </div>
</div>

<!-- Sheet overlay -->

<div id="sheet-overlay" class="sheet-overlay hidden" onclick="closeSheet()">
  <div class="sheet-box" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title" id="sheet-title"></span>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────
var employees = JSON.parse(localStorage.getItem('pr_emp')||'[]');
var payroll   = JSON.parse(localStorage.getItem('pr_pay')||'{}');
var screen    = 'home';
var selId     = null;
var now       = new Date();
var curYear   = now.getFullYear();
var curMonth  = now.getMonth()+1;
var MONTHS    = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var DAILY     = 10;

// ── Persist ────────────────────────────────────────────────────
function saveEmp(){localStorage.setItem('pr_emp',JSON.stringify(employees))}
function savePay(){localStorage.setItem('pr_pay',JSON.stringify(payroll))}

// ── Helpers ────────────────────────────────────────────────────
function uid(){return Math.random().toString(36).slice(2,9)}
function fmt(n){return Number(n||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2})}
function mkey(){return curYear+'-'+(curMonth<10?'0'+curMonth:curMonth)}
function getRec(id){return (payroll[id]&&payroll[id][mkey()])||{}}
function toDay(){return new Date().toISOString().slice(0,10)}
function periodLabel(){return MONTHS[curMonth-1]+' '+curYear}

function aColor(name){
  var cols=['#10b981','#6366f1','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316'];
  var h=0,s=name||'?';
  for(var i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))&0xffffffff;
  return cols[Math.abs(h)%cols.length];
}
function inits(name){
  return (name||'?').trim().split(' ').slice(0,2).map(function(w){return w[0]?w[0].toUpperCase():''}).join('');
}

function calcPay(emp,rec){
  rec=rec||{};
  var base=+(emp.baseSalary)||0, hr=+(emp.hourlyRate)||0;
  var phRate=hr||base/208;
  var hours=+(rec.hoursWorked)||0, phH=+(rec.publicHolidayHours)||0;
  var ad=+(rec.allowanceDays)||0, allow=ad*DAILY;
  var adv=(rec.advances||[]).reduce(function(s,a){return s+(+(a.amount)||0)},0);
  var gross=emp.payType==='monthly'?base:0;
  if(hours>0) gross+=hours*hr;
  if(phH>0) gross+=phH*phRate*2;
  gross+=allow;
  return {gross:gross,advances:adv,net:gross-adv,allowance:allow,allowDays:ad,phRate:phRate};
}

function avatarHTML(name,size){
  size=size||42;
  var bg=aColor(name), r=Math.round(size*.27);
  return '<div class="avatar" style="width:'+size+'px;height:'+size+'px;border-radius:'+r+'px;background:'+bg+'1e;border:1.5px solid '+bg+'44;font-size:'+Math.round(size*.38)+'px;color:'+bg+'">'+inits(name)+'</div>';
}

// ── Month nav ──────────────────────────────────────────────────
function adjMonth(dir){
  var d=new Date(curYear,curMonth-1+dir);
  curYear=d.getFullYear(); curMonth=d.getMonth()+1;
  document.getElementById('month-label').textContent=MONTHS[curMonth-1].slice(0,3)+' '+curYear;
  render();
}

// ── Screen ─────────────────────────────────────────────────────
function setScreen(s){
  screen=s; selId=null;
  document.getElementById('back-btn').classList.add('hidden');
  document.getElementById('header-title').textContent='PayRoll';
  ['home','staff','settings'].forEach(function(n){
    document.getElementById('nav-'+n).classList.toggle('active',n===s);
  });
  render();
}
function goBack(){setScreen('home')}
function openDetail(id){
  selId=id; screen='detail';
  var emp=employees.find(function(e){return e.id===id;});
  document.getElementById('header-title').textContent=emp?emp.name.split(' ')[0]:'';
  document.getElementById('back-btn').classList.remove('hidden');
  ['home','staff','settings'].forEach(function(n){
    document.getElementById('nav-'+n).classList.toggle('active',n==='home');
  });
  render();
}

// ── Sheet ──────────────────────────────────────────────────────
function openSheet(title,html){
  document.getElementById('sheet-title').textContent=title;
  document.getElementById('sheet-body').innerHTML=html;
  document.getElementById('sheet-overlay').classList.remove('hidden');
}
function closeSheet(){
  document.getElementById('sheet-overlay').classList.add('hidden');
}

// ── Render ─────────────────────────────────────────────────────
function render(){
  var c=document.getElementById('content');
  if(screen==='home') c.innerHTML=renderHome();
  else if(screen==='staff') c.innerHTML=renderStaff();
  else if(screen==='detail') c.innerHTML=renderDetail();
  else if(screen==='settings') c.innerHTML=renderSettings();
}

// ── HOME ───────────────────────────────────────────────────────
function renderHome(){
  var totalGross=0,totalAdv=0,totalNet=0,paidCount=0;
  employees.forEach(function(e){
    var p=calcPay(e,getRec(e.id));
    totalGross+=p.gross; totalAdv+=p.advances; totalNet+=p.net;
    if(getRec(e.id).status==='paid') paidCount++;
  });
  var html='<div class="ani">';
  html+='<div class="hero">';
  html+='<div class="hero-circle1"></div><div class="hero-circle2"></div>';
  html+='<div class="hero-content">';
  html+='<div class="hero-sub">Net Payroll · '+periodLabel()+'</div>';
  html+='<div class="hero-amount">RM '+fmt(totalNet)+'</div>';
  html+='<div class="hero-stats">';
  html+='<div class="hero-stat"><div class="hero-stat-l">Gross</div><div class="hero-stat-v">RM '+fmt(totalGross)+'</div></div>';
  html+='<div class="hero-stat"><div class="hero-stat-l">Advances</div><div class="hero-stat-v" style="color:#fca5a5">RM '+fmt(totalAdv)+'</div></div>';
  html+='<div class="hero-stat"><div class="hero-stat-l">Paid</div><div class="hero-stat-v">'+paidCount+'/'+employees.length+'</div></div>';
  html+='</div></div></div>';

  html+='<div class="section-row"><span style="font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#6b8f7a;font-weight:600">Staff · '+periodLabel()+'</span><button class="see-all" onclick="setScreen(\'staff\')">See All ›</button></div>';
  html+='<div style="padding:10px 14px 0">';

  if(employees.length===0){

// ── ACTIONS ────────────────────────────────────────────────────
function togglePaid(){
  var r=getRec(selId);
  if(!payroll[selId]) payroll[selId]={};
  if(!payroll[selId][mkey()]) payroll[selId][mkey()]={};
  payroll[selId][mkey()].status=r.status==='paid'?'pending':'paid';
  savePay(); render();
}
function removeAdvance(aid){
  var r=getRec(selId);
  if(!payroll[selId]) return;
  if(!payroll[selId][mkey()]) return;
  payroll[selId][mkey()].advances=(r.advances||[]).filter(function(a){return a.id!==aid;});
  savePay(); render();
}
function doPrintSlip(){
  var emp=employees.find(function(e){return e.id===selId;});
  if(emp) printSlip(emp,getRec(selId),curYear,curMonth);
}
function downloadBackup(){
  var data={version:1,exportedAt:new Date().toISOString(),employees:employees,payroll:payroll};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='payroll-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}
function handleRestore(input){
  var file=input.files&&input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var msg=document.getElementById('restore-msg'); if(!msg) return;
    try{
      var data=JSON.parse(ev.target.result);
      if(!data.employees||!data.payroll) throw new Error('bad');
      employees=data.employees; payroll=data.payroll; saveEmp(); savePay();
      msg.innerHTML='<div class="restore-msg ok">✅ Restored '+data.employees.length+' employee'+(data.employees.length!==1?'s':'')+' successfully. <button onclick="this.parentNode.remove()" style="background:none;border:none;color:inherit;font-size:16px;cursor:pointer;opacity:.6">✕</button></div>';
      render();
    }catch(e){
      msg.innerHTML='<div class="restore-msg err">❌ Invalid file. Please use a PayRoll .json backup. <button onclick="this.parentNode.remove()" style="background:none;border:none;color:inherit;font-size:16px;cursor:pointer;opacity:.6">✕</button></div>';
    }
  };
  reader.readAsText(file); input.value='';
}

// ── PRINT SLIP ─────────────────────────────────────────────────
function printSlip(emp,rec,year,month){
  var p=calcPay(emp,rec), hr=+(emp.hourlyRate)||0, period=MONTHS[month-1]+' '+year;
  var w=window.open('','_blank');
  if(!w){alert('Please allow popups to print the slip.');return;}
  var rows='';
  if(emp.payType==='monthly') rows+='<div class="row"><span class="lb">Base Monthly Salary</span><span class="vl">RM '+fmt(emp.baseSalary)+'</span></div>';
  if(+(rec.hoursWorked)>0) rows+='<div class="row"><span class="lb">'+(emp.payType==='hourly'?'Regular':'Extra')+' Hours ('+rec.hoursWorked+'h × RM '+fmt(hr)+')</span><span class="vl">RM '+fmt((+(rec.hoursWorked))*hr)+'</span></div>';
  if(+(rec.publicHolidayHours)>0) rows+='<div class="row"><span class="lb">Public Holiday ('+rec.publicHolidayHours+'h × 2×)</span><span class="vl" style="color:#0891b2">RM '+fmt((+(rec.publicHolidayHours))*p.phRate*2)+'</span></div>';
  if(p.allowDays>0) rows+='<div class="row"><span class="lb"><span style="background:#fef3c7;color:#92400e;border-radius:4px;padding:2px 6px;font-size:10px;font-weight:600;margin-right:6px">ALLOWANCE</span>Daily ('+p.allowDays+' days × RM10)</span><span class="vl" style="color:#d97706">RM '+fmt(p.allowance)+'</span></div>';
  var deductRows='';

  w.document.write('<!DOCTYPE html><html><head><title>Pay Slip</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:\'Plus Jakarta Sans\',sans-serif;background:#f8f7f4;color:#1a1a1a;padding:32px;max-width:600px;margin:auto;-webkit-print-color-adjust:exact;print-color-adjust:exact}.top{background:linear-gradient(135deg,#064e3b,#047857);color:#fff;padding:28px;border-radius:16px;margin-bottom:20px;position:relative;overflow:hidden}.top::before{content:\'\';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.06)}.badge{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 12px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}.co{font-family:\'Playfair Display\',serif;font-size:26px;margin-bottom:3px}.per{font-size:13px;opacity:.7}.er{display:flex;align-items:center;gap:14px;margin-top:18px;padding-top:18px;border-top:1px solid rgba(255,255,255,.15)}.av{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}.en{font-family:\'Playfair Display\',serif;font-size:19px;margin-bottom:2px}.es{font-size:12px;opacity:.65}section{background:#fff;border-radius:12px;padding:18px 20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}.st{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:#6b7280;margin-bottom:12px;font-weight:600}.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:13.5px}.row:last-child{border:none}.lb{color:#4b5563}.vl{font-weight:600}.gb{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:10px}.gb .lb{font-size:13px;color:#166534;font-weight:600}.gb .vl{font-family:\'Playfair Display\',serif;font-size:24px;color:#14532d}.nb{background:linear-gradient(135deg,#064e3b,#047857);color:#fff;border-radius:12px;padding:20px 24px;display:flex;justify-content:space-between;align-items:center}.nb .lb{font-size:13px;opacity:.75}.nb .vl{font-family:\'Playfair Display\',serif;font-size:32px}.ft{text-align:center;font-size:11px;color:#9ca3af;margin-top:22px;padding-top:14px;border-top:1px solid #e5e7eb}.sr{display:flex;justify-content:space-around;margin-top:28px}.sl{width:140px;border-top:1px solid #d1d5db;margin-bottom:6px}.sl2{font-size:11px;color:#9ca3af;text-align:center}.pb{display:block;width:100%;background:#064e3b;color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-top:20px;font-family:inherit}@media print{.pb{display:none}}</style></head><body>');
