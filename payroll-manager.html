<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayRoll</title>
<style>
body{background:#0a110e;color:#e0ede7;font-family:-apple-system,sans-serif;padding:20px}
.btn{background:#10b981;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;width:100%;margin-bottom:12px;cursor:pointer}
.card{background:#0f1a12;border:1px solid #1a2d22;border-radius:14px;padding:16px;margin-bottom:12px}
input{width:100%;background:#141f17;border:1.5px solid #21332a;border-radius:9px;padding:12px;color:#e0ede7;font-size:15px;margin-bottom:10px;box-sizing:border-box}
</style>
</head>
<body>
<h2 style="color:#10b981;margin-bottom:20px">PayRoll Manager</h2>
<div id="app"></div>

<script>
var emps = [];
try { var s = localStorage.getItem('emps'); if(s) emps = JSON.parse(s); } catch(e) {}

function save() { try { localStorage.setItem('emps', JSON.stringify(emps)); } catch(e) {} }

function fmt(n) {
  return (parseFloat(n)||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function draw() {
  var app = document.getElementById('app');
  var h = '';

  h += '<button class="btn" onclick="showAdd()">+ Add Employee</button>';

  for (var i = 0; i < emps.length; i++) {
    var e = emps[i];
    h += '<div class="card">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
    h += '<div><div style="font-size:16px;font-weight:700">' + e.name + '</div>';
    h += '<div style="font-size:12px;color:#6b8f7a">' + (e.pos||'-') + '</div></div>';
    h += '<button onclick="delEmp('+i+')" style="background:rgba(248,113,113,.15);border:none;border-radius:8px;padding:6px 12px;color:#f87171;cursor:pointer;font-size:12px;font-weight:700">Remove</button>';
    h += '</div>';
    h += '<div style="font-size:13px;color:#6b8f7a">Base: RM ' + fmt(e.base) + '/month</div>';
    h += '</div>';
  }

  if (emps.length === 0) {
    h += '<div style="text-align:center;padding:30px;color:#3d5449">No employees yet. Add one above.</div>';
  }

  app.innerHTML = h;
}

function showAdd() {
  var app = document.getElementById('app');
  app.innerHTML = '<div class="card">' +
    '<div style="font-size:16px;font-weight:700;margin-bottom:14px">New Employee</div>' +
    '<input id="nn" placeholder="Full Name">' +
    '<input id="np" placeholder="Position">' +
    '<input id="nb" type="number" placeholder="Monthly Salary (RM)">' +
    '<button class="btn" onclick="addEmp()">Save Employee</button>' +
    '<button onclick="draw()" style="width:100%;background:none;border:1.5px solid #21332a;color:#6b8f7a;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer">Cancel</button>' +
    '</div>';
}

function addEmp() {
  var name = document.getElementById('nn').value.trim();
  if (!name) return;
  emps.push({
    name: name,
    pos: document.getElementById('np').value.trim(),
    base: document.getElementById('nb').value
  });
  save();
  draw();
}

function delEmp(i) {
  emps.splice(i, 1);
  save();
  draw();
}

draw();
</script>

</body>
</html>
