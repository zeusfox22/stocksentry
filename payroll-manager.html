<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PayRoll</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a110e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e0ede7;min-height:100vh}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,select{font-family:inherit;font-size:15px}
.wrap{max-width:430px;margin:0 auto;position:relative}
.hdr{position:sticky;top:0;z-index:50;background:#0c1610;border-bottom:1px solid #1a2d22;padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
.hdr-l{display:flex;align-items:center;gap:9px}
.logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700;flex-shrink:0}
.title{font-size:18px;font-weight:700;color:#e0ede7}
.back{width:30px;height:30px;border-radius:8px;background:#141f17;border:1px solid #1a2d22;color:#6b8f7a;font-size:17px;display:none;align-items:center;justify-content:center;flex-shrink:0}
.mnav{display:flex;align-items:center;gap:3px;background:#0f1a12;border:1px solid #1a2d22;border-radius:18px;padding:4px 7px}
.mnav button{width:22px;height:22px;color:#6b8f7a;font-size:13px;display:flex;align-items:center;justify-content:center}
.mlbl{font-size:11px;color:#6b8f7a;font-weight:600;min-width:78px;text-align:center}
.page{padding:0 0 90px}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0c1610;border-top:1px solid #1a2d22;display:flex;z-index:50}
.nb{flex:1;padding:10px 8px 14px;display:flex;flex-direction:column;align-items:center;gap:3px;color:#3d5449;border:none;background:none}
.nb.on{color:#10b981}
.nb-i{font-size:20px}
.nb-l{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase}
.nb-bar{width:0;height:2px;background:#10b981;border-radius:1px;transition:width .2s}
.nb.on .nb-bar{width:16px}
.hero{margin:12px;background:linear-gradient(140deg,#064e3b,#047857);border-radius:18px;padding:20px;position:relative;overflow:hidden}
.hero-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.5);margin-bottom:3px;font-weight:600}
.hero-num{font-size:34px;font-weight:700;color:#fff;margin-bottom:14px}
.hero-row{display:flex;background:rgba(255,255,255,.08);border-radius:11px;overflow:hidden}
.hc{flex:1;padding:9px 10px;border-left:1px solid rgba(255,255,255,.1)}
.hc:first-child{border:none}
.hc-l{font-size:9px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:2px}
.hc-v{font-size:13px;font-weight:700}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 12px 8px}
.sec-l{font-size:10px;text-transform:uppercase;letter-spacing:.11em;color:#6b8f7a;font-weight:600}
.sec-btn{font-size:12px;color:#10b981;font-weight:600}
.ecard{background:#0f1a12;border:1px solid #1a2d22;border-radius:15px;padding:13px;margin:0 12px 9px;cursor:pointer;display:block;width:calc(100% - 24px)}
.ecard:active{background:#141f17}
.et{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ename{font-size:15px;font-weight:700;color:#e0ede7}
.epos{font-size:12px;color:#6b8f7a;margin-top:1px}
.sbadge{border-radius:14px;padding:3px 9px;font-size:11px;font-weight:600;flex-shrink:0}
.spaid{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.22)}
.spend{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.22)}
.sgrid{display:grid;gap:6px}
.stat{background:#141f17;border-radius:8px;padding:8px 10px}
.st-l{font-size:9px;color:#3d5449;text-transform:uppercase;margin-bottom:2px}
.st-v{font-size:13px;font-weight:700;color:#e0ede7}
.statg{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.12)}
.statg .st-l{color:rgba(52,211,153,.4)}
.statg .st-v{color:#10b981}
.statr .st-v{color:#f87171}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:14px}
.card{background:#0f1a12;border:1px solid #1a2d22;border-radius:16px;margin:9px 12px 0;overflow:hidden;padding:15px 16px}
.clbl{font-size:10px;text-transform:uppercase;letter-spacing:.11em;color:#6b8f7a;font-weight:600;margin-bottom:12px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a2d22}
.prow:last-child{border:none}
.pl{font-size:14px;color:#6b8f7a}
.pv{font-size:14px;font-weight:600;color:#e0ede7}
.grossr{display:flex;justify-content:space-between;align-items:center;padding:10px 0 0}
.grossv{font-size:20px;font-weight:700;color:#f59e0b}
.netbox{margin:9px 12px 0;background:linear-gradient(140deg,#064e3b,#047857);border-radius:16px;padding:18px;display:flex;justify-content:space-between;align-items:center}
.net-l{font-size:10px;text-transform:uppercase;letter-spacing:.11em;color:rgba(255,255,255,.5);margin-bottom:3px;font-weight:600}
.net-v{font-size:30px;font-weight:700;color:#fff}
.net-s{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px}
.net-ico{width:44px;height:44px;border-radius:11px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:20px}
.btns{margin:9px 12px 0;display:flex;flex-direction:column;gap:8px}
.b2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{width:100%;padding:13px;border-radius:11px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:inherit}
.btn:active{opacity:.75}
.bgrn{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.bgld{background:linear-gradient(135deg,#f59e0b,#d97706);color:#111}
.bred{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.bghost{background:transparent;color:#6b8f7a;border:1.5px solid #21332a}
.bsred{background:rgba(248,113,113,.09);color:#f87171;border:1.5px solid rgba(248,113,113,.2)}
.prof{margin:12px;background:#0d201a;border:1px solid #1a2d22;border-radius:16px;padding:16px}
.prof-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:13px}
.prof-name{font-size:20px;font-weight:700;color:#e0ede7;line-height:1.2}
.prof-pos{font-size:13px;color:#6b8f7a;margin-top:3px}
.prof-meta{font-size:11px;color:#3d5449;margin-top:3px}
.pact-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.pact{border-radius:10px;padding:10px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;border:none;font-family:inherit}
.pact-def{background:#141f17;border:1px solid #21332a;color:#e0ede7}
.pact-red{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.18);color:#f87171}
.arow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #1a2d22}
.arow:last-child{border:none}
.adel{width:26px;height:26px;border-radius:50%;background:rgba(248,113,113,.09);border:none;color:#f87171;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;flex-direction:column;justify-content:flex-end}
.overlay.open{display:flex}
.sheet{background:#0f1a12;border-radius:20px 20px 0 0;max-height:90vh;overflow-y:auto}
.sh-handle{width:34px;height:3px;background:#21332a;border-radius:2px;margin:12px auto 0}
.sh-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 18px 0}
.sh-ttl{font-size:18px;font-weight:700;color:#e0ede7}
.sh-x{width:30px;height:30px;border-radius:50%;background:#141f17;border:1px solid #1a2d22;color:#6b8f7a;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.sh-body{padding:14px 18px 32px}
.field{margin-bottom:14px}
.flbl{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#6b8f7a;font-weight:600;margin-bottom:6px}
.inp{width:100%;background:#141f17;border:1.5px solid #21332a;border-radius:10px;padding:12px 13px;color:#e0ede7;font-size:15px;font-family:inherit}
.inp:focus{outline:none;border-color:#10b981}
select.inp{cursor:pointer}
.tip{padding:10px 12px;border-radius:9px;font-size:12px;line-height:1.5;margin-bottom:12px}
.tipb{background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.15);color:#93c5fd}
.tipg{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.15);color:#f59e0b}
.tipm{background:#141f17;font-size:11px;color:#3d5449;padding:9px 11px;border-radius:8px;margin-bottom:12px}
.divider{height:1px;background:#21332a;margin:4px 0 14px}
.chip{background:rgba(245,158,11,.14);color:#f59e0b;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700}
.emini{display:flex;align-items:center;gap:9px;padding:9px 12px;background:#141f17;border-radius:10px;margin-bottom:16px}
.scard{background:#0f1a12;border:1px solid #1a2d22;border-radius:16px;overflow:hidden;margin-bottom:11px}
.scard-h{padding:14px 16px;border-bottom:1px solid #1a2d22}
.scard-t{font-size:10px;text-transform:uppercase;letter-spacing:.11em;color:#6b8f7a;font-weight:600;margin-bottom:3px}
.scard-d{font-size:12px;color:#3d5449;line-height:1.5}
.srow{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.sbtnG{background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:10px;padding:10px 16px;color:#fff;font-weight:700;font-size:12px;flex-shrink:0;cursor:pointer;font-family:inherit}
.sbtnB{background:rgba(96,165,250,.09);border:1px solid rgba(96,165,250,.22);border-radius:10px;padding:10px 16px;color:#60a5fa;font-weight:700;font-size:12px;flex-shrink:0;cursor:pointer;display:inline-block;font-family:inherit}
.rmsg{margin:0 16px 14px;padding:10px 13px;border-radius:9px;font-size:12px}
.rmsgOK{background:rgba(16,185,129,.09);border:1px solid rgba(16,185,129,.22);color:#10b981}
.rmsgER{background:rgba(248,113,113,.09);border:1px solid rgba(248,113,113,.22);color:#f87171}
.abrow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a2d22}
.abrow:last-child{border:none}
.empty{text-align:center;padding:40px 20px;color:#3d5449}
.allow-badge{background:rgba(245,158,11,.14);color:#f59e0b;border-radius:4px;padding:2px 6px;font-size:9px;font-weight:700;margin-right:5px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-l">
      <button class="back" id="backBtn" onclick="PR.back()">&#8249;</button>
      <div class="logo">&#8383;</div>
      <span class="title" id="hdrTitle">PayRoll</span>
    </div>
    <div class="mnav">
      <button onclick="PR.adjM(-1)">&#8249;</button>
      <span class="mlbl" id="mLbl"></span>
      <button onclick="PR.adjM(1)">&#8250;</button>
    </div>
  </div>
  <div id="page" class="page">Loading...</div>
  <div class="bnav">
    <button class="nb on" id="nb-home" onclick="PR.go('home')">
      <span class="nb-i">&#8862;</span><span class="nb-l">Overview</span><div class="nb-bar"></div>
    </button>
    <button class="nb" id="nb-staff" onclick="PR.go('staff')">
      <span class="nb-i">&#9689;</span><span class="nb-l">Staff</span><div class="nb-bar"></div>
    </button>
    <button class="nb" id="nb-settings" onclick="PR.go('settings')">
      <span class="nb-i">&#9672;</span><span class="nb-l">Settings</span><div class="nb-bar"></div>
    </button>
  </div>
</div>
<div class="overlay" id="overlay" onclick="PR.closeSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sh-handle"></div>
    <div class="sh-hdr">
      <span class="sh-ttl" id="shTitle"></span>
      <button class="sh-x" onclick="PR.closeSheet()">&#10005;</button>
    </div>
    <div class="sh-body" id="shBody"></div>
  </div>
</div>

<script>
window.PR = (function() {
  var COLORS = ['#10b981','#6366f1','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316'];
  var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var emps = [], pays = {};
  var screen = 'home', selId = null;
  var now = new Date(), cY = now.getFullYear(), cM = now.getMonth() + 1;

  // storage
  function load() {
    try { var e = localStorage.getItem('pr_e'); if(e) emps = JSON.parse(e); } catch(x){}
    try { var p = localStorage.getItem('pr_p'); if(p) pays = JSON.parse(p); } catch(x){}
  }
  function sE() { try { localStorage.setItem('pr_e', JSON.stringify(emps)); } catch(x){} }
  function sP() { try { localStorage.setItem('pr_p', JSON.stringify(pays)); } catch(x){} }

  // helpers
  function uid() { return Math.random().toString(36).slice(2,9); }
  function fmt(n) {
    var v = parseFloat(n) || 0;
    var s = v.toFixed(2);
    var parts = s.split('.');
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return parts.join('.');
  }
  function mk() { return cY + '-' + (cM < 10 ? '0' + cM : cM); }
  function rec(id) { return (pays[id] && pays[id][mk()]) || {}; }
  function today() { return new Date().toISOString().slice(0,10); }
  function per() { return MONTHS[cM-1] + ' ' + cY; }
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function aclr(n) {
    var h = 0, s = n || '?';
    for (var i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) & 0xffffffff;
    return COLORS[Math.abs(h) % COLORS.length];
  }
  function init(n) {
    return (n||'?').trim().split(' ').slice(0,2).map(function(w){ return w[0] ? w[0].toUpperCase() : ''; }).join('');
  }
  function avHTML(name, sz) {
    sz = sz || 40;
    var c = aclr(name), r = Math.round(sz * .27);
    return '<div class="av" style="width:'+sz+'px;height:'+sz+'px;border-radius:'+r+'px;background:'+c+'1a;border:1.5px solid '+c+'38;color:'+c+';font-size:'+Math.round(sz*.37)+'px">'+init(name)+'</div>';
  }
  function calcP(e, r) {
    r = r || {};
    var base = parseFloat(e.baseSalary) || 0;
    var hr = parseFloat(e.hourlyRate) || 0;
    var phR = hr || base / 208;
    var h = parseFloat(r.hoursWorked) || 0;
    var ph = parseFloat(r.publicHolidayHours) || 0;
    var ad = parseFloat(r.allowanceDays) || 0;
    var al = ad * 10;
    var adv = (r.advances || []).reduce(function(s,a){ return s + (parseFloat(a.amount)||0); }, 0);
    var g = e.payType === 'monthly' ? base : 0;
    if (h > 0) g += h * hr;
    if (ph > 0) g += ph * phR * 2;
    g += al;
    return { gross: g, adv: adv, net: g - adv, allow: al, ad: ad, phR: phR };
  }

  // nav
  function updNav() {
    document.getElementById('mLbl').textContent = MONTHS[cM-1].slice(0,3) + ' ' + cY;
    ['home','staff','settings'].forEach(function(n) {
      var el = document.getElementById('nb-' + n);
      if (el) el.className = 'nb' + (n === screen || (n === 'home' && screen === 'detail') ? ' on' : '');
    });
    var bb = document.getElementById('backBtn');
    if (bb) bb.style.display = screen === 'detail' ? 'flex' : 'none';
    var ht = document.getElementById('hdrTitle');
    if (ht) {
      if (screen === 'detail' && selId) {
        var e = emps.filter(function(x){ return x.id === selId; })[0];
        ht.textContent = e ? e.name.split(' ')[0] : 'PayRoll';
      } else {
        ht.textContent = 'PayRoll';
      }
    }
  }

  function render() {
    var pg = document.getElementById('page');
    if (!pg) return;
    try {
      var html = '';
      if (screen === 'home') html = renderHome();
      else if (screen === 'staff') html = renderStaff();
      else if (screen === 'detail') html = renderDetail();
      else if (screen === 'settings') html = renderSettings();
      pg.innerHTML = html;
    } catch(err) {
      pg.innerHTML = '<div style="padding:20px;color:#f87171;font-size:13px">Error: ' + esc(err.message) + '</div>';
    }
    updNav();
  }

  function renderHome() {
    var tG=0,tA=0,tN=0,tP=0;
    for (var i=0;i<emps.length;i++) {
      var p = calcP(emps[i], rec(emps[i].id));
      tG+=p.gross; tA+=p.adv; tN+=p.net;
      if (rec(emps[i].id).status==='paid') tP++;
    }
    var h = '<div class="hero">';
    h += '<div class="hero-lbl">Net Payroll &middot; '+per()+'</div>';
    h += '<div class="hero-num">RM '+fmt(tN)+'</div>';
    h += '<div class="hero-row">';
    h += '<div class="hc"><div class="hc-l">Gross</div><div class="hc-v">RM '+fmt(tG)+'</div></div>';
    h += '<div class="hc"><div class="hc-l">Advances</div><div class="hc-v" style="color:#fca5a5">RM '+fmt(tA)+'</div></div>';
    h += '<div class="hc"><div class="hc-l">Paid</div><div class="hc-v">'+tP+'/'+emps.length+'</div></div>';
    h += '</div></div>';
    h += '<div class="sec-hdr"><span class="sec-l">Staff &middot; '+per()+'</span><button class="sec-btn" onclick="PR.go(\'staff\')">See All &#8250;</button></div>';
    if (emps.length === 0) {
      h += '<div class="empty"><div style="font-size:44px;margin-bottom:10px">&#128101;</div>';
      h += '<div style="font-size:17px;font-weight:700;color:#6b8f7a;margin-bottom:6px">No employees yet</div>';
      h += '<div style="font-size:13px;margin-bottom:18px">Add your first team member</div>';
      h += '<button class="btn bgrn" style="width:auto;padding:11px 22px" onclick="PR.shAddEmp()">+ Add Employee</button></div>';
    } else {
      for (var j=0;j<emps.length;j++) h += ecHTML(emps[j], j);
    }
    return h;
  }

  function ecHTML(e, i) {
    var r = rec(e.id), p = calcP(e, r), isPd = r.status === 'paid';
    var cols = p.adv > 0 ? '1fr 1fr 1fr' : '1fr 1fr';
    var h = '<button class="ecard" onclick="PR.openDetail(\''+e.id+'\')">';
    h += '<div class="et">'+avHTML(e.name,42);
    h += '<div style="flex:1;min-width:0"><div class="ename">'+esc(e.name)+'</div><div class="epos">'+esc(e.position||'&#8212;')+'</div></div>';
    h += '<div class="sbadge '+(isPd?'spaid':'spend')+'">'+(isPd?'&#10003; Paid':'Pending')+'</div></div>';
    h += '<div class="sgrid" style="grid-template-columns:'+cols+'">';
    h += '<div class="stat"><div class="st-l">Gross</div><div class="st-v">RM '+fmt(p.gross)+'</div></div>';
    if (p.adv>0) h += '<div class="stat statr"><div class="st-l">Advances</div><div class="st-v">&#8722;'+fmt(p.adv)+'</div></div>';
    h += '<div class="stat statg"><div class="st-l">Net Pay</div><div class="st-v">RM '+fmt(p.net)+'</div></div>';
    h += '</div></button>';
    return h;
  }

  function renderStaff() {
    var h = '<div style="padding:12px">';
    h += '<button class="btn bgrn" style="margin-bottom:13px;display:flex;align-items:center;justify-content:center;gap:6px" onclick="PR.shAddEmp()"><span style="font-size:18px">+</span>Add New Employee</button>';
    if (emps.length === 0) {
      h += '<div class="empty"><div style="font-size:44px;margin-bottom:9px">&#128100;</div><div style="font-size:17px;font-weight:700;color:#6b8f7a">No employees yet</div></div>';
    } else {
      for (var i=0;i<emps.length;i++) {
        var e = emps[i];
        h += '<button class="ecard" style="display:flex;align-items:center;gap:11px;border-radius:13px;margin:0 0 9px" onclick="PR.openDetail(\''+e.id+'\')">';
        h += avHTML(e.name, 45);
        h += '<div style="flex:1;min-width:0;text-align:left"><div class="ename">'+esc(e.name)+'</div><div class="epos">'+esc(e.position||'&#8212;')+'</div>';
        h += '<div style="font-size:11px;color:#3d5449;margin-top:2px">'+(e.payType==='monthly'?'RM '+fmt(e.baseSalary)+'/mo':'RM '+fmt(e.hourlyRate)+'/hr')+'</div></div>';
        h += '<span style="color:#3d5449;font-size:20px">&#8250;</span></button>';
      }
    }
    h += '</div>';
    return h;
  }

  function renderDetail() {
    var e = null;

  function togPaid() {
    if(!pays[selId])pays[selId]={};

    pays[selId][mk()].status = pays[selId][mk()].status==='paid'?'pending':'paid';
    sP(); render();

  function delAdv(aid) {
    if(!pays[selId]||!pays[selId][mk()])return;
    var r=pays[selId][mk()];
    r.advances=(r.advances||[]).filter(function(a){return a.id!==aid;});

    var e=null; for(var i=0;i<emps.length;i++)if(emps[i].id===selId){e=emps[i];break;}
    if(e) printSlip(e, rec(selId), cY, cM);

  function doBackup() {
    var d={v:1,at:new Date().toISOString(),employees:emps,payroll:pays};
    var b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    var u=URL.createObjectURL(b), a=document.createElement('a');
    a.href=u; a.download='payroll-backup-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u);
  }
  function doRestore(inp) {
    var f=inp.files&&inp.files[0]; if(!f)return;
    var rd=new FileReader();
    rd.onload=function(ev){
      var m=document.getElementById('rmsg'); if(!m)return;
      try{
        var d=JSON.parse(ev.target.result);
        if(!d.employees||!d.payroll)throw new Error('bad');
        emps=d.employees; pays=d.payroll; sE(); sP();
        m.innerHTML='<div class="rmsg rmsgOK">Restored '+emps.length+' employee'+(emps.length!==1?'s':'')+' successfully.</div>';
        render();
      }catch(e){m.innerHTML='<div class="rmsg rmsgER">Invalid backup file.</div>';}
    };
    rd.readAsText(f); inp.value='';
  }
