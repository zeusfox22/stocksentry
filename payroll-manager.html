<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayRoll</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a110e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e0ede7;min-height:100vh;overscroll-behavior:none}
input,select,button{font-family:inherit;font-size:15px}
button{cursor:pointer;border:none;background:none}
button:active{opacity:.7}
.wrap{max-width:430px;margin:0 auto;min-height:100vh;position:relative}

/* header */
.hdr{position:sticky;top:0;z-index:50;background:rgba(10,17,14,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid #1a2d22;padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:9px}
.logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;font-weight:700}
.hdr-title{font-size:18px;font-weight:700;color:#e0ede7}
.back{width:30px;height:30px;border-radius:8px;background:#141f17;border:1px solid #1a2d22;color:#6b8f7a;font-size:16px;display:none;align-items:center;justify-content:center}
.back.show{display:flex}
.mnav{display:flex;align-items:center;gap:4px;background:#0f1a12;border:1px solid #1a2d22;border-radius:18px;padding:4px 7px}
.mnav button{width:22px;height:22px;color:#6b8f7a;font-size:13px;display:flex;align-items:center;justify-content:center;border-radius:5px}
.mnav span{font-size:11px;color:#6b8f7a;font-weight:600;min-width:82px;text-align:center}

/* bottom nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(15,26,18,.97);border-top:1px solid #1a2d22;display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;padding:10px 8px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;color:#3d5449;transition:color .2s}
.bnav-btn.on{color:#10b981}
.bnav-ico{font-size:20px}
.bnav-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.bnav-bar{width:0;height:2px;background:#10b981;border-radius:1px;transition:width .2s}
.bnav-btn.on .bnav-bar{width:16px}
.bnav-btn.on .bnav-ico{filter:drop-shadow(0 0 5px #10b981)}

/* content */
.page{padding-bottom:85px;animation:fi .25s ease both}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* hero */
.hero{margin:12px 12px 0;background:linear-gradient(140deg,#064e3b,#047857);border-radius:20px;padding:20px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(6,78,59,.5)}
.hero::before{content:’’;position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.05)}
.hero-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.5);margin-bottom:3px;font-weight:600}
.hero-num{font-size:36px;font-weight:700;color:#fff;line-height:1.1;margin-bottom:14px;font-variant-numeric:tabular-nums}
.hero-row{display:flex;background:rgba(255,255,255,.08);border-radius:12px;overflow:hidden}
.hero-cell{flex:1;padding:9px 11px;border-left:1px solid rgba(255,255,255,.1)}
.hero-cell:first-child{border:none}
.hc-l{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.4);margin-bottom:2px}
.hc-v{font-size:13px;font-weight:700}

/* section header */
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 12px 8px}
.sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#6b8f7a;font-weight:600}
.sec-btn{font-size:12px;color:#10b981;font-weight:600}

/* employee card */
.ecard{background:#0f1a12;border:1px solid #1a2d22;border-radius:16px;padding:13px;margin:0 12px 9px;cursor:pointer}
.ecard:active{background:#141f17}
.ecard-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ename{font-size:15px;font-weight:700;color:#e0ede7}
.epos{font-size:12px;color:#6b8f7a;margin-top:1px}
.sbadge{border-radius:16px;padding:3px 9px;font-size:11px;font-weight:600;flex-shrink:0}
.paid{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.25)}
.pend{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.25)}
.stats-grid{display:grid;gap:6px}
.stat{background:#141f17;border-radius:9px;padding:8px 10px}
.stat-l{font-size:9px;color:#3d5449;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.stat-v{font-size:13px;font-weight:700;color:#e0ede7}
.stat.g{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.12)}
.stat.g .stat-l{color:rgba(52,211,153,.4)}
.stat.g .stat-v{color:#10b981}
.stat.r .stat-v{color:#f87171}

/* avatar */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}

/* cards */
.card{background:#0f1a12;border:1px solid #1a2d22;border-radius:18px;margin:9px 12px 0;overflow:hidden}
.card-body{padding:15px 16px}
.clbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#6b8f7a;font-weight:600;margin-bottom:12px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a2d22}
.prow:last-child{border:none}
.pl{font-size:14px;color:#6b8f7a}
.pv{font-size:14px;font-weight:600;color:#e0ede7}
.gross-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0 0}
.gross-l{font-size:15px;font-weight:700}
.gross-v{font-size:20px;font-weight:700;color:#f59e0b}

/* net box */
.netbox{margin:9px 12px 0;background:linear-gradient(140deg,#064e3b,#047857);border-radius:18px;padding:18px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 6px 24px rgba(6,78,59,.4)}
.net-l{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.5);margin-bottom:3px;font-weight:600}
.net-v{font-size:32px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums}
.net-s{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px}
.net-ico{width:46px;height:46px;border-radius:12px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:20px}

/* action buttons */
.btns{margin:9px 12px 0;display:flex;flex-direction:column;gap:8px}
.btn2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{width:100%;padding:13px;border-radius:12px;font-size:14px;font-weight:700;border:none;transition:opacity .15s}
.btn:active{opacity:.75}
.btn-grn{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 3px 16px rgba(16,185,129,.35)}
.btn-gld{background:linear-gradient(135deg,#f59e0b,#d97706);color:#111;box-shadow:0 3px 16px rgba(245,158,11,.3)}
.btn-red{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;box-shadow:0 3px 14px rgba(239,68,68,.3)}
.btn-ghost{background:transparent;color:#6b8f7a;border:1.5px solid #21332a}
.btn-soft-red{background:rgba(248,113,113,.09);color:#f87171;border:1.5px solid rgba(248,113,113,.2)}

/* profile top */
.prof{margin:12px 12px 0;background:linear-gradient(140deg,#0a1f16,#0d2a1a);border:1px solid #1a2d22;border-radius:18px;padding:18px}
.prof-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.prof-name{font-size:21px;font-weight:700;color:#e0ede7;line-height:1.2}
.prof-pos{font-size:13px;color:#6b8f7a;margin-top:3px}
.prof-meta{font-size:11px;color:#3d5449;margin-top:3px}
.prof-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.pact{border-radius:10px;padding:10px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px}
.pact-def{background:#141f17;border:1px solid #21332a;color:#e0ede7}
.pact-red{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.18);color:#f87171}

/* adv row */
.arow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #1a2d22}
.arow:last-child{border:none}
.an{font-size:14px;color:#e0ede7}
.ad{font-size:11px;color:#3d5449;margin-top:2px}
.adel{width:26px;height:26px;border-radius:50%;background:rgba(248,113,113,.09);border:none;color:#f87171;font-size:15px;display:flex;align-items:center;justify-content:center}

/* overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);display:none}
.overlay.open{display:flex}
.sheet{background:#0f1a12;border-radius:20px 20px 0 0;max-height:91vh;overflow-y:auto;animation:su .28s cubic-bezier(.3,1.1,.5,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-handle{width:36px;height:3px;background:#21332a;border-radius:2px;margin:12px auto 0}
.sh-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 18px 0}
.sh-title{font-size:19px;font-weight:700;color:#e0ede7}
.sh-close{width:30px;height:30px;border-radius:50%;background:#141f17;border:1px solid #1a2d22;color:#6b8f7a;font-size:14px;display:flex;align-items:center;justify-content:center}
.sh-body{padding:14px 18px 30px}

/* form */
.field{margin-bottom:14px}
.flbl{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.11em;color:#6b8f7a;font-weight:600;margin-bottom:6px}
.inp{width:100%;background:#141f17;border:1.5px solid #21332a;border-radius:10px;padding:12px 13px;color:#e0ede7;font-size:15px;font-family:inherit}
.inp:focus{outline:none;border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.12)}
select.inp{cursor:pointer}
.tip{padding:10px 12px;border-radius:9px;font-size:12px;line-height:1.5;margin-bottom:12px}
.tip-blue{background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.15);color:#93c5fd}
.tip-gold{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.18);color:#f59e0b}
.tip-muted{background:#141f17;border-radius:9px;padding:9px 11px;font-size:11px;color:#3d5449;line-height:1.5;margin-bottom:13px}
.divider{height:1px;background:#21332a;margin:4px 0 14px}
.chip{background:rgba(245,158,11,.14);color:#f59e0b;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700}
.emp-mini{display:flex;align-items:center;gap:9px;padding:9px 12px;background:#141f17;border-radius:10px;margin-bottom:16px}

/* settings */
.scard{background:#0f1a12;border:1px solid #1a2d22;border-radius:18px;overflow:hidden;margin-bottom:11px}
.scard-hdr{padding:14px 16px;border-bottom:1px solid #1a2d22}
.scard-title{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#6b8f7a;font-weight:600;margin-bottom:3px}
.scard-desc{font-size:12px;color:#3d5449;line-height:1.5}
.srow{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.srow-lbl{font-size:14px;font-weight:600;color:#e0ede7}
.srow-sub{font-size:11px;color:#3d5449;margin-top:2px}
.sbtn-grn{background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:10px;padding:10px 16px;color:#fff;font-weight:700;font-size:12px;flex-shrink:0;cursor:pointer}
.sbtn-blue{background:rgba(96,165,250,.09);border:1px solid rgba(96,165,250,.22);border-radius:10px;padding:10px 16px;color:#60a5fa;font-weight:700;font-size:12px;flex-shrink:0;cursor:pointer;display:inline-block}
.rmsg{margin:0 16px 14px;padding:10px 13px;border-radius:9px;font-size:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.rmsg-ok{background:rgba(16,185,129,.09);border:1px solid rgba(16,185,129,.25);color:#10b981}
.rmsg-err{background:rgba(248,113,113,.09);border:1px solid rgba(248,113,113,.25);color:#f87171}
.about-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a2d22}
.about-row:last-child{border:none}
.ak{font-size:13px;color:#6b8f7a}
.av2{font-size:13px;font-weight:600;color:#e0ede7}

/* empty */
.empty{text-align:center;padding:40px 20px;color:#3d5449}
.empty-ico{font-size:44px;margin-bottom:9px}
.empty-t{font-size:17px;font-weight:700;color:#6b8f7a;margin-bottom:5px}
.empty-s{font-size:13px;line-height:1.6;margin-bottom:18px}
.add-btn{background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:11px;padding:11px 22px;color:#fff;font-weight:700;font-size:14px;box-shadow:0 3px 14px rgba(16,185,129,.4)}
.allow-badge{background:rgba(245,158,11,.14);color:#f59e0b;border-radius:5px;padding:2px 7px;font-size:9px;font-weight:700;margin-right:6px}

.hidden{display:none!important}
</style>

</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-left">
      <button class="back" id="backBtn" onclick="goBack()">‹</button>
      <div class="logo">₿</div>
      <span class="hdr-title" id="hdrTitle">PayRoll</span>
    </div>
    <div class="mnav">
      <button onclick="adjM(-1)">‹</button>
      <span id="mLabel"></span>
      <button onclick="adjM(1)">›</button>
    </div>
  </div>

  <div id="page" class="page"></div>

  <div class="bnav">
    <button class="bnav-btn on" id="nb-home" onclick="goScreen('home')">
      <span class="bnav-ico">⊞</span>
      <span class="bnav-lbl">Overview</span>
      <div class="bnav-bar"></div>
    </button>
    <button class="bnav-btn" id="nb-staff" onclick="goScreen('staff')">
      <span class="bnav-ico">◉</span>
      <span class="bnav-lbl">Staff</span>
      <div class="bnav-bar"></div>
    </button>
    <button class="bnav-btn" id="nb-settings" onclick="goScreen('settings')">
      <span class="bnav-ico">◈</span>
      <span class="bnav-lbl">Settings</span>
      <div class="bnav-bar"></div>
    </button>
  </div>
</div>

<!-- Sheet -->

<div class="overlay" id="overlay" onclick="closeSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sh-handle"></div>
    <div class="sh-hdr">
      <span class="sh-title" id="shTitle"></span>
      <button class="sh-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="sh-body" id="shBody"></div>
  </div>
</div>

<script>
var emps = JSON.parse(localStorage.getItem('pr_e') || '[]');
var pays = JSON.parse(localStorage.getItem('pr_p') || '{}');
var screen = 'home';
var selId = null;
var now = new Date();
var cY = now.getFullYear();
var cM = now.getMonth() + 1;
var MO = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var COLORS = ['#10b981','#6366f1','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316'];

function sE(){localStorage.setItem('pr_e',JSON.stringify(emps))}
function sP(){localStorage.setItem('pr_p',JSON.stringify(pays))}
function uid(){return Math.random().toString(36).slice(2,9)}
function fmt(n){return (+n||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2})}
function mk(){return cY+'-'+(cM<10?'0'+cM:cM)}
function rec(id){return (pays[id]&&pays[id][mk()])||{}}
function today(){return new Date().toISOString().slice(0,10)}
function per(){return MO[cM-1]+' '+cY}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function aclr(n){var h=0,s=n||'?';for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xffffffff;return COLORS[Math.abs(h)%COLORS.length]}
function init(n){return (n||'?').trim().split(' ').slice(0,2).map(function(w){return w[0]?w[0].toUpperCase():''}).join('')}

function calcP(e,r){
  r=r||{};
  var base=+e.baseSalary||0, hr=+e.hourlyRate||0, phR=hr||base/208;
  var h=+r.hoursWorked||0, ph=+r.publicHolidayHours||0;
  var ad=+r.allowanceDays||0, al=ad*10;
  var adv=(r.advances||[]).reduce(function(s,a){return s+(+a.amount||0)},0);
  var g=e.payType==='monthly'?base:0;
  if(h>0)g+=h*hr; if(ph>0)g+=ph*phR*2; g+=al;
  return {gross:g,adv:adv,net:g-adv,allow:al,ad:ad,phR:phR};
}

function avHTML(name,sz){
  sz=sz||40; var c=aclr(name), r=Math.round(sz*.27);
  return '<div class="av" style="width:'+sz+'px;height:'+sz+'px;font-size:'+Math.round(sz*.37)+'px;border-radius:'+r+'px;background:'+c+'1a;border:1.5px solid '+c+'38;color:'+c+'">'+init(name)+'</div>';
}

function adjM(d){var dt=new Date(cY,cM-1+d);cY=dt.getFullYear();cM=dt.getMonth()+1;updMLabel();render()}
function updMLabel(){document.getElementById('mLabel').textContent=MO[cM-1].slice(0,3)+' '+cY}

function goScreen(s){
  screen=s; selId=null;
  document.getElementById('backBtn').classList.remove('show');
  document.getElementById('hdrTitle').textContent='PayRoll';
  ['home','staff','settings'].forEach(function(n){document.getElementById('nb-'+n).classList.toggle('on',n===s)});
  render();
}
function goBack(){goScreen('home')}
function openDetail(id){
  selId=id; screen='detail';
  var e=emps.find(function(x){return x.id===id});
  document.getElementById('hdrTitle').textContent=e?e.name.split(' ')[0]:'';
  document.getElementById('backBtn').classList.add('show');
  ['home','staff','settings'].forEach(function(n){document.getElementById('nb-'+n).classList.toggle('on',n==='home')});
  render();
}

function openSheet(title,html){
  document.getElementById('shTitle').textContent=title;
  document.getElementById('shBody').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
}
function closeSheet(){document.getElementById('overlay').classList.remove('open')}

function render(){
  var p=document.getElementById('page');
  if(screen==='home') p.innerHTML=renderHome();
  else if(screen==='staff') p.innerHTML=renderStaff();
  else if(screen==='detail') p.innerHTML=renderDetail();
  else if(screen==='settings') p.innerHTML=renderSettings();
}

function renderHome(){
  var tG=0,tA=0,tN=0,tPd=0;
  emps.forEach(function(e){var p=calcP(e,rec(e.id));tG+=p.gross;tA+=p.adv;tN+=p.net;if(rec(e.id).status==='paid')tPd++});
  var h='<div class="hero"><div class="hero-lbl">Net Payroll · '+per()+'</div><div class="hero-num">RM '+fmt(tN)+'</div>';
  h+='<div class="hero-row">';
  h+='<div class="hero-cell"><div class="hc-l">Gross</div><div class="hc-v">RM '+fmt(tG)+'</div></div>';
  h+='<div class="hero-cell"><div class="hc-l">Advances</div><div class="hc-v" style="color:#fca5a5">RM '+fmt(tA)+'</div></div>';
  h+='<div class="hero-cell"><div class="hc-l">Paid</div><div class="hc-v">'+tPd+'/'+emps.length+'</div></div>';
  h+='</div></div>';
  h+='<div class="sec-hdr"><span class="sec-lbl">Staff · '+per()+'</span><button class="sec-btn" onclick="goScreen(\'staff\')">See All ›</button></div>';
  if(emps.length===0){
    h+='<div class="empty"><div class="empty-ico">👥</div><div class="empty-t">No employees yet</div><div class="empty-s">Add your first team member</div><button class="add-btn" onclick="shAddEmp()">+ Add Employee</button></div>';
  } else {
    emps.forEach(function(e,i){h+=ecardHTML(e,i)});
  }
  return h;
}

function ecardHTML(e,i){
  var r=rec(e.id),p=calcP(e,r),isPd=r.status==='paid';
  var cols=p.adv>0?'1fr 1fr 1fr':'1fr 1fr';
  var h='<div class="ecard" style="animation-delay:'+(i*.05)+'s" onclick="openDetail(\''+e.id+'\')">';
  h+='<div class="ecard-top">'+avHTML(e.name,42)+'<div style="flex:1;min-width:0"><div class="ename">'+esc(e.name)+'</div><div class="epos">'+esc(e.position||'—')+'</div></div>';
  h+='<div class="sbadge '+(isPd?'paid':'pend')+'">'+(isPd?'✓ Paid':'Pending')+'</div></div>';
  h+='<div class="stats-grid" style="grid-template-columns:'+cols+'">';
  h+='<div class="stat"><div class="stat-l">Gross</div><div class="stat-v">RM '+fmt(p.gross)+'</div></div>';

// actions
function togPaid(){
  if(!pays[selId])pays[selId]={};
  if(!pays[selId][mk()])pays[selId][mk()]={};
  var r=pays[selId][mk()];
  r.status=r.status==='paid'?'pending':'paid';
  sP();render();
}
function delAdv(aid){
  var r=rec(selId);
  if(!pays[selId]||!pays[selId][mk()])return;
  pays[selId][mk()].advances=(r.advances||[]).filter(function(a){return a.id!==aid});
  sP();render();
}
function doPrint(){
  var e=emps.find(function(x){return x.id===selId});
  if(e)printSlip(e,rec(selId),cY,cM);
}
function doBackup(){
  var d={v:1,at:new Date().toISOString(),employees:emps,payroll:pays};
  var b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  var u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='payroll-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
}
function doRestore(inp){
  var f=inp.files&&inp.files[0];if(!f)return;
  var rd=new FileReader();
  rd.onload=function(ev){
    var m=document.getElementById('rmsg');
    try{
      var d=JSON.parse(ev.target.result);
      if(!d.employees||!d.payroll)throw 0;
      emps=d.employees;pays=d.payroll;sE();sP();
      if(m)m.innerHTML='<div class="rmsg rmsg-ok">✅ Restored '+emps.length+' employee'+(emps.length!==1?'s':'')+' successfully.</div>';
      render();
    }catch(e){if(m)m.innerHTML='<div class="rmsg rmsg-err">❌ Invalid backup file.</div>';}
  };
  rd.readAsText(f);inp.value='';
}
