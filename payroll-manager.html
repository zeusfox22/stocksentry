<!DOCTYPE html>
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PayRoll</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a110e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e0ede7;min-height:100vh}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,select{font-family:inherit;font-size:15px}
.wrap{max-width:430px;margin:0 auto;position:relative}
.hdr{position:sticky;top:0;z-index:50;background:#0c1610;border-bottom:1px solid #1a2d22;padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
.hdr-l{display:flex;align-items:center;gap:9px}
.logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700;flex-shrink:0}
.title{font-size:18px;font-weight:700;color:#e0ede7}
.back{width:30px;height:30px;border-radius:8px;background:#141f17;border:1px solid #1a2d22;color:#6b8f7a;font-size:17px;display:none;align-items:center;justify-content:center;flex-shrink:0}
.mnav{display:flex;align-items:center;gap:3px;background:#0f1a12;border:1px solid #1a2d22;border-radius:18px;padding:4px 7px}
.mnav button{width:22px;height:22px;color:#6b8f7a;font-size:13px;display:flex;align-items:center;justify-content:center}
.mlbl{font-size:11px;color:#6b8f7a;font-weight:600;min-width:78px;text-align:center}
.page{padding:0 0 90px}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0c1610;border-top:1px solid #1a2d22;display:flex;z-index:50}
.nb{flex:1;padding:10px 8px 14px;display:flex;flex-direction:column;align-items:center;gap:3px;color:#3d5449;border:none;background:none}
.nb.on{color:#10b981}
.nb-i{font-size:20px}
.nb-l{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase}
.nb-bar{width:0;height:2px;background:#10b981;border-radius:1px;transition:width .2s}
.nb.on .nb-bar{width:16px}
.hero{margin:12px;background:linear-gradient(140deg,#064e3b,#047857);border-radius:18px;padding:20px;position:relative;overflow:hidden}
.hero-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.5);margin-bottom:3px;font-weight:600}
.hero-num{font-size:34px;font-weight:700;color:#fff;margin-bottom:14px}
.hero-row{display:flex;background:rgba(255,255,255,.08);border-radius:11px;overflow:hidden}
.hc{flex:1;padding:9px 10px;border-left:1px solid rgba(255,255,255,.1)}
.hc:first-child{border:none}
.hc-l{font-size:9px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:2px}
.hc-v{font-size:13px;font-weight:700}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 12px 8px}
.sec-l{font-size:10px;text-transform:uppercase;letter-spacing:.11em;color:#6b8f7a;font-weight:600}
.sec-btn{font-size:12px;color:#10b981;font-weight:600}
.ecard{background:#0f1a12;border:1px solid #1a2d22;border-radius:15px;padding:13px;margin:0 12px 9px;cursor:pointer;display:block;width:calc(100% - 24px)}
.ecard:active{background:#141f17}
.et{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ename{font-size:15px;font-weight:700;color:#e0ede7}
.epos{font-size:12px;color:#6b8f7a;margin-top:1px}
.sbadge{border-radius:14px;padding:3px 9px;font-size:11px;font-weight:600;flex-shrink:0}
.spaid{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.22)}
.spend{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.22)}
.sgrid{display:grid;gap:6px}
.stat{background:#141f17;border-radius:8px;padding:8px 10px}
.st-l{font-size:9px;color:#3d5449;text-transform:uppercase;margin-bottom:2px}
.st-v{font-size:13px;font-weight:700;color:#e0ede7}
.statg{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.12)}
.statg .st-l{color:rgba(52,211,153,.4)}
.statg .st-v{color:#10b981}
.statr .st-v{color:#f87171}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:14px}
.card{background:#0f1a12;border:1px solid #1a2d22;border-radius:16px;margin:9px 12px 0;overflow:hidden;padding:15px 16px}
.clbl{font-size:10px;text-transform:uppercase;letter-spacing:.11em;color:#6b8f7a;font-weight:600;margin-bottom:12px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a2d22}
.prow:last-child{border:none}
.pl{font-size:14px;color:#6b8f7a}
.pv{font-size:14px;font-weight:600;color:#e0ede7}
.grossr{display:flex;justify-content:space-between;align-items:center;padding:10px 0 0}
.grossv{font-size:20px;font-weight:700;color:#f59e0b}
.netbox{margin:9px 12px 0;background:linear-gradient(140deg,#064e3b,#047857);border-radius:16px;padding:18px;display:flex;justify-content:space-between;align-items:center}
.net-l{font-size:10px;text-transform:uppercase;letter-spacing:.11em;color:rgba(255,255,255,.5);margin-bottom:3px;font-weight:600}
.net-v{font-size:30px;font-weight:700;color:#fff}
.net-s{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px}
.net-ico{width:44px;height:44px;border-radius:11px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:20px}
.btns{margin:9px 12px 0;display:flex;flex-direction:column;gap:8px}
.b2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{width:100%;padding:13px;border-radius:11px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:inherit}
.btn:active{opacity:.75}
.bgrn{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.bgld{background:linear-gradient(135deg,#f59e0b,#d97706);color:#111}
.bred{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.bghost{background:transparent;color:#6b8f7a;border:1.5px solid #21332a}
.bsred{background:rgba(248,113,113,.09);color:#f87171;border:1.5px solid rgba(248,113,113,.2)}
.prof{margin:12px;background:#0d201a;border:1px solid #1a2d22;border-radius:16px;padding:16px}
.prof-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:13px}
.prof-name{font-size:20px;font-weight:700;color:#e0ede7;line-height:1.2}
.prof-pos{font-size:13px;color:#6b8f7a;margin-top:3px}
.prof-meta{font-size:11px;color:#3d5449;margin-top:3px}
.pact-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.pact{border-radius:10px;padding:10px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;border:none;font-family:inherit}
.pact-def{background:#141f17;border:1px solid #21332a;color:#e0ede7}
.pact-red{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.18);color:#f87171}
.arow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #1a2d22}
.arow:last-child{border:none}
.adel{width:26px;height:26px;border-radius:50%;background:rgba(248,113,113,.09);border:none;color:#f87171;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;flex-direction:column;justify-content:flex-end}
.overlay.open{display:flex}
.sheet{background:#0f1a12;border-radius:20px 20px 0 0;max-height:90vh;overflow-y:auto}
.sh-handle{width:34px;height:3px;background:#21332a;border-radius:2px;margin:12px auto 0}
.sh-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 18px 0}
.sh-ttl{font-size:18px;font-weight:700;color:#e0ede7}
.sh-x{width:30px;height:30px;border-radius:50%;background:#141f17;border:1px solid #1a2d22;color:#6b8f7a;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.sh-body{padding:14px 18px 32px}
.field{margin-bottom:14px}
.flbl{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#6b8f7a;font-weight:600;margin-bottom:6px}
.inp{width:100%;background:#141f17;border:1.5px solid #21332a;border-radius:10px;padding:12px 13px;color:#e0ede7;font-size:15px;font-family:inherit}
.inp:focus{outline:none;border-color:#10b981}
select.inp{cursor:pointer}
.tip{padding:10px 12px;border-radius:9px;font-size:12px;line-height:1.5;margin-bottom:12px}
.tipb{background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.15);color:#93c5fd}
.tipg{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.15);color:#f59e0b}
.tipm{background:#141f17;font-size:11px;color:#3d5449;padding:9px 11px;border-radius:8px;margin-bottom:12px}
.divider{height:1px;background:#21332a;margin:4px 0 14px}
.chip{background:rgba(245,158,11,.14);color:#f59e0b;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700}
.emini{display:flex;align-items:center;gap:9px;padding:9px 12px;background:#141f17;border-radius:10px;margin-bottom:16px}
.scard{background:#0f1a12;border:1px solid #1a2d22;border-radius:16px;overflow:hidden;margin-bottom:11px}
.scard-h{padding:14px 16px;border-bottom:1px solid #1a2d22}
.scard-t{font-size:10px;text-transform:uppercase;letter-spacing:.11em;color:#6b8f7a;font-weight:600;margin-bottom:3px}
.scard-d{font-size:12px;color:#3d5449;line-height:1.5}
.srow{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.sbtnG{background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:10px;padding:10px 16px;color:#fff;font-weight:700;font-size:12px;flex-shrink:0;cursor:pointer;font-family:inherit}
.sbtnB{background:rgba(96,165,250,.09);border:1px solid rgba(96,165,250,.22);border-radius:10px;padding:10px 16px;color:#60a5fa;font-weight:700;font-size:12px;flex-shrink:0;cursor:pointer;display:inline-block;font-family:inherit}
.rmsg{margin:0 16px 14px;padding:10px 13px;border-radius:9px;font-size:12px}
.rmsgOK{background:rgba(16,185,129,.09);border:1px solid rgba(16,185,129,.22);color:#10b981}
.rmsgER{background:rgba(248,113,113,.09);border:1px solid rgba(248,113,113,.22);color:#f87171}
.abrow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a2d22}
.abrow:last-child{border:none}
.empty{text-align:center;padding:40px 20px;color:#3d5449}
.allow-badge{background:rgba(245,158,11,.14);color:#f59e0b;border-radius:4px;padding:2px 6px;font-size:9px;font-weight:700;margin-right:5px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-l">
      <button class="back" id="backBtn" onclick="PR.back()">&#8249;</button>
      <div class="logo">&#8383;</div>
      <span class="title" id="hdrTitle">PayRoll</span>
    </div>
    <div class="mnav">
      <button onclick="PR.adjM(-1)">&#8249;</button>
      <span class="mlbl" id="mLbl"></span>
      <button onclick="PR.adjM(1)">&#8250;</button>
    </div>
  </div>
  <div id="page" class="page">Loading...</div>
  <div class="bnav">
    <button class="nb on" id="nb-home" onclick="PR.go('home')">
      <span class="nb-i">&#8862;</span><span class="nb-l">Overview</span><div class="nb-bar"></div>
    </button>
    <button class="nb" id="nb-staff" onclick="PR.go('staff')">
      <span class="nb-i">&#9689;</span><span class="nb-l">Staff</span><div class="nb-bar"></div>
    </button>
    <button class="nb" id="nb-settings" onclick="PR.go('settings')">
      <span class="nb-i">&#9672;</span><span class="nb-l">Settings</span><div class="nb-bar"></div>
    </button>
  </div>
</div>
<div class="overlay" id="overlay" onclick="PR.closeSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sh-handle"></div>
    <div class="sh-hdr">
      <span class="sh-ttl" id="shTitle"></span>
      <button class="sh-x" onclick="PR.closeSheet()">&#10005;</button>
    </div>
    <div class="sh-body" id="shBody"></div>
  </div>
</div>

<script>
window.PR = (function() {
  var COLORS = ['#10b981','#6366f1','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316'];
  var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var emps = [], pays = {};
  var screen = 'home', selId = null;
  var now = new Date(), cY = now.getFullYear(), cM = now.getMonth() + 1;

  // storage
  function load() {
    try { var e = localStorage.getItem('pr_e'); if(e) emps = JSON.parse(e); } catch(x){}
    try { var p = localStorage.getItem('pr_p'); if(p) pays = JSON.parse(p); } catch(x){}
  }
  function sE() { try { localStorage.setItem('pr_e', JSON.stringify(emps)); } catch(x){} }
  function sP() { try { localStorage.setItem('pr_p', JSON.stringify(pays)); } catch(x){} }

  // helpers
  function uid() { return Math.random().toString(36).slice(2,9); }
  function fmt(n) {
    var v = parseFloat(n) || 0;
    var s = v.toFixed(2);
    var parts = s.split('.');
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return parts.join('.');
  }
  function mk() { return cY + '-' + (cM < 10 ? '0' + cM : cM); }
  function rec(id) { return (pays[id] && pays[id][mk()]) || {}; }
  function today() { return new Date().toISOString().slice(0,10); }
  function per() { return MONTHS[cM-1] + ' ' + cY; }
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function aclr(n) {
    var h = 0, s = n || '?';
    for (var i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) & 0xffffffff;
    return COLORS[Math.abs(h) % COLORS.length];
  }
  function init(n) {
    return (n||'?').trim().split(' ').slice(0,2).map(function(w){ return w[0] ? w[0].toUpperCase() : ''; }).join('');
  }
  function avHTML(name, sz) {
    sz = sz || 40;
    var c = aclr(name), r = Math.round(sz * .27);
    return '<div class="av" style="width:'+sz+'px;height:'+sz+'px;border-radius:'+r+'px;background:'+c+'1a;border:1.5px solid '+c+'38;color:'+c+';font-size:'+Math.round(sz*.37)+'px">'+init(name)+'</div>';
  }
  function calcP(e, r) {
    r = r || {};
    var base = parseFloat(e.baseSalary) || 0;
    var hr = parseFloat(e.hourlyRate) || 0;
    var phR = hr || base / 208;
    var h = parseFloat(r.hoursWorked) || 0;
    var ph = parseFloat(r.publicHolidayHours) || 0;
    var ad = parseFloat(r.allowanceDays) || 0;
    var al = ad * 10;
    var adv = (r.advances || []).reduce(function(s,a){ return s + (parseFloat(a.amount)||0); }, 0);
    var g = e.payType === 'monthly' ? base : 0;
    if (h > 0) g += h * hr;
    if (ph > 0) g += ph * phR * 2;
    g += al;
    return { gross: g, adv: adv, net: g - adv, allow: al, ad: ad, phR: phR };
  }

  // nav
  function updNav() {
    document.getElementById('mLbl').textContent = MONTHS[cM-1].slice(0,3) + ' ' + cY;
    ['home','staff','settings'].forEach(function(n) {
      var el = document.getElementById('nb-' + n);
      if (el) el.className = 'nb' + (n === screen || (n === 'home' && screen === 'detail') ? ' on' : '');
    });
    var bb = document.getElementById('backBtn');
    if (bb) bb.style.display = screen === 'detail' ? 'flex' : 'none';
    var ht = document.getElementById('hdrTitle');
    if (ht) {
      if (screen === 'detail' && selId) {
        var e = emps.filter(function(x){ return x.id === selId; })[0];
        ht.textContent = e ? e.name.split(' ')[0] : 'PayRoll';
      } else {
        ht.textContent = 'PayRoll';
      }
    }
  }

  function render() {
    var pg = document.getElementById('page');
    if (!pg) return;
    try {
      var html = '';
      if (screen === 'home') html = renderHome();
      else if (screen === 'staff') html = renderStaff();
      else if (screen === 'detail') html = renderDetail();
      else if (screen === 'settings') html = renderSettings();
      pg.innerHTML = html;
    } catch(err) {
      pg.innerHTML = '<div style="padding:20px;color:#f87171;font-size:13px">Error: ' + esc(err.message) + '</div>';
    }
    updNav();
  }

  function renderHome() {
    var tG=0,tA=0,tN=0,tP=0;
    for (var i=0;i<emps.length;i++) {
      var p = calcP(emps[i], rec(emps[i].id));
      tG+=p.gross; tA+=p.adv; tN+=p.net;
      if (rec(emps[i].id).status==='paid') tP++;
    }
    var h = '<div class="hero">';
    h += '<div class="hero-lbl">Net Payroll &middot; '+per()+'</div>';
    h += '<div class="hero-num">RM '+fmt(tN)+'</div>';
    h += '<div class="hero-row">';
    h += '<div class="hc"><div class="hc-l">Gross</div><div class="hc-v">RM '+fmt(tG)+'</div></div>';
    h += '<div class="hc"><div class="hc-l">Advances</div><div class="hc-v" style="color:#fca5a5">RM '+fmt(tA)+'</div></div>';
    h += '<div class="hc"><div class="hc-l">Paid</div><div class="hc-v">'+tP+'/'+emps.length+'</div></div>';
    h += '</div></div>';
    h += '<div class="sec-hdr"><span class="sec-l">Staff &middot; '+per()+'</span><button class="sec-btn" onclick="PR.go(\'staff\')">See All &#8250;</button></div>';
    if (emps.length === 0) {
      h += '<div class="empty"><div style="font-size:44px;margin-bottom:10px">&#128101;</div>';
      h += '<div style="font-size:17px;font-weight:700;color:#6b8f7a;margin-bottom:6px">No employees yet</div>';
      h += '<div style="font-size:13px;margin-bottom:18px">Add your first team member</div>';
      h += '<button class="btn bgrn" style="width:auto;padding:11px 22px" onclick="PR.shAddEmp()">+ Add Employee</button></div>';
    } else {
      for (var j=0;j<emps.length;j++) h += ecHTML(emps[j], j);
    }
    return h;
  }

  function ecHTML(e, i) {
    var r = rec(e.id), p = calcP(e, r), isPd = r.status === 'paid';
    var cols = p.adv > 0 ? '1fr 1fr 1fr' : '1fr 1fr';
    var h = '<button class="ecard" onclick="PR.openDetail(\''+e.id+'\')">';
    h += '<div class="et">'+avHTML(e.name,42);
    h += '<div style="flex:1;min-width:0"><div class="ename">'+esc(e.name)+'</div><div class="epos">'+esc(e.position||'&#8212;')+'</div></div>';
    h += '<div class="sbadge '+(isPd?'spaid':'spend')+'">'+(isPd?'&#10003; Paid':'Pending')+'</div></div>';
    h += '<div class="sgrid" style="grid-template-columns:'+cols+'">';
    h += '<div class="stat"><div class="st-l">Gross</div><div class="st-v">RM '+fmt(p.gross)+'</div></div>';
    if (p.adv>0) h += '<div class="stat statr"><div class="st-l">Advances</div><div class="st-v">&#8722;'+fmt(p.adv)+'</div></div>';
    h += '<div class="stat statg"><div class="st-l">Net Pay</div><div class="st-v">RM '+fmt(p.net)+'</div></div>';
    h += '</div></button>';
    return h;
  }

  function renderStaff() {
    var h = '<div style="padding:12px">';
    h += '<button class="btn bgrn" style="margin-bottom:13px;display:flex;align-items:center;justify-content:center;gap:6px" onclick="PR.shAddEmp()"><span style="font-size:18px">+</span>Add New Employee</button>';
    if (emps.length === 0) {
      h += '<div class="empty"><div style="font-size:44px;margin-bottom:9px">&#128100;</div><div style="font-size:17px;font-weight:700;color:#6b8f7a">No employees yet</div></div>';
    } else {
      for (var i=0;i<emps.length;i++) {
        var e = emps[i];
        h += '<button class="ecard" style="display:flex;align-items:center;gap:11px;border-radius:13px;margin:0 0 9px" onclick="PR.openDetail(\''+e.id+'\')">';
        h += avHTML(e.name, 45);
        h += '<div style="flex:1;min-width:0;text-align:left"><div class="ename">'+esc(e.name)+'</div><div class="epos">'+esc(e.position||'&#8212;')+'</div>';
        h += '<div style="font-size:11px;color:#3d5449;margin-top:2px">'+(e.payType==='monthly'?'RM '+fmt(e.baseSalary)+'/mo':'RM '+fmt(e.hourlyRate)+'/hr')+'</div></div>';
        h += '<span style="color:#3d5449;font-size:20px">&#8250;</span></button>';
      }
    }
    h += '</div>';
    return h;
  }

  function renderDetail() {
    var e = null;

  function delAdv(aid) {
    if(!pays[selId]||!pays[selId][mk()])return;

  function doBackup() {
    var d={v:1,at:new Date().toISOString(),employees:emps,payroll:pays};
    var b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    var u=URL.createObjectURL(b), a=document.createElement('a');
    a.href=u; a.download='payroll-backup-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u);
  }
  function doRestore(inp) {
    var f=inp.files&&inp.files[0]; if(!f)return;
    var rd=new FileReader();
    rd.onload=function(ev){
      var m=document.getElementById('rmsg'); if(!m)return;
      try{
        var d=JSON.parse(ev.target.result);
        if(!d.employees||!d.payroll)throw new Error('bad');
        emps=d.employees; pays=d.payroll; sE(); sP();
        m.innerHTML='<div class="rmsg rmsgOK">Restored '+emps.length+' employee'+(emps.length!==1?'s':'')+' successfully.</div>';
        render();
      }catch(e){m.innerHTML='<div class="rmsg rmsgER">Invalid backup file.</div>';}
    };
    rd.readAsText(f); inp.value='';
  }

.hdr{position:sticky;top:0;z-index:50;background:rgba(10,17,14,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid #1a2d22;padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:9px}
.logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;font-weight:700}
.hdr-title{font-size:18px;font-weight:700;color:#e0ede7}
.back{width:30px;height:30px;border-radius:8px;background:#141f17;border:1px solid #1a2d22;color:#6b8f7a;font-size:16px;display:none;align-items:center;justify-content:center}
.back.show{display:flex}
.mnav{display:flex;align-items:center;gap:4px;background:#0f1a12;border:1px solid #1a2d22;border-radius:18px;padding:4px 7px}
.mnav button{width:22px;height:22px;color:#6b8f7a;font-size:13px;display:flex;align-items:center;justify-content:center;border-radius:5px}
.mnav span{font-size:11px;color:#6b8f7a;font-weight:600;min-width:82px;text-align:center}

/* bottom nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(15,26,18,.97);border-top:1px solid #1a2d22;display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;padding:10px 8px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;color:#3d5449;transition:color .2s}
.bnav-btn.on{color:#10b981}
.bnav-ico{font-size:20px}
.bnav-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.bnav-bar{width:0;height:2px;background:#10b981;border-radius:1px;transition:width .2s}
.bnav-btn.on .bnav-bar{width:16px}
.bnav-btn.on .bnav-ico{filter:drop-shadow(0 0 5px #10b981)}

/* content */
.page{padding-bottom:85px;opacity:1}

/* hero */
.hero{margin:12px 12px 0;background:linear-gradient(140deg,#064e3b,#047857);border-radius:20px;padding:20px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(6,78,59,.5)}
.hero::before{content:’’;position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.05)}
.hero-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.5);margin-bottom:3px;font-weight:600}
.hero-num{font-size:36px;font-weight:700;color:#fff;line-height:1.1;margin-bottom:14px;font-variant-numeric:tabular-nums}
.hero-row{display:flex;background:rgba(255,255,255,.08);border-radius:12px;overflow:hidden}
.hero-cell{flex:1;padding:9px 11px;border-left:1px solid rgba(255,255,255,.1)}
.hero-cell:first-child{border:none}
.hc-l{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.4);margin-bottom:2px}
.hc-v{font-size:13px;font-weight:700}

/* section header */
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 12px 8px}
.sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#6b8f7a;font-weight:600}
.sec-btn{font-size:12px;color:#10b981;font-weight:600}

/* employee card */
.ecard{background:#0f1a12;border:1px solid #1a2d22;border-radius:16px;padding:13px;margin:0 12px 9px;cursor:pointer}
.ecard:active{background:#141f17}
.ecard-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ename{font-size:15px;font-weight:700;color:#e0ede7}
.epos{font-size:12px;color:#6b8f7a;margin-top:1px}
.sbadge{border-radius:16px;padding:3px 9px;font-size:11px;font-weight:600;flex-shrink:0}
.paid{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.25)}
.pend{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.25)}
.stats-grid{display:grid;gap:6px}
.stat{background:#141f17;border-radius:9px;padding:8px 10px}
.stat-l{font-size:9px;color:#3d5449;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.stat-v{font-size:13px;font-weight:700;color:#e0ede7}
.stat.g{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.12)}
.stat.g .stat-l{color:rgba(52,211,153,.4)}
.stat.g .stat-v{color:#10b981}
.stat.r .stat-v{color:#f87171}

/* avatar */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}

/* cards */
.card{background:#0f1a12;border:1px solid #1a2d22;border-radius:18px;margin:9px 12px 0;overflow:hidden}
.card-body{padding:15px 16px}
.clbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#6b8f7a;font-weight:600;margin-bottom:12px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a2d22}
.prow:last-child{border:none}
.pl{font-size:14px;color:#6b8f7a}
.pv{font-size:14px;font-weight:600;color:#e0ede7}
.gross-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0 0}
.gross-l{font-size:15px;font-weight:700}
.gross-v{font-size:20px;font-weight:700;color:#f59e0b}

/* net box */
.netbox{margin:9px 12px 0;background:linear-gradient(140deg,#064e3b,#047857);border-radius:18px;padding:18px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 6px 24px rgba(6,78,59,.4)}
.net-l{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.5);margin-bottom:3px;font-weight:600}
.net-v{font-size:32px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums}
.net-s{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px}
.net-ico{width:46px;height:46px;border-radius:12px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:20px}

/* action buttons */
.btns{margin:9px 12px 0;display:flex;flex-direction:column;gap:8px}
.btn2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{width:100%;padding:13px;border-radius:12px;font-size:14px;font-weight:700;border:none;transition:opacity .15s}
.btn:active{opacity:.75}
.btn-grn{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 3px 16px rgba(16,185,129,.35)}
.btn-gld{background:linear-gradient(135deg,#f59e0b,#d97706);color:#111;box-shadow:0 3px 16px rgba(245,158,11,.3)}
.btn-red{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;box-shadow:0 3px 14px rgba(239,68,68,.3)}
.btn-ghost{background:transparent;color:#6b8f7a;border:1.5px solid #21332a}
.btn-soft-red{background:rgba(248,113,113,.09);color:#f87171;border:1.5px solid rgba(248,113,113,.2)}

/* profile top */
.prof{margin:12px 12px 0;background:linear-gradient(140deg,#0a1f16,#0d2a1a);border:1px solid #1a2d22;border-radius:18px;padding:18px}
.prof-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.prof-name{font-size:21px;font-weight:700;color:#e0ede7;line-height:1.2}
.prof-pos{font-size:13px;color:#6b8f7a;margin-top:3px}
.prof-meta{font-size:11px;color:#3d5449;margin-top:3px}
.prof-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.pact{border-radius:10px;padding:10px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px}
.pact-def{background:#141f17;border:1px solid #21332a;color:#e0ede7}
.pact-red{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.18);color:#f87171}

/* adv row */
.arow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #1a2d22}
.arow:last-child{border:none}
.an{font-size:14px;color:#e0ede7}
.ad{font-size:11px;color:#3d5449;margin-top:2px}
.adel{width:26px;height:26px;border-radius:50%;background:rgba(248,113,113,.09);border:none;color:#f87171;font-size:15px;display:flex;align-items:center;justify-content:center}

/* overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);display:none}
.overlay.open{display:flex}
.sheet{background:#0f1a12;border-radius:20px 20px 0 0;max-height:91vh;overflow-y:auto;animation:su .28s cubic-bezier(.3,1.1,.5,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-handle{width:36px;height:3px;background:#21332a;border-radius:2px;margin:12px auto 0}
.sh-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 18px 0}
.sh-title{font-size:19px;font-weight:700;color:#e0ede7}
.sh-close{width:30px;height:30px;border-radius:50%;background:#141f17;border:1px solid #1a2d22;color:#6b8f7a;font-size:14px;display:flex;align-items:center;justify-content:center}
.sh-body{padding:14px 18px 30px}

/* form */
.field{margin-bottom:14px}
.flbl{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.11em;color:#6b8f7a;font-weight:600;margin-bottom:6px}
.inp{width:100%;background:#141f17;border:1.5px solid #21332a;border-radius:10px;padding:12px 13px;color:#e0ede7;font-size:15px;font-family:inherit}
.inp:focus{outline:none;border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.12)}
select.inp{cursor:pointer}
.tip{padding:10px 12px;border-radius:9px;font-size:12px;line-height:1.5;margin-bottom:12px}
.tip-blue{background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.15);color:#93c5fd}
.tip-gold{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.18);color:#f59e0b}
.tip-muted{background:#141f17;border-radius:9px;padding:9px 11px;font-size:11px;color:#3d5449;line-height:1.5;margin-bottom:13px}
.divider{height:1px;background:#21332a;margin:4px 0 14px}
.chip{background:rgba(245,158,11,.14);color:#f59e0b;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700}
.emp-mini{display:flex;align-items:center;gap:9px;padding:9px 12px;background:#141f17;border-radius:10px;margin-bottom:16px}

/* settings */
.scard{background:#0f1a12;border:1px solid #1a2d22;border-radius:18px;overflow:hidden;margin-bottom:11px}
.scard-hdr{padding:14px 16px;border-bottom:1px solid #1a2d22}
.scard-title{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#6b8f7a;font-weight:600;margin-bottom:3px}
.scard-desc{font-size:12px;color:#3d5449;line-height:1.5}
.srow{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.srow-lbl{font-size:14px;font-weight:600;color:#e0ede7}
.srow-sub{font-size:11px;color:#3d5449;margin-top:2px}
.sbtn-grn{background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:10px;padding:10px 16px;color:#fff;font-weight:700;font-size:12px;flex-shrink:0;cursor:pointer}
.sbtn-blue{background:rgba(96,165,250,.09);border:1px solid rgba(96,165,250,.22);border-radius:10px;padding:10px 16px;color:#60a5fa;font-weight:700;font-size:12px;flex-shrink:0;cursor:pointer;display:inline-block}
.rmsg{margin:0 16px 14px;padding:10px 13px;border-radius:9px;font-size:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.rmsg-ok{background:rgba(16,185,129,.09);border:1px solid rgba(16,185,129,.25);color:#10b981}
.rmsg-err{background:rgba(248,113,113,.09);border:1px solid rgba(248,113,113,.25);color:#f87171}
.about-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a2d22}
.about-row:last-child{border:none}
.ak{font-size:13px;color:#6b8f7a}
.av2{font-size:13px;font-weight:600;color:#e0ede7}

/* empty */
.empty{text-align:center;padding:40px 20px;color:#3d5449}
.empty-ico{font-size:44px;margin-bottom:9px}
.empty-t{font-size:17px;font-weight:700;color:#6b8f7a;margin-bottom:5px}
.empty-s{font-size:13px;line-height:1.6;margin-bottom:18px}
.add-btn{background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:11px;padding:11px 22px;color:#fff;font-weight:700;font-size:14px;box-shadow:0 3px 14px rgba(16,185,129,.4)}
.allow-badge{background:rgba(245,158,11,.14);color:#f59e0b;border-radius:5px;padding:2px 7px;font-size:9px;font-weight:700;margin-right:6px}

.hidden{display:none!important}
</style>

</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-left">
      <button class="back" id="backBtn" onclick="goBack()">‹</button>
      <div class="logo">₿</div>
      <span class="hdr-title" id="hdrTitle">PayRoll</span>
    </div>
    <div class="mnav">
      <button onclick="adjM(-1)">‹</button>
      <span id="mLabel"></span>
      <button onclick="adjM(1)">›</button>
    </div>
  </div>

  <div id="page" class="page"></div>

  <div class="bnav">
    <button class="bnav-btn on" id="nb-home" onclick="goScreen('home')">
      <span class="bnav-ico">⊞</span>
      <span class="bnav-lbl">Overview</span>
      <div class="bnav-bar"></div>
    </button>
    <button class="bnav-btn" id="nb-staff" onclick="goScreen('staff')">
      <span class="bnav-ico">◉</span>
      <span class="bnav-lbl">Staff</span>
      <div class="bnav-bar"></div>
    </button>
    <button class="bnav-btn" id="nb-settings" onclick="goScreen('settings')">
      <span class="bnav-ico">◈</span>
      <span class="bnav-lbl">Settings</span>
      <div class="bnav-bar"></div>
    </button>
  </div>
</div>

<!-- Sheet -->

<div class="overlay" id="overlay" onclick="closeSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sh-handle"></div>
    <div class="sh-hdr">
      <span class="sh-title" id="shTitle"></span>
      <button class="sh-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="sh-body" id="shBody"></div>
  </div>
</div>

<script>
var emps = [], pays = {};
try { emps = JSON.parse(localStorage.getItem('pr_e') || '[]') || []; } catch(e) { emps = []; }
try { pays = JSON.parse(localStorage.getItem('pr_p') || '{}') || {}; } catch(e) { pays = {}; }
var screen = 'home';
var selId = null;
var now = new Date();
var cY = now.getFullYear();
var cM = now.getMonth() + 1;
var MO = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var COLORS = ['#10b981','#6366f1','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316'];

function sE(){try{localStorage.setItem('pr_e',JSON.stringify(emps))}catch(e){}}
function sP(){try{localStorage.setItem('pr_p',JSON.stringify(pays))}catch(e){}}
function uid(){return Math.random().toString(36).slice(2,9)}
function fmt(n){return (+n||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2})}
function mk(){return cY+'-'+(cM<10?'0'+cM:cM)}
function rec(id){return (pays[id]&&pays[id][mk()])||{}}
function today(){return new Date().toISOString().slice(0,10)}
function per(){return MO[cM-1]+' '+cY}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function aclr(n){var h=0,s=n||'?';for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xffffffff;return COLORS[Math.abs(h)%COLORS.length]}
function init(n){return (n||'?').trim().split(' ').slice(0,2).map(function(w){return w[0]?w[0].toUpperCase():''}).join('')}

function calcP(e,r){
  r=r||{};
  var base=+e.baseSalary||0, hr=+e.hourlyRate||0, phR=hr||base/208;
  var h=+r.hoursWorked||0, ph=+r.publicHolidayHours||0;
  var ad=+r.allowanceDays||0, al=ad*10;
  var adv=(r.advances||[]).reduce(function(s,a){return s+(+a.amount||0)},0);
  var g=e.payType==='monthly'?base:0;
  if(h>0)g+=h*hr; if(ph>0)g+=ph*phR*2; g+=al;
  return {gross:g,adv:adv,net:g-adv,allow:al,ad:ad,phR:phR};
}

function avHTML(name,sz){
  sz=sz||40; var c=aclr(name), r=Math.round(sz*.27);
  return '<div class="av" style="width:'+sz+'px;height:'+sz+'px;font-size:'+Math.round(sz*.37)+'px;border-radius:'+r+'px;background:'+c+'1a;border:1.5px solid '+c+'38;color:'+c+'">'+init(name)+'</div>';
}

function adjM(d){var dt=new Date(cY,cM-1+d);cY=dt.getFullYear();cM=dt.getMonth()+1;updMLabel();render()}
function updMLabel(){document.getElementById('mLabel').textContent=MO[cM-1].slice(0,3)+' '+cY}

function goScreen(s){
  screen=s; selId=null;
  document.getElementById('backBtn').classList.remove('show');
  document.getElementById('hdrTitle').textContent='PayRoll';
  ['home','staff','settings'].forEach(function(n){document.getElementById('nb-'+n).classList.toggle('on',n===s)});
  render();
}
function goBack(){goScreen('home')}
function openDetail(id){
  selId=id; screen='detail';
  var e=emps.find(function(x){return x.id===id});
  document.getElementById('hdrTitle').textContent=e?e.name.split(' ')[0]:'';
  document.getElementById('backBtn').classList.add('show');
  ['home','staff','settings'].forEach(function(n){document.getElementById('nb-'+n).classList.toggle('on',n==='home')});
  render();
}

function openSheet(title,html){
  document.getElementById('shTitle').textContent=title;
  document.getElementById('shBody').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
}
function closeSheet(){document.getElementById('overlay').classList.remove('open')}

function render(){
  var p=document.getElementById('page');
  if(screen==='home') p.innerHTML=renderHome();
  else if(screen==='staff') p.innerHTML=renderStaff();
  else if(screen==='detail') p.innerHTML=renderDetail();
  else if(screen==='settings') p.innerHTML=renderSettings();
}

function renderHome(){
  var tG=0,tA=0,tN=0,tPd=0;
  emps.forEach(function(e){var p=calcP(e,rec(e.id));tG+=p.gross;tA+=p.adv;tN+=p.net;if(rec(e.id).status==='paid')tPd++});
  var h='<div class="hero"><div class="hero-lbl">Net Payroll · '+per()+'</div><div class="hero-num">RM '+fmt(tN)+'</div>';
  h+='<div class="hero-row">';
  h+='<div class="hero-cell"><div class="hc-l">Gross</div><div class="hc-v">RM '+fmt(tG)+'</div></div>';
  h+='<div class="hero-cell"><div class="hc-l">Advances</div><div class="hc-v" style="color:#fca5a5">RM '+fmt(tA)+'</div></div>';
  h+='<div class="hero-cell"><div class="hc-l">Paid</div><div class="hc-v">'+tPd+'/'+emps.length+'</div></div>';
  h+='</div></div>';
  h+='<div class="sec-hdr"><span class="sec-lbl">Staff · '+per()+'</span><button class="sec-btn" onclick="goScreen(\'staff\')">See All ›</button></div>';
  if(emps.length===0){
    h+='<div class="empty"><div class="empty-ico">👥</div><div class="empty-t">No employees yet</div><div class="empty-s">Add your first team member</div><button class="add-btn" onclick="shAddEmp()">+ Add Employee</button></div>';
  } else {
    emps.forEach(function(e,i){h+=ecardHTML(e,i)});
  }
  return h;
}

function ecardHTML(e,i){
  var r=rec(e.id),p=calcP(e,r),isPd=r.status==='paid';
  var cols=p.adv>0?'1fr 1fr 1fr':'1fr 1fr';
  var h='<div class="ecard" style="animation-delay:'+(i*.05)+'s" onclick="openDetail(\''+e.id+'\')">';
  h+='<div class="ecard-top">'+avHTML(e.name,42)+'<div style="flex:1;min-width:0"><div class="ename">'+esc(e.name)+'</div><div class="epos">'+esc(e.position||'—')+'</div></div>';
  h+='<div class="sbadge '+(isPd?'paid':'pend')+'">'+(isPd?'✓ Paid':'Pending')+'</div></div>';
  h+='<div class="stats-grid" style="grid-template-columns:'+cols+'">';
  h+='<div class="stat"><div class="stat-l">Gross</div><div class="stat-v">RM '+fmt(p.gross)+'</div></div>';
  if(p.adv>0) h+='<div class="stat r"><div class="stat-l">Advances</div><div class="stat-v">−'+fmt(p.adv)+'</div></div>';
  h+='<div class="stat g"><div class="stat-l">Net Pay</div><div class="stat-v">RM '+fmt(p.net)+'</div></div>';
  h+='</div></div>';
  return h;
}

function renderStaff(){
  var h='<div style="padding:12px 12px 0"><button class="btn btn-grn" style="display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:14px" onclick="shAddEmp()"><span style="font-size:18px">+</span>Add New Employee</button>';
  if(emps.length===0){
    h+='<div class="empty"><div class="empty-ico">👤</div><div class="empty-t">No employees yet</div></div>';
  } else {
    emps.forEach(function(e,i){
      h+='<div class="ecard" style="display:flex;align-items:center;gap:11px;border-radius:14px;margin-bottom:8px;animation-delay:'+(i*.05)+'s" onclick="openDetail(\''+e.id+'\')">';
      h+=avHTML(e.name,46);
      h+='<div style="flex:1;min-width:0"><div class="ename">'+esc(e.name)+'</div><div class="epos">'+esc(e.position||'—')+'</div><div class="emp-meta" style="font-size:11px;color:#3d5449;margin-top:2px">'+(e.payType==='monthly'?'RM '+fmt(e.baseSalary)+'/mo':'RM '+fmt(e.hourlyRate)+'/hr')+'</div></div>';
      h+='<span style="color:#3d5449;font-size:20px">›</span></div>';
    });
  }
  h+='</div>';
  return h;
}

function renderDetail(){
  var e=emps.find(function(x){return x.id===selId});
  if(!e) return '<div style="padding:30px;text-align:center;color:#6b8f7a">Not found</div>';
  var r=rec(e.id), p=calcP(e,r), isPd=r.status==='paid', hr=+e.hourlyRate||0;
  var h='';

  // profile
  h+='<div class="prof">';
  h+='<div class="prof-row">'+avHTML(e.name,52);
  h+='<div style="flex:1"><div class="prof-name">'+esc(e.name)+'</div><div class="prof-pos">'+esc(e.position||'—')+'</div><div class="prof-meta">'+(e.payType==='monthly'?'Base RM '+fmt(e.baseSalary)+'/mo':'RM '+fmt(e.hourlyRate)+'/hr')+(e.payType==='monthly'&&e.hourlyRate?' · OT RM '+fmt(e.hourlyRate)+'/hr':'')+'</div></div>';
  h+='<div class="sbadge '+(isPd?'paid':'pend')+'">'+(isPd?'✓ Paid':'Pending')+'</div></div>';
  h+='<div class="prof-actions"><button class="pact pact-def" onclick="shHours()">⏱ Log Hours</button><button class="pact pact-red" onclick="shAdvance()">＋ Advance</button></div>';
  h+='</div>';

  // earnings
  h+='<div class="card"><div class="card-body"><div class="clbl">Earnings · '+per()+'</div>';
  if(e.payType==='monthly') h+='<div class="prow"><span class="pl">Base Salary</span><span class="pv">RM '+fmt(e.baseSalary)+'</span></div>';
  if(+r.hoursWorked>0) h+='<div class="prow"><span class="pl">'+(e.payType==='hourly'?'Regular':'Extra')+' Hrs ('+r.hoursWorked+'h)</span><span class="pv">RM '+fmt((+r.hoursWorked)*hr)+'</span></div>';
  if(+r.publicHolidayHours>0) h+='<div class="prow"><span class="pl">PH Double ('+r.publicHolidayHours+'h × 2×)</span><span class="pv" style="color:#60a5fa">RM '+fmt((+r.publicHolidayHours)*p.phR*2)+'</span></div>';
  if(p.ad>0) h+='<div class="prow"><div style="display:flex;align-items:center"><span class="allow-badge">ALLOW</span><span class="pl">'+p.ad+' days × RM10</span></div><span class="pv" style="color:#f59e0b">RM '+fmt(p.allow)+'</span></div>';
  if(e.payType==='hourly'&&!+r.hoursWorked&&!+r.publicHolidayHours) h+='<div style="text-align:center;padding:9px 0;font-size:13px;color:#3d5449">No hours logged</div>';
  h+='<div class="gross-row"><span class="gross-l">Gross Pay</span><span class="gross-v">RM '+fmt(p.gross)+'</span></div>';
  h+='</div></div>';

  // advances
  h+='<div class="card"><div class="card-body"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:'+(r.advances&&r.advances.length?'11':'0')+'px"><div class="clbl" style="margin:0">Advances</div>';
  if(p.adv>0) h+='<span style="font-size:13px;font-weight:700;color:#f87171">−RM '+fmt(p.adv)+'</span>';
  h+='</div>';
  if(!(r.advances&&r.advances.length)){
    h+='<div style="text-align:center;padding:8px 0;font-size:13px;color:#3d5449">No advances this month</div>';
  } else {
    r.advances.forEach(function(a){
      h+='<div class="arow"><div><div class="an">'+esc(a.note||'Salary Advance')+'</div><div class="ad">'+a.date+'</div></div>';
      h+='<div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px;font-weight:700;color:#f87171">−RM '+fmt(a.amount)+'</span>';
      h+='<button class="adel" onclick="delAdv(\''+a.id+'\')">×</button></div></div>';
    });
  }
  h+='</div></div>';

  // net
  h+='<div class="netbox"><div><div class="net-l">Net Amount Payable</div><div class="net-v">RM '+fmt(p.net)+'</div><div class="net-s">After RM '+fmt(p.adv)+' advances</div></div><div class="net-ico">'+(isPd?'✅':'💰')+'</div></div>';

  // actions
  h+='<div class="btns"><button class="btn '+(isPd?'btn-ghost':'btn-gld')+'" onclick="togPaid()">'+(isPd?'✓ Paid — Tap to Undo':'💰 Mark as Paid')+'</button>';
  h+='<button class="btn btn-ghost" onclick="doPrint()">🖨 Print Pay Slip</button>';
  h+='<div class="btn2"><button class="btn btn-ghost" style="font-size:13px" onclick="shEdit()">✏️ Edit</button><button class="btn btn-soft-red" style="font-size:13px" onclick="shDel()">🗑 Delete</button></div></div>';
  return h;
}

function renderSettings(){
  var h='<div style="padding:12px 12px 0">';
  h+='<div class="scard"><div class="scard-hdr"><div class="scard-title">Data Backup</div><div class="scard-desc">Export all payroll data as a JSON file.</div></div>';
  h+='<div class="srow"><div><div class="srow-lbl">📥 Download Backup</div><div class="srow-sub">'+emps.length+' employee'+(emps.length!==1?'s':'')+' · all months</div></div><button class="sbtn-grn" onclick="doBackup()">Export</button></div></div>';
  h+='<div class="scard"><div class="scard-hdr"><div class="scard-title">Restore Backup</div><div class="scard-desc">Upload a .json backup to replace current data.</div></div>';
  h+='<div class="srow"><div><div class="srow-lbl">📤 Restore from File</div><div class="srow-sub">Select a .json backup</div></div><label class="sbtn-blue">Restore<input type="file" accept=".json" onchange="doRestore(this)" style="display:none"></label></div>';
  h+='<div id="rmsg"></div></div>';
  h+='<div class="scard"><div class="card-body"><div class="clbl">About</div>';
  [['App','PayRoll'],['Daily Allowance','RM10/day'],['PH Rate','2× hourly rate'],['Employees',emps.length+' registered'],['Data','Browser storage']].forEach(function(row){
    h+='<div class="about-row"><span class="ak">'+row[0]+'</span><span class="av2">'+row[1]+'</span></div>';
  });
  h+='</div></div></div>';
  return h;
}

// actions
function togPaid(){
  if(!pays[selId])pays[selId]={};
  if(!pays[selId][mk()])pays[selId][mk()]={};
  var r=pays[selId][mk()];
  r.status=r.status==='paid'?'pending':'paid';
  sP();render();
}
function delAdv(aid){
  var r=rec(selId);
  if(!pays[selId]||!pays[selId][mk()])return;
  pays[selId][mk()].advances=(r.advances||[]).filter(function(a){return a.id!==aid});
  sP();render();
}
function doPrint(){
  var e=emps.find(function(x){return x.id===selId});
  if(e)printSlip(e,rec(selId),cY,cM);
}
function doBackup(){
  var d={v:1,at:new Date().toISOString(),employees:emps,payroll:pays};
  var b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  var u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='payroll-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
}
function doRestore(inp){
  var f=inp.files&&inp.files[0];if(!f)return;
  var rd=new FileReader();
  rd.onload=function(ev){
    var m=document.getElementById('rmsg');
    try{
      var d=JSON.parse(ev.target.result);
      if(!d.employees||!d.payroll)throw 0;
      emps=d.employees;pays=d.payroll;sE();sP();
      if(m)m.innerHTML='<div class="rmsg rmsg-ok">✅ Restored '+emps.length+' employee'+(emps.length!==1?'s':'')+' successfully.</div>';
      render();
    }catch(e){if(m)m.innerHTML='<div class="rmsg rmsg-err">❌ Invalid backup file.</div>';}
  };
  rd.readAsText(f);inp.value='';
}

// sheets
function shAddEmp(){openSheet('New Employee',empForm({payType:'monthly'},null))}
function shEdit(){var e=emps.find(function(x){return x.id===selId});if(e)openSheet('Edit Employee',empForm(e,e.id))}

function empForm(d,eid){
  var h='';
  h+='<div class="field"><label class="flbl">Full Name</label><input class="inp" id="fn" value="'+esc(d.name||'')+'" placeholder="e.g. Ahmad bin Ali"></div>';
  h+='<div class="field"><label class="flbl">Position</label><input class="inp" id="fp" value="'+esc(d.position||'')+'" placeholder="e.g. Sales Manager"></div>';
  h+='<div class="field"><label class="flbl">Pay Type</label><select class="inp" id="ft" onchange="ftChg()"><option value="monthly"'+(d.payType!=='hourly'?' selected':'')+'>Monthly Salary</option><option value="hourly"'+(d.payType==='hourly'?' selected':'')+'>Hourly Rate</option></select></div>';
  h+='<div id="fbw" class="field"'+(d.payType==='hourly'?' style="display:none"':'')+'>'+
     '<label class="flbl">Base Monthly Salary (RM)</label>'+
     '<input class="inp" id="fb" type="number" value="'+esc(d.baseSalary||'')+'" placeholder="e.g. 3500"></div>';
  h+='<div class="field"><label class="flbl" id="fhl">'+(d.payType==='hourly'?'Hourly Rate (RM)':'OT / PH Hourly Rate (RM)')+'</label>'+
     '<input class="inp" id="fh" type="number" value="'+esc(d.hourlyRate||'')+'" placeholder="'+(d.payType==='hourly'?'e.g. 15':'Optional, e.g. 20')+'"></div>';
  if(d.payType!=='hourly'&&!d.hourlyRate) h+='<div class="tip-muted">💡 Leave blank: PH rate auto-calculated as Base ÷ 208 hrs</div>';
  h+='<div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">';
  h+='<button class="btn btn-grn" onclick="saveEmp('+(eid?'\''+eid+'\'':'null')+')">Save Employee</button>';
  h+='<button class="btn btn-ghost" onclick="closeSheet()">Cancel</button></div>';
  return h;
}
function ftChg(){
  var t=document.getElementById('ft').value;
  var bw=document.getElementById('fbw'),hl=document.getElementById('fhl'),fh=document.getElementById('fh');
  if(t==='monthly'){bw.style.display='';hl.textContent='OT / PH Hourly Rate (RM)';fh.placeholder='Optional, e.g. 20';}
  else{bw.style.display='none';hl.textContent='Hourly Rate (RM)';fh.placeholder='e.g. 15';}
}
function saveEmp(eid){
  var name=(document.getElementById('fn').value||'').trim();
  if(!name)return;
  var e={id:eid||uid(),name:name,position:(document.getElementById('fp').value||'').trim(),
    payType:document.getElementById('ft').value,baseSalary:document.getElementById('fb')?document.getElementById('fb').value:'',
    hourlyRate:document.getElementById('fh').value};
  if(eid){emps=emps.map(function(x){return x.id===eid?e:x})}
  else emps.push(e);
  sE();closeSheet();render();
}

function shAdvance(){
  var e=emps.find(function(x){return x.id===selId});if(!e)return;
  var h='<div class="emp-mini">'+avHTML(e.name,34)+'<div><div style="font-size:14px;font-weight:600;color:#e0ede7">'+esc(e.name)+'</div><div style="font-size:11px;color:#6b8f7a">'+per()+'</div></div></div>';
  h+='<div class="field"><label class="flbl">Amount (RM)</label><input class="inp" id="aa" type="number" placeholder="e.g. 500"></div>';
  h+='<div class="field"><label class="flbl">Date</label><input class="inp" id="ad" type="date" value="'+today()+'"></div>';
  h+='<div class="field"><label class="flbl">Reason (optional)</label><input class="inp" id="an" placeholder="e.g. Medical"></div>';
  h+='<div style="display:flex;flex-direction:column;gap:8px"><button class="btn btn-red" onclick="saveAdv()">Record Advance</button><button class="btn btn-ghost" onclick="closeSheet()">Cancel</button></div>';
  openSheet('Record Advance',h);
}
function saveAdv(){
  var amt=document.getElementById('aa').value;if(!amt||!selId)return;
  if(!pays[selId])pays[selId]={};
  if(!pays[selId][mk()])pays[selId][mk()]={};
  var r=pays[selId][mk()];
  r.advances=(r.advances||[]).concat([{id:uid(),amount:amt,date:document.getElementById('ad').value,note:document.getElementById('an').value}]);
  sP();closeSheet();render();
}

function shHours(){
  var e=emps.find(function(x){return x.id===selId});if(!e)return;
  var r=rec(selId);
  var h='<div class="emp-mini">'+avHTML(e.name,34)+'<div><div style="font-size:14px;font-weight:600;color:#e0ede7">'+esc(e.name)+'</div><div style="font-size:11px;color:#6b8f7a">'+per()+'</div></div></div>';
  h+='<div class="field"><label class="flbl">'+(e.payType==='monthly'?'Extra / Overtime Hours':'Regular Hours Worked')+'</label><input class="inp" id="hh" type="number" value="'+esc(r.hoursWorked||'')+'" placeholder="e.g. 8"></div>';
  h+='<div class="field"><label class="flbl">Public Holiday Hours (2× pay)</label><input class="inp" id="hp" type="number" value="'+esc(r.publicHolidayHours||'')+'" placeholder="e.g. 8"></div>';
  h+='<div class="tip tip-blue">📅 Public holiday hours = 2× the hourly rate automatically.</div>';
  h+='<div class="divider"></div>';
  h+='<div style="display:flex;align-items:center;gap:7px;margin-bottom:8px"><span class="chip">ALLOWANCE</span><span style="font-size:12px;color:#6b8f7a">RM10 per day attended</span></div>';
  h+='<div class="field"><label class="flbl">Days Attended</label><input class="inp" id="hd" type="number" value="'+esc(r.allowanceDays||'')+'" placeholder="e.g. 22" oninput="updAllowTip()"></div>';
  h+='<div id="atip" class="tip tip-gold" '+(r.allowanceDays&&+r.allowanceDays>0?'':'style="display:none"')+'>💰 Total: <strong>RM '+fmt((+r.allowanceDays||0)*10)+'</strong> ('+esc(r.allowanceDays||0)+' days × RM10)</div>';
  h+='<div style="display:flex;flex-direction:column;gap:8px"><button class="btn btn-grn" onclick="saveHrs()">Save</button><button class="btn btn-ghost" onclick="closeSheet()">Cancel</button></div>';
  openSheet('Log Hours & Allowance',h);
}
function updAllowTip(){
  var d=+(document.getElementById('hd').value)||0,t=document.getElementById('atip');
  if(!t)return;
  if(d>0){t.style.display='';t.innerHTML='💰 Total: <strong>RM '+fmt(d*10)+'</strong> ('+d+' days × RM10)'}
  else t.style.display='none';
}
function saveHrs(){
  if(!selId)return;
  if(!pays[selId])pays[selId]={};
  if(!pays[selId][mk()])pays[selId][mk()]={};
  var r=pays[selId][mk()];
  r.hoursWorked=document.getElementById('hh').value;
  r.publicHolidayHours=document.getElementById('hp').value;
  r.allowanceDays=document.getElementById('hd').value;
  sP();closeSheet();render();
}

function shDel(){
  var e=emps.find(function(x){return x.id===selId});if(!e)return;
  var h='<div style="text-align:center;padding:6px 0 16px">'+avHTML(e.name,60);
  h+='<div style="font-size:20px;font-weight:700;color:#e0ede7;margin-top:11px">'+esc(e.name)+'</div>';
  h+='<div style="font-size:13px;color:#6b8f7a;margin:8px 0 20px;line-height:1.6">This permanently removes this employee and all their payroll records.</div>';
  h+='<div style="display:flex;flex-direction:column;gap:8px"><button class="btn btn-red" onclick="doDelEmp()">Remove Employee</button><button class="btn btn-ghost" onclick="closeSheet()">Cancel</button></div></div>';
  openSheet('Remove Employee',h);
}
function doDelEmp(){emps=emps.filter(function(x){return x.id!==selId});sE();closeSheet();goScreen('home')}

function printSlip(e,r,yr,mo){
  var p=calcP(e,r),hr=+e.hourlyRate||0,period=MO[mo-1]+' '+yr;
  var w=window.open('','_blank');
  if(!w){alert('Allow popups to print.');return;}
  var rows='';
  if(e.payType==='monthly')rows+='<div class="row"><span class="l">Base Monthly Salary</span><span class="v">RM '+fmt(e.baseSalary)+'</span></div>';
  if(+r.hoursWorked>0)rows+='<div class="row"><span class="l">'+(e.payType==='hourly'?'Regular':'Extra')+' Hours ('+r.hoursWorked+'h × RM '+fmt(hr)+')</span><span class="v">RM '+fmt((+r.hoursWorked)*hr)+'</span></div>';
  if(+r.publicHolidayHours>0)rows+='<div class="row"><span class="l">Public Holiday ('+r.publicHolidayHours+'h × 2×)</span><span class="v" style="color:#0891b2">RM '+fmt((+r.publicHolidayHours)*p.phR*2)+'</span></div>';
  if(p.ad>0)rows+='<div class="row"><span class="l"><span style="background:#fef3c7;color:#92400e;border-radius:4px;padding:2px 5px;font-size:9px;font-weight:700;margin-right:5px">ALLOWANCE</span>Daily ('+p.ad+' days × RM10)</span><span class="v" style="color:#d97706">RM '+fmt(p.allow)+'</span></div>';
  var drows='';
  if(p.adv>0)(r.advances||[]).forEach(function(a){drows+='<div class="row"><div><div class="l">'+(a.note||'Salary Advance')+'</div><div style="font-size:11px;color:#9ca3af">'+a.date+'</div></div><span class="v" style="color:#ef4444">−RM '+fmt(a.amount)+'</span></div>';});
  w.document.write('<!DOCTYPE html><html><head><title>Pay Slip</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f9f9f7;color:#1a1a1a;padding:28px;max-width:580px;margin:auto;-webkit-print-color-adjust:exact;print-color-adjust:exact}.top{background:linear-gradient(135deg,#064e3b,#047857);color:#fff;padding:26px;border-radius:14px;margin-bottom:18px;position:relative;overflow:hidden}.top::before{content:"";position:absolute;top:-35px;right:-35px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.06)}.badge{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.22);border-radius:18px;padding:3px 11px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px}.co{font-size:24px;font-weight:700;margin-bottom:2px}.per{font-size:12px;opacity:.65}.er{display:flex;align-items:center;gap:13px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.14)}.av{width:42px;height:42px;border-radius:11px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}.en{font-size:18px;font-weight:700;margin-bottom:2px}.es{font-size:11px;opacity:.6}section{background:#fff;border-radius:11px;padding:16px 18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}.st{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:#6b7280;margin-bottom:11px;font-weight:600}.row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:13px}.row:last-child{border:none}.l{color:#4b5563}.v{font-weight:600}.gb{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-radius:9px;padding:13px 15px;display:flex;justify-content:space-between;align-items:center;margin-top:9px}.gb .l{font-size:13px;color:#166534;font-weight:600}.gb .v{font-size:22px;font-weight:700;color:#14532d}.nb{background:linear-gradient(135deg,#064e3b,#047857);color:#fff;border-radius:11px;padding:18px 22px;display:flex;justify-content:space-between;align-items:center}.nb .l{font-size:12px;opacity:.7}.nb .v{font-size:30px;font-weight:700}.ft{text-align:center;font-size:10px;color:#9ca3af;margin-top:20px;padding-top:12px;border-top:1px solid #e5e7eb}.sr{display:flex;justify-content:space-around;margin-top:26px}.sl{width:130px;border-top:1px solid #d1d5db;margin-bottom:5px}.sl2{font-size:10px;color:#9ca3af;text-align:center}.pb{display:block;width:100%;background:#064e3b;color:#fff;border:none;border-radius:9px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;margin-top:18px;font-family:inherit}@media print{.pb{display:none}}</style></head><body>');

w.document.write(’<div class="top"><div class="badge">Official Pay Slip</div><div class="co">PayRoll</div><div class="per">Period: ‘+period+’</div><div class="er"><div class="av">’+init(e.name)+’</div><div><div class="en">’+e.name+’</div><div class="es">’+(e.position||’—’)+’ · ‘+e.id.toUpperCase()+’</div></div></div></div>’);
w.document.write(’<section><div class="st">Earnings</div>’+rows+’<div class="gb"><span class="l">Gross Pay</span><span class="v">RM ‘+fmt(p.gross)+’</span></div></section>’);
if(p.adv>0)w.document.write(’<section><div class="st">Deductions</div>’+drows+’</section>’);
w.document.write(’<div class="nb"><div><div class="l">Net Amount Payable</div><div style="font-size:11px;opacity:.45;margin-top:1px">’+period+’</div></div><div class="v">RM ‘+fmt(p.net)+’</div></div>’);
w.document.write(’<div class="sr"><div><div class="sl"></div><div class="sl2">Employee Signature</div></div><div><div class="sl"></div><div class="sl2">Authorised Signatory</div></div></div>’);
w.document.write(’<div class="ft">Generated ‘+new Date().toLocaleDateString(‘en-MY’,{day:‘numeric’,month:‘long’,year:‘numeric’})+’</div>’);
w.document.write(’<button class="pb" onclick="window.print()">🖨 Print / Save as PDF</button></body></html>’);
w.document.close();
}
