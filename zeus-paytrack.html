const COL_ALIASES={
customerName:[“customer name”,“debtor name”,“company name”,“name”,“customer”,“debtor”,“acc name”,“account name”],
invoiceNo:[“invoice no”,“inv no”,“doc no”,“document no”,“invoice number”,“ref no”,“bill no”],
invoiceDate:[“invoice date”,“inv date”,“doc date”,“date”,“bill date”,“transaction date”],
amount:[“amount”,“invoice amount”,“total amount”,“original amount”,“gross amount”,“total”,“amt”],

paidAmount:[“paid”,“paid amount”,“payment”,“amount paid”,“paid to date”],
creditTerm:[“credit term”,“terms”,“payment term”,“credit days”,“days”],
};
function guessMapping(headers){
const map={};const lc=headers.map(x=>(x||””).toString().toLowerCase().trim());
Object.entries(COL_ALIASES).forEach(([f,al])=>{const i=lc.findIndex(x=>al.includes(x));if(i!==-1)map[f]=headers[i];});
return map;
}
function parseExcelDate(val){
if(!val)return null;
if(val instanceof Date)return val.toISOString().split(“T”)[0];
if(typeof val===“number”){const d=new Date(Math.round((val-25569)*86400*1000));return d.toISOString().split(“T”)[0];}
if(typeof val===“string”){
const a=val.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{4})$/);if(a)return a[3]+”-”+a[2].padStart(2,“0”)+”-”+a[1].padStart(2,“0”);
const b=val.match(/^(\d{4})[/-](\d{1,2})[/-](\d{1,2})$/);if(b)return b[1]+”-”+b[2].padStart(2,“0”)+”-”+b[3].padStart(2,“0”);
const d=new Date(val);if(!isNaN(d))return d.toISOString().split(“T”)[0];
}
return null;
}
function getDueDate(inv,term){const d=new Date(inv);d.setDate(d.getDate()+Number(term));return d;}
function getDaysOverdue(due){const t=new Date();t.setHours(0,0,0,0);const d=new Date(due);d.setHours(0,0,0,0);return Math.floor((t-d)/86400000);}
function ageBucket(d){if(d<=0)return”current”;if(d<=30)return”1-30”;if(d<=60)return”31-60”;if(d<=90)return”61-90”;return”90+”;}
function fmyr(n){return”RM “+Number(n||0).toLocaleString(“en-MY”,{minimumFractionDigits:2,maximumFractionDigits:2});}
function fshort(n){const v=Number(n||0);if(v>=1000000)return”RM “+(v/1000000).toFixed(1)+“M”;if(v>=1000)return”RM “+(v/1000).toFixed(1)+“K”;return”RM “+v.toFixed(0);}
function fdate(d){if(!d)return”-”;try{return new Date(d).toLocaleDateString(“en-MY”,{day:“2-digit”,month:“short”,year:“numeric”});}catch(e){return”-”;}}
function fdshort(d){if(!d)return”-”;try{return new Date(d).toLocaleDateString(“en-MY”,{day:“2-digit”,month:“short”});}catch(e){return”-”;}}
function mKey(ds){if(!ds)return”?”;const d=new Date(ds);return d.getFullYear()+”-”+String(d.getMonth()+1).padStart(2,“0”);}
function mLabel(k){if(!k||k===”?”)return”Unknown”;const p=k.split(”-”);return new Date(Number(p[0]),Number(p[1])-1,1).toLocaleDateString(“en-MY”,{month:“long”,year:“numeric”});}

function App(){
const mob=useIsMob();
const[customers,setCustomers]=useState([]);
const[invoices,setInvoices]=useState([]);
const[payments,setPayments]=useState([]);
const[waLog,setWaLog]=useState([]);
const[company,setCompany]=useState(“G Wira Trading (M) Sdn Bhd”);
const[tab,setTab]=useState(“dashboard”);
const[subTab,setSubTab]=useState(“alerts”);
const[dismissed,setDismissed]=useState([]);
const[fStatus,setFStatus]=useState(“all”);
const[fSearch,setFSearch]=useState(””);
const[selInv,setSelInv]=useState(null);
const[payModal,setPayModal]=useState(null);
const[payAmt,setPayAmt]=useState(””);
const[payNote,setPayNote]=useState(””);
const[showInv,setShowInv]=useState(false);
const[showCust,setShowCust]=useState(false);
const[newInv,setNewInv]=useState({customerId:””,invoiceNo:””,amount:””,invoiceDate:new Date().toISOString().split(“T”)[0],paidAmount:“0”,notes:””});
const[newCust,setNewCust]=useState({name:””,creditTerm:30,contact:””,phone:””,email:””});
const[waCopied,setWaCopied]=useState({});
const[hSearch,setHSearch]=useState(””);
const[rMonth,setRMonth]=useState(””);
const[iStage,setIStage]=useState(“idle”);
const[iRows,setIRows]=useState([]);
const[iHeaders,setIHeaders]=useState([]);
const[iMap,setIMap]=useState({});
const[iPrev,setIPrev]=useState([]);
const[iMode,setIMode]=useState(“merge”);
const[iStats,setIStats]=useState(null);
const[iFile,setIFile]=useState(””);
const[dragOver,setDragOver]=useState(false);
const fileRef=useRef();

useEffect(()=>{
try{const s=localStorage.getItem(SK);if(s){const d=JSON.parse(s);setCustomers(d.customers||DC);setInvoices(d.invoices||DI);setPayments(d.payments||DP);setWaLog(d.waLog||[]);setCompany(d.company||“G Wira Trading (M) Sdn Bhd”);}else{setCustomers(DC);setInvoices(DI);setPayments(DP);}}catch(e){setCustomers(DC);setInvoices(DI);setPayments(DP);}
},[]);
useEffect(()=>{if(customers.length||invoices.length)localStorage.setItem(SK,JSON.stringify({customers,invoices,payments,waLog,company}));},[customers,invoices,payments,waLog,company]);

const enrich=useCallback((invs,custs)=>invs.map(inv=>{
const cust=custs.find(c=>c.id===inv.customerId);
if(!cust)return{…inv,customer:null,dueDate:null,daysOverdue:0,outstanding:inv.amount-inv.paidAmount,displayStatus:inv.status||“unpaid”,aging:“current”};
const dueDate=getDueDate(inv.invoiceDate,cust.creditTerm);
const daysOverdue=getDaysOverdue(dueDate);
const outstanding=inv.amount-inv.paidAmount;
const ds=inv.status===“paid”?“paid”:daysOverdue>0?“overdue”:inv.status===“partial”?“partial”:daysOverdue>-7?“due-soon”:“current”;
return{…inv,customer:cust,dueDate,daysOverdue,outstanding,displayStatus:ds,aging:ageBucket(daysOverdue)};
}),[]);

const enriched=useMemo(()=>enrich(invoices,customers),[invoices,customers,enrich]);
const reminders=useMemo(()=>enriched.filter(i=>(i.displayStatus===“overdue”||i.displayStatus===“due-soon”)&&!dismissed.includes(i.id)).sort((a,b)=>b.daysOverdue-a.daysOverdue),[enriched,dismissed]);
const stats=useMemo(()=>{const a=enriched.filter(i=>i.displayStatus!==“paid”);return{totalOut:a.reduce((s,i)=>s+i.outstanding,0),overdue:a.filter(i=>i.displayStatus===“overdue”).reduce((s,i)=>s+i.outstanding,0),dueSoon:a.filter(i=>i.displayStatus===“due-soon”).reduce((s,i)=>s+i.outstanding,0),current:a.filter(i=>i.displayStatus===“current”).reduce((s,i)=>s+i.outstanding,0),overdueN:a.filter(i=>i.displayStatus===“overdue”).length,dueSoonN:a.filter(i=>i.displayStatus===“due-soon”).length};},[enriched]);
const aging=useMemo(()=>{const b={current:0,“1-30”:0,“31-60”:0,“61-90”:0,“90+”:0};enriched.filter(i=>i.displayStatus!==“paid”).forEach(i=>{b[i.aging]=(b[i.aging]||0)+i.outstanding;});return b;},[enriched]);
const filtered=useMemo(()=>enriched.filter(i=>{if(fStatus!==“all”&&i.displayStatus!==fStatus)return false;if(fSearch){const q=fSearch.toLowerCase();if(!i.invoiceNo.toLowerCase().includes(q)&&!(i.customer&&i.customer.name.toLowerCase().includes(q)))return false;}return true;}).sort((a,b)=>b.daysOverdue-a.daysOverdue),[enriched,fStatus,fSearch]);
const custsWithOS=useMemo(()=>customers.filter(c=>enriched.some(i=>i.customerId===c.id&&i.displayStatus!==“paid”)),[customers,enriched]);
const filteredHistory=useMemo(()=>{if(!hSearch)return payments;const q=hSearch.toLowerCase();return payments.filter(p=>p.customerName.toLowerCase().includes(q)||p.invoiceNo.toLowerCase().includes(q));},[payments,hSearch]);
const waStats=useMemo(()=>{const s={};waLog.forEach(l=>{if(!s[l.customerId])s[l.customerId]={count:0,lastDate:null};s[l.customerId].count++;if(!s[l.customerId].lastDate||l.date>s[l.customerId].lastDate)s[l.customerId].lastDate=l.date;});return s;},[waLog]);
const monthlyData=useMemo(()=>{const m={};payments.forEach(p=>{const k=mKey(p.date);if(!m[k])m[k]={key:k,label:mLabel(k),collected:0,payCount:0};m[k].collected+=p.amount;m[k].payCount++;});invoices.forEach(inv=>{const k=mKey(inv.invoiceDate);if(!m[k])m[k]={key:k,label:mLabel(k),collected:0,payCount:0};m[k].invoiced=(m[k].invoiced||0)+inv.amount;});return Object.values(m).sort((a,b)=>b.key.localeCompare(a.key));},[payments,invoices]);

function daysSinceWa(cid){const last=waStats[cid]&&waStats[cid].lastDate;if(!last)return null;return Math.floor((new Date()-new Date(last))/86400000);}

function genWaMsg(cid){
const cust=customers.find(c=>c.id===Number(cid));if(!cust)return””;
const invs=enriched.filter(i=>i.customerId===cust.id&&i.displayStatus!==“paid”);if(!invs.length)return””;
const total=invs.reduce((s,i)=>s+i.outstanding,0);
const hasOD=invs.some(i=>i.displayStatus===“overdue”);
const lines=invs.map(i=>”• “+i.invoiceNo+” | Due: “+fdate(i.dueDate)+” | “+fmyr(i.outstanding)+(i.daysOverdue>0?” *(”+i.daysOverdue+” days overdue)*”:””)).join(”\n”);
const opener=hasOD?“We would like to kindly remind you that the following invoice(s) are now overdue:”:“This is a friendly reminder that the following invoice(s) will be due soon:”;
return”Dear *”+cust.name+”*,\n\nWe hope this message finds you well.\n\n”+opener+”\n\n”+lines+”\n\n*Total Outstanding: “+fmyr(total)+”*\n\nKindly arrange payment at your earliest convenience. If payment has already been made, please disregard this message.\n\nThank you for your continued support.\n\nBest regards,\n*”+company+”*”;
}
function logWa(cid){const cust=customers.find(c=>c.id===Number(cid));setWaLog(p=>[{id:Date.now(),customerId:Number(cid),customerName:cust?cust.name:””,date:new Date().toISOString().split(“T”)[0]},…p]);}
function copyWa(cid){navigator.clipboard.writeText(genWaMsg(cid)).then(()=>{logWa(cid);setWaCopied(p=>({…p,[cid]:true}));setTimeout(()=>setWaCopied(p=>({…p,[cid]:false})),2500);});}
function openWa(cid){const cust=customers.find(c=>c.id===Number(cid));const phone=(cust&&cust.phone||””).replace(/[^0-9]/g,””);const intl=phone.startsWith(“0”)?“60”+phone.slice(1):phone;logWa(cid);window.open(“https://wa.me/”+intl+”?text=”+encodeURIComponent(genWaMsg(cid)),”_blank”);}

function addInvoice(){if(!newInv.customerId||!newInv.invoiceNo||!newInv.amount)return;const paid=parseFloat(newInv.paidAmount)||0,amt=parseFloat(newInv.amount)||0;setInvoices(p=>[…p,{id:Date.now(),customerId:Number(newInv.customerId),invoiceNo:newInv.invoiceNo,amount:amt,invoiceDate:newInv.invoiceDate,paidAmount:paid,notes:newInv.notes,status:paid>=amt?“paid”:paid>0?“partial”:“unpaid”}]);setNewInv({customerId:””,invoiceNo:””,amount:””,invoiceDate:new Date().toISOString().split(“T”)[0],paidAmount:“0”,notes:””});setShowInv(false);}
function addCustomer(){if(!newCust.name)return;setCustomers(p=>[…p,{…newCust,id:Date.now(),creditTerm:Number(newCust.creditTerm)}]);setNewCust({name:””,creditTerm:30,contact:””,phone:””,email:””});setShowCust(false);}
function recordPayment(){const a=parseFloat(payAmt);if(!a||!payModal)return;const cust=customers.find(c=>c.id===payModal.customerId);setPayments(p=>[{id:Date.now(),invoiceId:payModal.id,customerId:payModal.customerId,invoiceNo:payModal.invoiceNo,customerName:cust?cust.name:””,amount:a,date:new Date().toISOString().split(“T”)[0],note:payNote||“Payment recorded”},…p]);setInvoices(p=>p.map(i=>{if(i.id!==payModal.id)return i;const np=Math.min(i.paidAmount+a,i.amount);return{…i,paidAmount:np,status:np>=i.amount?“paid”:“partial”};}));setPayModal(null);setPayAmt(””);setPayNote(””);}

function handleFile(file){
if(!file)return;setIFile(file.name);
const reader=new FileReader();
reader.onload=function(e){try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:“array”,cellDates:true});const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{defval:””,raw:false});if(!rows.length){alert(“File empty.”);return;}const headers=Object.keys(rows[0]);setIHeaders(headers);setIRows(rows);setIMap(guessMapping(headers));setIStage(“mapping”);setTab(“import”);}catch(err){alert(“Could not read: “+err.message);}};
reader.readAsArrayBuffer(file);
}
function buildPreview(){
if(!iMap.invoiceNo||!iMap.customerName){alert(“Map Invoice No and Customer Name first.”);return;}
const rows=iRows.map(function(row){const invNo=(row[iMap.invoiceNo]||””).toString().trim();const custName=(row[iMap.customerName]||””).toString().trim();if(!invNo||!custName)return null;const amt=parseFloat((row[iMap.amount]||“0”).toString().replace(/[^0-9.-]/g,””))||0;const rawOS=iMap.outstanding?parseFloat((row[iMap.outstanding]||“0”).toString().replace(/[^0-9.-]/g,””)):null;const rawPd=iMap.paidAmount?parseFloat((row[iMap.paidAmount]||“0”).toString().replace(/[^0-9.-]/g,””)):null;const outstanding=rawOS!==null?Math.max(0,rawOS):rawPd!==null?Math.max(0,amt-rawPd):amt;const paidAmt=Math.max(0,amt-outstanding);const invDate=iMap.invoiceDate?parseExcelDate(row[iMap.invoiceDate]):null;const creditTerm=iMap.creditTerm?parseInt((row[iMap.creditTerm]||“30”).toString())||30:30;const status=paidAmt>=amt?“paid”:paidAmt>0?“partial”:“unpaid”;return{invNo,custName,amt,paidAmt,outstanding,invDate,creditTerm,status};}).filter(Boolean);
setIPrev(rows);setIStage(“preview”);
}
function doImport(){let nc=[…customers],ni=iMode===“replace”?[]:[…invoices];let added=0,updated=0,custCreated=0;iPrev.forEach(function(row){let cust=nc.find(c=>c.name.toLowerCase()===row.custName.toLowerCase());if(!cust){cust={id:Date.now()+Math.random(),name:row.custName,creditTerm:row.creditTerm||30,contact:””,phone:””,email:””};nc.push(cust);custCreated++;}const ex=ni.find(i=>i.invoiceNo===row.invNo);if(ex){Object.assign(ex,{amount:row.amt,paidAmount:row.paidAmt,status:row.status,invoiceDate:row.invDate||ex.invoiceDate});updated++;}else{ni.push({id:Date.now()+Math.random(),customerId:cust.id,invoiceNo:row.invNo,amount:row.amt,invoiceDate:row.invDate||new Date().toISOString().split(“T”)[0],paidAmount:row.paidAmt,status:row.status,notes:“Imported”});added++;}});setCustomers(nc);setInvoices(ni);setIStats({added,updated,custCreated,total:iPrev.length});setIStage(“done”);}
function resetImport(){setIStage(“idle”);setIRows([]);setIHeaders([]);setIMap({});setIPrev([]);setIStats(null);setIFile(””);if(fileRef.current)fileRef.current.value=””;}
