<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Zeus PayTrack"/>
<title>⚡ Zeus PayTrack</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0d0f14;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;overflow-x:hidden;-webkit-text-size-adjust:100%}
button,input,select,textarea{font-family:inherit;font-size:16px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#111827}
::-webkit-scrollbar-thumb{background:#1e2d4a;border-radius:4px}
.app{min-height:100vh;padding-bottom:calc(72px + env(safe-area-inset-bottom))}
/* HEADER - Dynamic Island safe */
.header{background:linear-gradient(135deg,#111827,#1a2035);border-bottom:1px solid #1e2d4a;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-logo{width:36px;height:36px;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.header-title{font-size:16px;font-weight:700;color:#f1f5f9}
.header-sub{font-size:12px;color:#64748b}
/* BOTTOM NAV - iPhone 15 home indicator */
.nav{position:fixed;bottom:0;left:0;right:0;background:#111827;border-top:1px solid #1e2d4a;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:12px 4px 10px;border:none;cursor:pointer;background:transparent;display:flex;flex-direction:column;align-items:center;gap:4px;color:#64748b;position:relative;transition:color .15s;min-height:56px}
.nav-btn.active{color:#60a5fa}
.nav-btn.active::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:#60a5fa;border-radius:0 0 2px 2px}
.nav-icon{font-size:22px;line-height:1}
.nav-label{font-size:10px;font-weight:600;letter-spacing:0.2px}
.nav-badge{position:absolute;top:8px;right:calc(50% - 18px);background:#f87171;color:white;border-radius:10px;padding:1px 5px;font-size:9px;font-weight:700}
/* CONTENT */
.content{padding:12px 14px}
.page{display:none}
.page.active{display:block}
/* CARDS */
.card{background:#111827;border:1px solid #1e2d4a;border-radius:16px;overflow:hidden;margin-bottom:12px}
.card-header{padding:14px 16px;border-bottom:1px solid #1e2d4a;display:flex;justify-content:space-between;align-items:center}
.card-title{font-weight:600;font-size:15px;color:#e2e8f0}
/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:#111827;border-radius:14px;padding:16px;position:relative;overflow:hidden}
.stat-label{font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.stat-value{font-size:24px;font-weight:800;letter-spacing:-0.5px}
.stat-sub{font-size:12px;color:#64748b;margin-top:3px}
/* INVOICE ROW */
.inv-row{padding:16px;border-bottom:1px solid #1e2d4a;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;border-left:3px solid transparent;transition:background .15s;min-height:72px}
.inv-row:active{background:#131c2e}
.inv-row:last-child{border-bottom:none}
.inv-name{font-weight:700;font-size:15px;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.inv-no{font-size:13px;color:#60a5fa;margin-bottom:2px}
.inv-meta{font-size:12px;color:#64748b}
.inv-amt{font-weight:800;font-size:16px;margin-bottom:5px;text-align:right}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-overdue{background:#3a0a0a;color:#f87171;border:1px solid #991b1b}
.badge-due-soon{background:#3a2a0a;color:#fbbf24;border:1px solid #92400e}
.badge-current{background:#1a3a2a;color:#4ade80;border:1px solid #166534}
.badge-paid{background:#0a1a2a;color:#60a5fa;border:1px solid #1e40af}
.badge-partial{background:#2a1a3a;color:#c084fc;border:1px solid #7e22ce}
/* INPUTS - iOS zoom fix: font-size 16px prevents auto-zoom */
.inp{background:#1a2035;border:1px solid #1e2d4a;border-radius:12px;padding:14px 16px;color:#e2e8f0;font-size:16px;width:100%;outline:none;-webkit-appearance:none}
.inp:focus{border-color:#3b82f6;background:#111827}
.lbl{font-size:12px;color:#64748b;margin-bottom:6px;display:block;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.form-group{margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* BUTTONS - bigger tap targets */
.btn{padding:14px 18px;border-radius:12px;cursor:pointer;font-size:15px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;transition:all .15s;white-space:nowrap;min-height:48px}
.btn-primary{background:#1d4ed8;color:#fff}
.btn-success{background:#14532d;color:#86efac}
.btn-danger{background:#7f1d1d;color:#fca5a5}
.btn-ghost{background:transparent;color:#94a3b8;border:1px solid #1e2d4a}
.btn-wa{background:#128c3e;color:#fff}
.btn-sm{padding:10px 14px;font-size:13px;min-height:40px}
.btn-full{width:100%}
.btn-row{display:flex;gap:8px;margin-top:14px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:flex-end;justify-content:center;z-index:1000;backdrop-filter:blur(8px)}
.modal{background:#111827;border-radius:24px 24px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:520px;max-height:94vh;overflow-y:auto}
.modal-drag{width:44px;height:5px;background:#1e2d4a;border-radius:4px;margin:0 auto 20px}
.modal-title{font-size:18px;font-weight:700;color:#e2e8f0;margin-bottom:20px}
/* AGING BARS */
.aging-row{margin-bottom:12px}
.aging-meta{display:flex;justify-content:space-between;margin-bottom:5px}
.aging-bar-bg{height:8px;background:#1e2d4a;border-radius:4px;overflow:hidden}
.aging-bar{height:100%;border-radius:4px;transition:width .6s}
/* ALERT BANNER */
.alert-banner{background:linear-gradient(90deg,#1a0f0a,#2a1500);border:1px solid #92400e;border-radius:14px;padding:14px 16px;margin-bottom:14px}
/* SUB TABS */
.sub-tabs{display:flex;gap:4px;background:#111827;border-radius:14px;padding:4px;border:1px solid #1e2d4a;margin-bottom:14px}
.sub-tab{flex:1;padding:11px 6px;border:none;cursor:pointer;background:transparent;color:#64748b;font-size:13px;font-weight:700;border-radius:10px;transition:all .15s}
.sub-tab.active{background:#1d4ed8;color:#fff}
/* FILTER ROW */
.filter-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.search-inp{flex:1;min-width:160px;padding:12px 14px}
.select-inp{padding:12px 14px;width:100%}
/* EMPTY STATE */
.empty{padding:40px;text-align:center;color:#64748b}
.empty-icon{font-size:32px;margin-bottom:8px}
/* DETAIL ROW */
.detail-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid #1e2d4a}
.detail-label{color:#64748b;font-size:14px}
.detail-value{color:#e2e8f0;font-weight:600;font-size:14px}
/* WA MESSAGE */
.wa-msg{background:#0d0f14;border-radius:10px;padding:12px;font-size:12px;color:#94a3b8;line-height:1.6;max-height:120px;overflow-y:auto;white-space:pre-wrap;font-family:monospace;border:1px solid #1e2d4a;margin-bottom:12px}
/* PAYMENT SUMMARY */
.pay-summary{background:#0d0f14;border-radius:10px;padding:14px;margin-bottom:16px}
/* REPORT CARD */
.report-month{cursor:pointer}
.report-month:active{background:#131c2e}
.collection-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.collection-cell{background:#0d0f14;border-radius:8px;padding:10px 12px}
.collection-cell-label{font-size:11px;color:#64748b;margin-bottom:3px}
.collection-cell-value{font-weight:700;font-size:15px}
/* IMPORT */
.drop-zone{border:2px dashed #1e2d4a;border-radius:14px;padding:40px 24px;text-align:center;cursor:pointer;transition:all .2s;background:#0d0f14}
.drop-zone.dragover{border-color:#60a5fa;background:#0d1a2a}
.import-info{background:#0f2a1a;border:1px solid #166534;border-radius:12px;padding:14px;margin-bottom:20px;font-size:13px;color:#86efac;line-height:1.7}
/* MISC */
.text-red{color:#f87171}
.text-grn{color:#4ade80}
.text-yel{color:#fbbf24}
.text-blue{color:#60a5fa}
.text-pur{color:#c084fc}
.text-mut{color:#64748b}
.fw7{font-weight:700}
.fs12{font-size:12px}
.fs13{font-size:13px}
.fs14{font-size:14px}
.fs15{font-size:15px}
.fs16{font-size:16px}
.mb4{margin-bottom:4px}
.mb8{margin-bottom:8px}
.mb12{margin-bottom:12px}
.mb16{margin-bottom:16px}
.flex{display:flex}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.flex-center{display:flex;align-items:center}
.gap8{gap:8px}
.gap10{gap:10px}
.gap12{gap:12px}
.flex1{flex:1;min-width:0}
.text-ellipsis{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.border-l-red{border-left:4px solid #f87171}
.border-l-yel{border-left:4px solid #fbbf24}
.border-l-grn{border-left:4px solid #4ade80}
.border-l-wa{border-left:4px solid #25d366}
.p14{padding:14px 16px}
.tag{display:inline-flex;align-items:center;padding:6px 12px;border-radius:8px;font-size:12px;gap:6px}
</style>
</head>

<script>
// ── DATA ──────────────────────────────────────────────────────
var SK='paytrack-v8';
var state={
  customers:[
    {id:1,name:"ABC Trading Sdn Bhd",creditTerm:30,contact:"Ahmad",phone:"012-3456789",email:"ahmad@abc.com"},
    {id:2,name:"XYZ Retail Bhd",creditTerm:60,contact:"Siti",phone:"016-9876543",email:"siti@xyz.com"},
    {id:3,name:"Golden Supply Co",creditTerm:14,contact:"Tan Wei",phone:"011-2233445",email:"tan@golden.com"},
  ],
  invoices:[
    {id:1,customerId:1,invoiceNo:"INV-2025-001",amount:12500,invoiceDate:"2026-01-15",paidAmount:0,status:"unpaid",notes:""},
    {id:2,customerId:1,invoiceNo:"INV-2025-002",amount:8750.5,invoiceDate:"2026-02-01",paidAmount:0,status:"unpaid",notes:""},
    {id:3,customerId:2,invoiceNo:"INV-2025-003",amount:23000,invoiceDate:"2026-01-20",paidAmount:23000,status:"paid",notes:"Paid via TT"},
    {id:4,customerId:2,invoiceNo:"INV-2025-004",amount:15400,invoiceDate:"2026-02-10",paidAmount:5000,status:"partial",notes:""},
    {id:5,customerId:3,invoiceNo:"INV-2025-005",amount:4200,invoiceDate:"2026-02-20",paidAmount:0,status:"unpaid",notes:""},
  ],
  payments:[
    {id:1,invoiceId:3,customerId:2,invoiceNo:"INV-2025-003",customerName:"XYZ Retail Bhd",amount:23000,date:"2026-02-15",note:"Full payment via TT"},
    {id:2,invoiceId:4,customerId:2,invoiceNo:"INV-2025-004",customerName:"XYZ Retail Bhd",amount:5000,date:"2026-02-20",note:"Partial payment"},
  ],
  waLog:[],
  company:"G Wira Trading (M) Sdn Bhd",
  dismissed:[],
};
var currentTab='dashboard';
var currentPayInv=null;

// ── STORAGE ───────────────────────────────────────────────────
function save(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}
function load(){try{var s=localStorage.getItem(SK);if(s){var d=JSON.parse(s);state.customers=d.customers||state.customers;state.invoices=d.invoices||state.invoices;state.payments=d.payments||state.payments;state.waLog=d.waLog||[];state.company=d.company||state.company;state.dismissed=d.dismissed||[];}}catch(e){}}

// ── HELPERS ───────────────────────────────────────────────────
function fmyr(n){return'RM '+Number(n||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fshort(n){var v=Number(n||0);if(v>=1000000)return'RM '+(v/1000000).toFixed(1)+'M';if(v>=1000)return'RM '+(v/1000).toFixed(1)+'K';return'RM '+v.toFixed(0);}
function fdate(d){if(!d)return'-';try{return new Date(d).toLocaleDateString('en-MY',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return'-';}}
function fdshort(d){if(!d)return'-';try{return new Date(d).toLocaleDateString('en-MY',{day:'2-digit',month:'short'});}catch(e){return'-';}}
function mKey(ds){if(!ds)return'?';var d=new Date(ds);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function mLabel(k){if(!k||k==='?')return'Unknown';var p=k.split('-');return new Date(Number(p[0]),Number(p[1])-1,1).toLocaleDateString('en-MY',{month:'long',year:'numeric'});}
function getDueDate(invDate,term){var d=new Date(invDate);d.setDate(d.getDate()+Number(term));return d;}
function getDaysOverdue(due){var t=new Date();t.setHours(0,0,0,0);var d=new Date(due);d.setHours(0,0,0,0);return Math.floor((t-d)/86400000);}
function ageBucket(d){if(d<=0)return'current';if(d<=30)return'1-30';if(d<=60)return'31-60';if(d<=90)return'61-90';return'90+';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function enrichInv(inv){
  var cust=state.customers.find(function(c){return c.id===inv.customerId;});
  if(!cust)return Object.assign({},inv,{customer:null,dueDate:null,daysOverdue:0,outstanding:inv.amount-inv.paidAmount,displayStatus:inv.status||'unpaid',aging:'current'});
  var dueDate=getDueDate(inv.invoiceDate,cust.creditTerm);
  var daysOverdue=getDaysOverdue(dueDate);
  var outstanding=inv.amount-inv.paidAmount;
  var ds=inv.status==='paid'?'paid':daysOverdue>0?'overdue':inv.status==='partial'?'partial':daysOverdue>-7?'due-soon':'current';
  return Object.assign({},inv,{customer:cust,dueDate:dueDate,daysOverdue:daysOverdue,outstanding:outstanding,displayStatus:ds,aging:ageBucket(daysOverdue)});
}
function getEnriched(){return state.invoices.map(enrichInv);}

var STATUS_CFG={
  current:{label:'Current',cls:'badge-current'},
  'due-soon':{label:'Due Soon',cls:'badge-due-soon'},
  overdue:{label:'Overdue',cls:'badge-overdue'},
  paid:{label:'Paid',cls:'badge-paid'},
  partial:{label:'Partial',cls:'badge-partial'},
  unpaid:{label:'Unpaid',cls:'badge-overdue'},
};
var STATUS_COLOR={overdue:'#f87171','due-soon':'#fbbf24',current:'#4ade80',partial:'#c084fc',paid:'#60a5fa',unpaid:'#f87171'};
var AGE_COLOR={current:'#4ade80','1-30':'#a3e635','31-60':'#fbbf24','61-90':'#fb923c','90+':'#f87171'};

function badgeHtml(status){var cfg=STATUS_CFG[status]||STATUS_CFG.current;return'<span class="badge '+cfg.cls+'">'+cfg.label+'</span>';}

function invRowHtml(inv,clickFn){
  var sc=STATUS_CFG[inv.displayStatus]||STATUS_CFG.current;
  var bc=STATUS_COLOR[inv.displayStatus]||'#1e2d4a';
  var late='';
  if(inv.displayStatus!=='paid'&&inv.daysOverdue>0)late='<span class="text-red" style="margin-left:6px;font-weight:600">▲'+inv.daysOverdue+'d late</span>';
  else if(inv.displayStatus!=='paid'&&inv.daysOverdue<=0&&inv.daysOverdue>-7)late='<span class="text-yel" style="margin-left:6px">⚡'+Math.abs(inv.daysOverdue)+'d left</span>';
  return '<div class="inv-row" style="border-left-color:'+bc+'" onclick="'+clickFn+'('+inv.id+')">'
    +'<div class="flex1">'
      +'<div class="inv-name">'+esc(inv.customer?inv.customer.name:'Unknown')+'</div>'
      +'<div class="inv-no">'+esc(inv.invoiceNo)+'</div>'
      +'<div class="inv-meta">Due '+fdshort(inv.dueDate)+' · Net '+(inv.customer?inv.customer.creditTerm:'?')+late+'</div>'
    +'</div>'
    +'<div style="text-align:right;flex-shrink:0">'
      +'<div class="inv-amt" style="color:'+(inv.outstanding>0&&inv.daysOverdue>0?'#f87171':'#e2e8f0')+'">'+fshort(inv.outstanding)+'</div>'
      +badgeHtml(inv.displayStatus)
    +'</div>'
  +'</div>';
}

// ── TAB NAVIGATION ────────────────────────────────────────────
function goTab(tab){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  currentTab=tab;
  renderTab(tab);
}
function renderTab(tab){
  if(tab==='dashboard')renderDashboard();
  else if(tab==='invoices')renderInvoices();
  else if(tab==='reminders')renderReminders();
  else if(tab==='reports')renderReports();
  else if(tab==='import')renderImport();
}
function switchSub(btn,targetId){
  var parent=btn.parentElement;
  parent.querySelectorAll('.sub-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var grandParent=parent.parentElement;
  // hide all siblings of target that are divs
  var divs=grandParent.querySelectorAll('[id]');
  divs.forEach(function(d){if(d.id!==targetId&&d!==parent)d.style.display='none';});
  document.getElementById(targetId).style.display='block';
  renderSubTab(targetId);
}
function renderSubTab(id){
  if(id==='remAlerts')renderAlerts();
  else if(id==='remWa')renderWa();
  else if(id==='repMonthly')renderMonthly();
  else if(id==='repHistory')renderHistory();
  else if(id==='repWaLog')renderWaLog();
}

// ── DASHBOARD ─────────────────────────────────────────────────
function renderDashboard(){
  var enriched=getEnriched();
  var unpaid=enriched.filter(function(i){return i.displayStatus!=='paid';});
  var reminders=enriched.filter(function(i){return(i.displayStatus==='overdue'||i.displayStatus==='due-soon')&&state.dismissed.indexOf(i.id)===-1;});
  reminders.sort(function(a,b){return b.daysOverdue-a.daysOverdue;});

  // badge
  var badge=document.getElementById('remBadge');
  if(reminders.length>0){badge.style.display='';badge.textContent=reminders.length;}else{badge.style.display='none';}

  // alert banner
  var banner=document.getElementById('alertBanner');
  if(reminders.length>0){
    var items=reminders.slice(0,2).map(function(inv){
      return '<div class="flex-between fs13" style="color:#d97706;margin-bottom:4px">'
        +'<span class="flex1 text-ellipsis" style="margin-right:8px">• '+esc(inv.customer?inv.customer.name:'')+' — '+fshort(inv.outstanding)+(inv.daysOverdue>0?' ('+inv.daysOverdue+'d overdue)':'')+'</span>'
        +'<button style="background:none;border:none;color:#92400e;cursor:pointer;font-size:13px" onclick="dismiss('+inv.id+')">✕</button>'
      +'</div>';
    }).join('');
    var more=reminders.length>2?'<button style="font-size:12px;color:#92400e;background:none;border:none;cursor:pointer;padding:0" onclick="goTab(\'reminders\')">See all '+reminders.length+' →</button>':'';
    banner.innerHTML='<div class="alert-banner"><div class="flex gap10" style="align-items:flex-start"><span style="font-size:20px">🔔</span><div style="flex:1"><div class="fw7 text-yel mb4 fs14">'+reminders.length+' Payment Reminder'+(reminders.length>1?'s':'')+'</div>'+items+more+'</div></div></div>';
  }else{banner.innerHTML='';}

  // stats
  var totalOut=unpaid.reduce(function(s,i){return s+i.outstanding;},0);
  var overdue=unpaid.filter(function(i){return i.displayStatus==='overdue';});
  var dueSoon=unpaid.filter(function(i){return i.displayStatus==='due-soon';});
  var current=unpaid.filter(function(i){return i.displayStatus==='current';});
  var stats=[
    {l:'Outstanding',v:fshort(totalOut),c:'#60a5fa'},
    {l:'Overdue',v:fshort(overdue.reduce(function(s,i){return s+i.outstanding;},0)),s:overdue.length+' inv',c:'#f87171'},
    {l:'Due Soon',v:fshort(dueSoon.reduce(function(s,i){return s+i.outstanding;},0)),s:dueSoon.length+' inv',c:'#fbbf24'},
    {l:'Current',v:fshort(current.reduce(function(s,i){return s+i.outstanding;},0)),c:'#4ade80'},
  ];
  document.getElementById('statsGrid').innerHTML=stats.map(function(x){
    return '<div class="stat-card" style="border:1px solid '+x.c+'22"><div style="position:absolute;top:-10px;right:-10px;width:60px;height:60px;background:radial-gradient(circle,'+x.c+'20,transparent 70%)"></div><div class="stat-label">'+x.l+'</div><div class="stat-value" style="color:'+x.c+'">'+x.v+'</div>'+(x.s?'<div class="stat-sub">'+x.s+'</div>':'')+'</div>';
  }).join('');

  // aging
  var aging={current:0,'1-30':0,'31-60':0,'61-90':0,'90+':0};
  unpaid.forEach(function(i){aging[i.aging]=(aging[i.aging]||0)+i.outstanding;});
  var maxVal=Math.max.apply(null,Object.values(aging).concat([1]));
  var agingRows=[{k:'current',l:'Current'},{k:'1-30',l:'1–30 Days'},{k:'31-60',l:'31–60 Days'},{k:'61-90',l:'61–90 Days'},{k:'90+',l:'90+ Days'}];
  document.getElementById('agingBars').innerHTML=agingRows.map(function(b){
    var v=aging[b.k]||0,pct=(v/maxVal)*100,col=AGE_COLOR[b.k];
    return '<div class="aging-row"><div class="aging-meta"><span class="fs12 text-mut">'+b.l+'</span><span class="fs12 fw7" style="color:'+col+'">'+fshort(v)+'</span></div><div class="aging-bar-bg"><div class="aging-bar" style="width:'+pct+'%;background:'+col+'"></div></div></div>';
  }).join('');

  // inv list
  var outstanding=enriched.filter(function(i){return i.displayStatus!=='paid';}).slice(0,5);
  document.getElementById('dashInvList').innerHTML=outstanding.length===0
    ?'<div class="empty">All invoices settled 🎉</div>'
    :outstanding.map(function(inv){return invRowHtml(inv,'openInvDetail');}).join('');
}

            +'<div class="fs12 text-mut" style="margin-top:3px">'+g.invoices.length+' invoice'+(g.invoices.length!==1?'s':'')+(overdueCount>0?' · <span style="color:#f87171;font-weight:700">'+overdueCount+' overdue</span>':'')+'</div>'
          +'</div>'
          +'<div style="text-align:right;flex-shrink:0;margin-left:12px">'
            +'<div class="fw7 fs16" style="color:'+bc+'">'+fmyr(g.totalOS)+'</div>'
            +'<div class="fs13 text-mut" style="margin-top:2px" id="arr-'+gid+'">▼</div>'
          +'</div>'
        +'</div>'
        +'<div id="'+gid+'" style="border-top:1px solid #1e2d4a;'+(expanded?'':'display:none')+'">'
          +g.invoices.map(function(inv){
            var col=STATUS_COLOR[inv.displayStatus]||'#1e2d4a';
            return '<div class="inv-row" style="padding-left:20px;border-left:none" onclick="openInvDetail('+inv.id+')">'
              +'<div class="flex1">'
                +'<div style="font-size:13px;color:#60a5fa;font-weight:600;margin-bottom:2px">'+esc(inv.invoiceNo)+'</div>'
                +'<div class="fs12 text-mut">Due '+fdshort(inv.dueDate)+(inv.daysOverdue>0?' · <span style="color:#f87171;font-weight:700">'+inv.daysOverdue+'d late</span>':'')+'</div>'
              +'</div>'
              +'<div style="text-align:right;flex-shrink:0">'
                +'<div class="fw7 fs14" style="color:'+(inv.outstanding>0&&inv.daysOverdue>0?'#f87171':'#e2e8f0')+'">'+fmyr(inv.outstanding)+'</div>'
                +badgeHtml(inv.displayStatus)
              +'</div>'

      +'</div>';

  }

function confirmPay(){
  var a=parseFloat(document.getElementById('payAmt').value);
  var note=document.getElementById('payNote').value;
  if(!a||!currentPayInv)return;
  var inv=currentPayInv;
  var cust=state.customers.find(function(c){return c.id===inv.customerId;});
  state.payments.unshift({id:Date.now(),invoiceId:inv.id,customerId:inv.customerId,invoiceNo:inv.invoiceNo,customerName:cust?cust.name:'',amount:a,date:new Date().toISOString().split('T')[0],note:note||'Payment recorded'});
  state.invoices=state.invoices.map(function(i){
    if(i.id!==inv.id)return i;
    var np=Math.min(i.paidAmount+a,i.amount);
    return Object.assign({},i,{paidAmount:np,status:np>=i.amount?'paid':'partial'});
  });
  save();hideModal('payModal');renderTab(currentTab);
}

// ── WHATSAPP ──────────────────────────────────────────────────
function getWaStats(){
  var s={};
  state.waLog.forEach(function(l){
    if(!s[l.customerId])s[l.customerId]={count:0,lastDate:null};
    s[l.customerId].count++;
    if(!s[l.customerId].lastDate||l.date>s[l.customerId].lastDate)s[l.customerId].lastDate=l.date;
  });
  return s;
}
function daysSinceWa(cid){
  var ws=getWaStats()[cid];
  if(!ws)return null;
  return Math.floor((new Date()-new Date(ws.lastDate))/86400000);
}
function genWaMsg(cid){
  var cust=state.customers.find(function(c){return c.id===Number(cid);});
  if(!cust)return'';
  var enriched=getEnriched();
  var invs=enriched.filter(function(i){return i.customerId===cust.id&&i.displayStatus!=='paid';});
  if(!invs.length)return'';
  var total=invs.reduce(function(s,i){return s+i.outstanding;},0);
  var hasOD=invs.some(function(i){return i.displayStatus==='overdue';});
  var lines=invs.map(function(i){return'• '+i.invoiceNo+' | Due: '+fdate(i.dueDate)+' | '+fmyr(i.outstanding)+(i.daysOverdue>0?' *('+i.daysOverdue+' days overdue)*':'');}).join('\n');
  var opener=hasOD?'We would like to kindly remind you that the following invoice(s) are now overdue:':'This is a friendly reminder that the following invoice(s) will be due soon:';
  return'Dear *'+cust.name+'*,\n\nWe hope this message finds you well.\n\n'+opener+'\n\n'+lines+'\n\n*Total Outstanding: '+fmyr(total)+'*\n\nKindly arrange payment at your earliest convenience. If payment has already been made, please disregard this message.\n\nThank you for your continued support.\n\nBest regards,\n*'+state.company+'*';
}
function logWa(cid){
  var cust=state.customers.find(function(c){return c.id===Number(cid);});
  state.waLog.unshift({id:Date.now(),customerId:Number(cid),customerName:cust?cust.name:'',date:new Date().toISOString().split('T')[0]});
  save();
}
function copyWa(cid,btn){
  var msg=genWaMsg(cid);
  navigator.clipboard.writeText(msg).then(function(){
    logWa(cid);
    var orig=btn.textContent;btn.textContent='✅ Copied!';
    setTimeout(function(){btn.textContent=orig;renderWa();},2500);
  });
}
function openWa(cid){
  var cust=state.customers.find(function(c){return c.id===Number(cid);});
  var phone=(cust&&cust.phone||'').replace(/[^0-9]/g,'');
  var intl=phone.startsWith('0')?'60'+phone.slice(1):phone;
  logWa(cid);
  window.open('https://wa.me/'+intl+'?text='+encodeURIComponent(genWaMsg(cid)),'_blank');
  renderWa();
}
function renderWa(){
  var el=document.getElementById('remWa');
  if(!el)return;
  var enriched=getEnriched();
  var custsWithOS=state.customers.filter(function(c){return enriched.some(function(i){return i.customerId===c.id&&i.displayStatus!=='paid';});});
  var waStats=getWaStats();
  var html='<div class="card mb16 p14" style="background:linear-gradient(90deg,#0a1a0f,#111827)">'
    +'<div class="fw7 fs15 mb4" style="color:#25d366">💬 WhatsApp Reminder Generator</div>'
    +'<div class="fs13 text-mut">Tap a customer to generate & send a personalised reminder.</div>'
    +'</div>'
    +'<div class="form-group"><label class="lbl">Your Company Name</label><input class="inp" value="'+esc(state.company)+'" oninput="state.company=this.value;save()"/></div>';
  if(custsWithOS.length===0){
    html+='<div class="card p14" style="text-align:center"><div style="font-size:28px;margin-bottom:8px">🎉</div><div class="fw7 text-grn">No outstanding invoices!</div></div>';
  }else{
    custsWithOS.forEach(function(cust){
      var custInvs=enriched.filter(function(i){return i.customerId===cust.id&&i.displayStatus!=='paid';});
      var totalOS=custInvs.reduce(function(s,i){return s+i.outstanding;},0);
      var hasOD=custInvs.some(function(i){return i.displayStatus==='overdue';});
      var ws=waStats[cust.id];
      var ds=daysSinceWa(cust.id);
      var needsChase=ds===null||(hasOD&&ds>=3)||(!hasOD&&ds>=7);
      var borderCol=needsChase?(hasOD?'#f87171':'#fbbf24'):'#25d366';
      var tags='';
      if(ws){
        tags+='<div class="tag" style="background:#0a1a0f;border:1px solid #166534">💬 <span class="fw7 text-grn">'+ws.count+'x</span> <span class="text-mut">reminded</span></div>';
        tags+='<div class="tag" style="background:#0d0f14;border:1px solid #1e2d4a">🕐 <span class="text-mut">Last:</span> <span class="fw7">'+(ds===0?'Today':ds===1?'Yesterday':ds+'d ago')+'</span></div>';
        if(needsChase)tags+='<div class="tag" style="background:'+(hasOD?'#3a0a0a':'#3a2a0a')+';border:1px solid '+(hasOD?'#991b1b':'#92400e')+'">🔔 <span class="fw7" style="color:'+(hasOD?'#f87171':'#fbbf24')+'">Time to follow up!</span></div>';
      }else{
        tags='<div class="tag" style="background:#3a2a0a;border:1px solid #92400e">⚠️ <span class="fw7 text-yel">Not reminded yet</span></div>';
      }
      html+='<div class="card mb12" style="border-left:4px solid '+borderCol+'">'
        +'<div class="p14">'
          +'<div class="flex-between mb12">'
            +'<div class="flex1"><div class="fw7 fs15 text-ellipsis">'+esc(cust.name)+'</div><div class="fs12 text-mut mt2">'+(cust.contact||'—')+' · '+(cust.phone||'No phone')+'</div></div>'
            +'<div style="text-align:right;flex-shrink:0;margin-left:10px"><div class="fw7 fs15" style="color:'+(hasOD?'#f87171':'#fbbf24')+'">'+fmyr(totalOS)+'</div><div class="fs12 text-mut">'+custInvs.length+' invoice'+(custInvs.length!==1?'s':'')+'</div></div>'
          +'</div>'
          +'<div class="flex gap8 mb12" style="flex-wrap:wrap">'+tags+'</div>'
          +'<div class="wa-msg">'+esc(genWaMsg(cust.id))+'</div>'
          +'<div class="btn-row">'
            +'<button class="btn btn-ghost" style="flex:1;font-size:13px" onclick="copyWa('+cust.id+',this)">📋 Copy Text</button>'
            +(cust.phone?'<button class="btn btn-wa" style="flex:1;font-size:13px" onclick="openWa('+cust.id+')">📱 Open WhatsApp</button>':'')
          +'</div>'
        +'</div>'
      +'</div>';
    });
  }
  el.innerHTML=html;
}

// ── REPORTS ───────────────────────────────────────────────────
function renderReports(){renderMonthly();}
function renderMonthly(){
  var el=document.getElementById('repMonthly');if(!el)return;
  var months={};
  state.payments.forEach(function(p){var k=mKey(p.date);if(!months[k])months[k]={key:k,label:mLabel(k)};});
  state.invoices.forEach(function(i){var k=mKey(i.invoiceDate);if(!months[k])months[k]={key:k,label:mLabel(k)};});
  var list=Object.values(months).sort(function(a,b){return b.key.localeCompare(a.key);});
  if(!list.length){el.innerHTML='<div class="card p14" style="text-align:center;color:#64748b">No data yet.</div>';return;}
  el.innerHTML='<div class="fw7 fs16 mb4">📅 Monthly Collection Report</div><div class="fs13 text-mut mb16">Overview of payments collected each month.</div>'
    +list.map(function(m){
      var mPays=state.payments.filter(function(p){return mKey(p.date)===m.key;});
      var mInvs=state.invoices.filter(function(i){return mKey(i.invoiceDate)===m.key;});
      var invoiced=mInvs.reduce(function(s,i){return s+i.amount;},0);
      var collected=mPays.reduce(function(s,p){return s+p.amount;},0);
      var rate=invoiced>0?Math.round((collected/invoiced)*100):0;
      var barCol=rate>=80?'#4ade80':rate>=50?'#fbbf24':'#f87171';
      return '<div class="card mb12 report-month" onclick="toggleMonth(this,\''+m.key+'\')">'
        +'<div class="p14">'
          +'<div class="flex-between mb12"><div class="fw7 fs15">'+m.label+'</div><div class="fs12 text-mut">'+mPays.length+' payment'+(mPays.length!==1?'s':'')+'</div></div>'
          +'<div class="collection-grid">'
            +'<div class="collection-cell"><div class="collection-cell-label">Invoiced</div><div class="collection-cell-value text-mut">'+fshort(invoiced)+'</div></div>'
            +'<div class="collection-cell"><div class="collection-cell-label">Collected</div><div class="collection-cell-value text-grn">'+fshort(collected)+'</div></div>'
            +'<div class="collection-cell"><div class="collection-cell-label">Rate</div><div class="collection-cell-value" style="color:'+barCol+'">'+rate+'%</div></div>'
          +'</div>'
          +'<div class="aging-bar-bg"><div class="aging-bar" style="width:'+Math.min(rate,100)+'%;background:'+barCol+'"></div></div>'
        +'</div>'
        +(mPays.length>0?'<div class="month-detail" style="display:none;border-top:1px solid #1e2d4a;padding:12px 16px">'
          +'<div class="fs12 fw7 text-mut mb8" style="text-transform:uppercase;letter-spacing:0.4px">Payments this month</div>'
          +mPays.map(function(p){return'<div class="flex-between" style="padding:8px 0;border-bottom:1px solid #1e2d4a"><div><div class="fs13 fw7">'+esc(p.customerName)+'</div><div class="fs12 text-mut">'+esc(p.invoiceNo)+' · '+fdate(p.date)+'</div></div><div class="fw7 text-grn fs14">'+fmyr(p.amount)+'</div></div>';}).join('')
        +'</div>':'')
      +'</div>';
    }).join('');
}
function toggleMonth(el,key){
  var detail=el.querySelector('.month-detail');
  if(detail)detail.style.display=detail.style.display==='none'?'block':'none';
}
function renderHistory(){
  var el=document.getElementById('repHistory');if(!el)return;

  var filtered=state.payments.filter(function(p){if(!search)return true;return p.customerName.toLowerCase().indexOf(search)!==-1||p.invoiceNo.toLowerCase().indexOf(search)!==-1;});
  el.innerHTML='<div class="fw7 fs16 mb4">📜 Payment History</div><div class="fs13 text-mut mb12">Every payment recorded.</div>'
    +'<input class="inp mb12" placeholder="🔍 Search…" oninput="renderHistory()" style="padding:10px 14px"/>'
    +(filtered.length===0?'<div class="card p14" style="text-align:center;color:#64748b">No payment history yet.</div>'
    :'<div class="card">'
      +filtered.map(function(p){return'<div class="inv-row"><div class="flex1"><div class="fw7 fs14 text-ellipsis">'+esc(p.customerName)+'</div><div class="fs12 text-blue">'+esc(p.invoiceNo)+'</div><div class="fs12 text-mut">'+fdate(p.date)+(p.note?' · '+esc(p.note):'')+'</div></div><div class="fw7 text-grn fs16" style="flex-shrink:0">'+fmyr(p.amount)+'</div></div>';}).join('')
      +'<div class="flex-between p14" style="background:#0a1a0f"><div class="fw7 fs14">Total ('+filtered.length+')</div><div class="fw7 text-grn fs16">'+fmyr(filtered.reduce(function(s,p){return s+p.amount;},0))+'</div></div>'

        return'<div class="inv-row"><div class="flex1"><div class="fw7 fs14 text-ellipsis">'+esc(c.name)+'</div><div class="fs12 text-mut">Last: '+(ds===0?'Today':ds===1?'Yesterday':ds+' days ago')+' · '+fdate(ws.lastDate)+'</div></div>'
          +'<div class="flex-center gap10" style="flex-shrink:0">'+(hasOS&&ds!==null&&ds>=3?'<span class="fs12 text-red fw7">⚠️ Chase!</span>':'')+'<div style="background:#0a1a0f;border:1px solid #166534;border-radius:20px;padding:4px 12px;font-weight:700;color:#4ade80;font-size:14px">'+ws.count+'x</div></div></div>';
      }).join('')
    +'</div>':'')
    +(state.waLog.length===0?'<div class="card p14" style="text-align:center;color:#64748b">No reminders sent yet.</div>'
    :'<div class="fs12 fw7 text-mut mb8" style="text-transform:uppercase;letter-spacing:0.4px">Full Log ('+state.waLog.length+' total)</div>'
    +'<div class="card">'+state.waLog.map(function(l){return'<div class="inv-row"><div><div class="fs13 fw7">'+esc(l.customerName)+'</div><div class="fs12 text-mut">'+fdate(l.date)+'</div></div><div class="fs12 fw7" style="color:#25d366">💬 Sent</div></div>';}).join('')+'</div>');
}

// ── IMPORT ────────────────────────────────────────────────────
var importState={stage:'idle',rows:[],file:'',added:0,updated:0,custCreated:0,total:0};
function renderImport(){
  var el=document.getElementById('importContent');if(!el)return;
  if(importState.stage==='done'){
    el.innerHTML='<div class="card p14" style="text-align:center;max-width:440px;margin:0 auto">'
      +'<div style="font-size:44px;margin-bottom:12px">🎉</div>'
      +'<div class="fw7" style="font-size:20px;color:#4ade80;margin-bottom:16px">Import Done!</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">'
      +[['Added',importState.added,'#60a5fa'],['Updated',importState.updated,'#4ade80'],['New Customers',importState.custCreated,'#c084fc'],['Total',importState.total,'#fbbf24']].map(function(x){return'<div style="background:#0d0f14;border-radius:10px;padding:14px;border:1px solid '+x[2]+'33"><div class="fw7" style="font-size:26px;color:'+x[2]+'">'+x[1]+'</div><div class="fs12 text-mut">'+x[0]+'</div></div>';}).join('')
      +'</div>'
      +'<div class="btn-row"><button class="btn btn-primary btn-full" onclick="importState.stage=\'idle\';goTab(\'dashboard\')">View Dashboard</button><button class="btn btn-ghost btn-full" onclick="importState.stage=\'idle\';renderImport()">Import Again</button></div>'
    +'</div>';
    return;
  }
  el.innerHTML='<div class="fw7 fs16 mb4">📥 Import from Autocount</div>'
    +'<div class="fs14 text-mut mb16" style="line-height:1.6">Export <strong style="color:#fbbf24">Outstanding AR Invoice</strong> from Autocount as Excel (.xlsx), then upload below.</div>'
    +'<div class="import-info"><strong>✅ Autocount format auto-detected!</strong><br><strong>🔄 Weekly upload is safe!</strong> Same invoice = updated only, never duplicated.</div>'
    +'<div class="drop-zone" id="dropZone" onclick="pickFile()" ondragover="event.preventDefault();this.classList.add(\'dragover\')" ondragleave="this.classList.remove(\'dragover\')" ondrop="handleDrop(event)">'
      +'<div style="font-size:44px;margin-bottom:12px">📊</div>'
      +'<div class="fw7 fs16 mb4">Tap or drop file here</div>'
      +'<div class="fs13 text-mut mb16">.xlsx from Autocount Outstanding AR Invoice</div>'
      +'<button class="btn btn-primary" onclick="event.stopPropagation();pickFile()">Browse File</button>'
      +'<input id="xlsxFile" type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFileInput(this)"/>'
    +'</div>';
}
function pickFile(){var f=document.getElementById('xlsxFile');if(f)f.click();}
function handleDrop(e){e.preventDefault();document.getElementById('dropZone').classList.remove('dragover');var f=e.dataTransfer.files[0];if(f)readFile(f);}
function handleFileInput(inp){if(inp.files[0])readFile(inp.files[0]);}
function loadXlsx(cb){
  if(window.XLSX){cb();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload=cb;
  s.onerror=function(){alert('Could not load Excel reader. Check internet connection.');};
  document.head.appendChild(s);
}
function readFile(file){
  importState.file=file.name;
  var ext=file.name.split('.').pop().toLowerCase();
  if(ext==='csv'){
    var reader=new FileReader();
    reader.onload=function(e){parseCSV(e.target.result);};
    reader.readAsText(file);
  }else{
    var dz=document.getElementById('dropZone');
    if(dz)dz.innerHTML='<div style="font-size:32px;margin-bottom:8px">⏳</div><div class="fw7 fs15">Loading Excel reader…</div>';
    loadXlsx(function(){
      var reader=new FileReader();
      reader.onload=function(e){
        try{
          var data=new Uint8Array(e.target.result);
          var wb=XLSX.read(data,{type:'array',cellDates:true});
          var ws=wb.Sheets[wb.SheetNames[0]];
          var raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:false});
          parseAutocountRows(raw);
        }catch(err){alert('Could not read Excel: '+err.message);}
      };
      reader.readAsArrayBuffer(file);
    });
  }
}
function parseAutocountRows(raw){
  var invoices=[];
  raw.forEach(function(row){
    if(!row||row.length<38)return;
    var col0=row[0];var col4=row[4];var col7=row[7];var col17=row[17];var col21=row[21];var col37=row[37];
    // Autocount data rows: col4='IN', col7=invoiceNo, col17=companyName
    var hasIN=col4&&String(col4).trim()==='IN';
    var hasInvNo=col7&&String(col7).trim().length>0;
    var hasCust=col17&&String(col17).trim().length>0;
    if(!hasIN||!hasInvNo||!hasCust)return;
    var invDate='';
    if(col0){
      if(typeof col0==='object'&&col0.toISOString){invDate=col0.toISOString().split('T')[0];}
      else{var d=new Date(col0);if(!isNaN(d))invDate=d.toISOString().split('T')[0];}
    }
    var invNo=String(col7).trim();
    var custName=String(col17).trim();
    var amount=parseFloat(String(col21||'0').replace(/[^0-9.\-]/g,''))||0;
    var outstanding=parseFloat(String(col37||col21||'0').replace(/[^0-9.\-]/g,''))||0;
    var paid=Math.max(0,amount-outstanding);
    var status=paid>=amount?'paid':paid>0?'partial':'unpaid';
    invoices.push({invNo:invNo,custName:custName,amount:amount,outstanding:outstanding,paid:paid,invDate:invDate,status:status});
  });
  if(!invoices.length){alert('Could not detect Autocount invoice rows.\n\nMake sure you export "Outstanding AR Invoice" report from Autocount as .xlsx');renderImport();return;}
  doImport(invoices);
}
function parseCSV(text){
  var lines=text.split('\n').filter(function(l){return l.trim();});
  if(!lines.length){alert('File empty');return;}
  var headers=lines[0].split(',').map(function(h){return h.trim().replace(/"/g,'').toLowerCase();});
  var custIdx=-1,invIdx=-1,amtIdx=-1,osIdx=-1,dateIdx=-1;
  headers.forEach(function(h,i){
    if(['customer name','debtor name','company name','name'].indexOf(h)!==-1)custIdx=i;
    if(['invoice no','inv no','doc no','invoice number'].indexOf(h)!==-1)invIdx=i;
    if(['amount','invoice amount','total'].indexOf(h)!==-1)amtIdx=i;
    if(['outstanding','balance','o/s'].indexOf(h)!==-1)osIdx=i;
    if(['invoice date','inv date','date'].indexOf(h)!==-1)dateIdx=i;
  });
  if(custIdx===-1||invIdx===-1){alert('Cannot find required columns.\nFound: '+headers.join(', '));return;}
  var invoices=[];
  for(var i=1;i<lines.length;i++){
    var cols=lines[i].split(',').map(function(c){return c.trim().replace(/"/g,'');});
    var custName=(cols[custIdx]||'').trim();var invNo=(cols[invIdx]||'').trim();
    if(!custName||!invNo)continue;
    var amount=amtIdx!==-1?parseFloat((cols[amtIdx]||'0').replace(/[^0-9.\-]/g,''))||0:0;
    var outstanding=osIdx!==-1?parseFloat((cols[osIdx]||'0').replace(/[^0-9.\-]/g,'')):amount;
    var paid=Math.max(0,amount-outstanding);
    var invDate=dateIdx!==-1?cols[dateIdx]:'';
    var status=paid>=amount?'paid':paid>0?'partial':'unpaid';
    invoices.push({invNo:invNo,custName:custName,amount:amount,outstanding:outstanding,paid:paid,invDate:invDate,status:status});
  }
  doImport(invoices);
}
function doImport(invoices){
  var nc=[].concat(state.customers);
  var ni=[].concat(state.invoices);
  var added=0,updated=0,custCreated=0;
  invoices.forEach(function(row){
    if(!row.custName||!row.invNo)return;
    var cust=nc.find(function(c){return c.name.toLowerCase()===row.custName.toLowerCase();});
    if(!cust){cust={id:Date.now()+Math.random(),name:row.custName,creditTerm:0,contact:'',phone:'',email:''};nc.push(cust);custCreated++;}
    var ex=ni.find(function(i){return i.invoiceNo===row.invNo;});
    if(ex){Object.assign(ex,{amount:row.amount,paidAmount:row.paid,status:row.status,invoiceDate:row.invDate||ex.invoiceDate});updated++;}
    else{ni.push({id:Date.now()+Math.random(),customerId:cust.id,invoiceNo:row.invNo,amount:row.amount,invoiceDate:row.invDate||new Date().toISOString().split('T')[0],paidAmount:row.paid,status:row.status,notes:'Imported'});added++;}
  });
  state.customers=nc;state.invoices=ni;save();
  importState.stage='done';importState.added=added;importState.updated=updated;importState.custCreated=custCreated;importState.total=invoices.length;
  renderImport();
}
