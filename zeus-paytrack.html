<script>
// ── STATE ─────────────────────────────────────────────────────
var SK='paytrack-v8';
var state={
  customers:[
    {id:1,name:"ABC Trading Sdn Bhd",creditTerm:30,contact:"Ahmad",phone:"012-3456789",email:""},
    {id:2,name:"XYZ Retail Bhd",creditTerm:60,contact:"Siti",phone:"016-9876543",email:""},
    {id:3,name:"Golden Supply Co",creditTerm:14,contact:"Tan Wei",phone:"011-2233445",email:""},
  ],
  invoices:[
    {id:1,customerId:1,invoiceNo:"INV-2025-001",amount:12500,invoiceDate:"2026-01-15",paidAmount:0,status:"unpaid",notes:""},
    {id:2,customerId:1,invoiceNo:"INV-2025-002",amount:8750,invoiceDate:"2026-02-01",paidAmount:0,status:"unpaid",notes:""},
    {id:3,customerId:2,invoiceNo:"INV-2025-003",amount:23000,invoiceDate:"2026-01-20",paidAmount:23000,status:"paid",notes:""},
    {id:4,customerId:2,invoiceNo:"INV-2025-004",amount:15400,invoiceDate:"2026-02-10",paidAmount:5000,status:"partial",notes:""},
    {id:5,customerId:3,invoiceNo:"INV-2025-005",amount:4200,invoiceDate:"2026-02-20",paidAmount:0,status:"unpaid",notes:""},
  ],
  payments:[
    {id:1,invoiceId:3,customerId:2,invoiceNo:"INV-2025-003",customerName:"XYZ Retail Bhd",amount:23000,date:"2026-02-15",note:"Full payment"},
    {id:2,invoiceId:4,customerId:2,invoiceNo:"INV-2025-004",customerName:"XYZ Retail Bhd",amount:5000,date:"2026-02-20",note:"Partial"},
  ],
  waLog:[],
  company:"G Wira Trading (M) Sdn Bhd",
  dismissed:[],
};
var currentTab='dashboard';
var currentPayInv=null;
var invView='invoice';

// ── STORAGE ───────────────────────────────────────────────────
function save(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}
function load(){
  try{
    var s=localStorage.getItem(SK);
    if(s){var d=JSON.parse(s);
      state.customers=d.customers||state.customers;
      state.invoices=d.invoices||state.invoices;
      state.payments=d.payments||state.payments;
      state.waLog=d.waLog||[];
      state.company=d.company||state.company;
      state.dismissed=d.dismissed||[];
    }
  }catch(e){}
}

// ── HELPERS ───────────────────────────────────────────────────
function fmyr(n){return'RM '+Number(n||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fshort(n){var v=Number(n||0);if(v>=1000000)return'RM '+(v/1000000).toFixed(1)+'M';if(v>=1000)return'RM '+(v/1000).toFixed(1)+'K';return'RM '+v.toFixed(0);}
function fdate(d){if(!d||d===''||d==='undefined')return'—';try{var dt=new Date(d+'T00:00:00');if(isNaN(dt))return'—';return dt.toLocaleDateString('en-MY',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return'—';}}
function fdshort(d){if(!d||d===''||d==='undefined')return'—';try{var dt=new Date(d+'T00:00:00');if(isNaN(dt))return'—';return dt.toLocaleDateString('en-MY',{day:'2-digit',month:'short'});}catch(e){return'—';}}
function mKey(ds){if(!ds)return'?';var p=ds.split('-');return p[0]+'-'+p[1];}
function mLabel(k){if(!k||k==='?')return'Unknown';var p=k.split('-');return new Date(Number(p[0]),Number(p[1])-1,1).toLocaleDateString('en-MY',{month:'long',year:'numeric'});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Parse Malaysian date DD/MM/YYYY → YYYY-MM-DD
function parseMYDate(val){
  if(!val)return'';
  if(typeof val==='object'&&val.toISOString){
    // SheetJS Date object — use UTC to avoid timezone shift
    var y=val.getFullYear(),mo=val.getMonth()+1,d=val.getDate();
    return y+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  }
  var s=String(val).trim();
  // DD/MM/YYYY
  var m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m){var d=parseInt(m[1]),mo=parseInt(m[2]),y=parseInt(m[3]);return y+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
  // Already YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  return'';
}

function getDueDate(invDate,term){
  if(!invDate)return null;
  var d=new Date(invDate+'T00:00:00');
  if(isNaN(d))return null;
  d.setDate(d.getDate()+Number(term||0));
  return d;
}
function getDaysOverdue(due){
  var t=new Date();t.setHours(0,0,0,0);
  var d=new Date(due);d.setHours(0,0,0,0);
  return Math.floor((t-d)/86400000);
}
function ageBucket(d){if(d<=0)return'current';if(d<=30)return'1-30';if(d<=60)return'31-60';if(d<=90)return'61-90';return'90+';}

function enrichInv(inv){
  var cust=state.customers.find(function(c){return c.id===inv.customerId;});
  if(!cust)return Object.assign({},inv,{customer:null,dueDate:null,daysOverdue:0,outstanding:inv.amount-inv.paidAmount,displayStatus:inv.status||'unpaid',aging:'current'});
  // Use saved dueDate from Autocount if available, else calculate from credit term
  var dueDate;
  if(inv.dueDate){
    var dd=new Date(inv.dueDate+'T00:00:00');
    dueDate=isNaN(dd)?getDueDate(inv.invoiceDate,cust.creditTerm):dd;
  }else{
    dueDate=getDueDate(inv.invoiceDate,cust.creditTerm);
  }
  var daysOverdue=dueDate?getDaysOverdue(dueDate):0;
  var outstanding=inv.amount-inv.paidAmount;
  var ds;
  if(inv.status==='paid') ds='paid';
  else if(!dueDate) ds='current';
  else if(daysOverdue>0) ds='overdue';
  else if(inv.status==='partial') ds='partial';
  else if(daysOverdue>-7) ds='due-soon';
  else ds='current';
  return Object.assign({},inv,{customer:cust,dueDate:dueDate,daysOverdue:daysOverdue,outstanding:outstanding,displayStatus:ds,aging:ageBucket(daysOverdue)});
}
function getEnriched(){return state.invoices.map(enrichInv);}

var STATUS_CFG={current:{label:'Current',cls:'badge-current'},'due-soon':{label:'Due Soon',cls:'badge-due-soon'},overdue:{label:'Overdue',cls:'badge-overdue'},paid:{label:'Paid',cls:'badge-paid'},partial:{label:'Partial',cls:'badge-partial'},unpaid:{label:'Unpaid',cls:'badge-overdue'}};
var STATUS_COLOR={overdue:'#f87171','due-soon':'#fbbf24',current:'#4ade80',partial:'#c084fc',paid:'#60a5fa',unpaid:'#f87171'};
var AGE_COLOR={current:'#4ade80','1-30':'#a3e635','31-60':'#fbbf24','61-90':'#fb923c','90+':'#f87171'};
function badgeHtml(status){var cfg=STATUS_CFG[status]||STATUS_CFG.current;return'<span class="badge '+cfg.cls+'">'+cfg.label+'</span>';}

function invRowHtml(inv,clickFn){
  var bc=STATUS_COLOR[inv.displayStatus]||'#1e2d4a';
  var late='';
  if(inv.displayStatus!=='paid'&&inv.daysOverdue>0) late=' <span style="color:#f87171;font-weight:700">▲'+inv.daysOverdue+'d</span>';
  else if(inv.displayStatus==='due-soon') late=' <span style="color:#fbbf24;font-weight:700">⚡'+Math.abs(inv.daysOverdue)+'d left</span>';
  return'<div class="inv-row" style="border-left-color:'+bc+'" onclick="'+clickFn+'('+inv.id+')">'
    +'<div class="flex1">'
      +'<div class="inv-name">'+esc(inv.customer?inv.customer.name:'Unknown')+'</div>'
      +'<div class="inv-no">'+esc(inv.invoiceNo)+'</div>'
      +'<div class="inv-meta">Due '+fdshort(inv.dueDate)+(inv.customer?' · Net '+inv.customer.creditTerm+'d':'')+late+'</div>'
    +'</div>'
    +'<div style="text-align:right;flex-shrink:0">'
      +'<div class="inv-amt" style="color:'+(inv.outstanding>0&&inv.daysOverdue>0?'#f87171':'#e2e8f0')+'">'+fshort(inv.outstanding)+'</div>'
      +badgeHtml(inv.displayStatus)
    +'</div>'
  +'</div>';
}

// ── NAVIGATION ────────────────────────────────────────────────
function goTab(tab){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  currentTab=tab;renderTab(tab);
}
function renderTab(tab){
  if(tab==='dashboard')renderDashboard();
  else if(tab==='invoices')renderInvoices();
  else if(tab==='reminders')renderReminders();
  else if(tab==='reports')renderReports();
  else if(tab==='import')renderImport();
}
function switchSub(btn,targetId){
  var parent=btn.parentElement;
  parent.querySelectorAll('.sub-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var gp=parent.parentElement;
  gp.querySelectorAll('[id]').forEach(function(d){if(d.id!==targetId&&d!==parent)d.style.display='none';});
  document.getElementById(targetId).style.display='block';
  renderSubTab(targetId);
}
function renderSubTab(id){
  if(id==='remAlerts')renderAlerts();
  else if(id==='remWa')renderWa();
  else if(id==='repMonthly')renderMonthly();
  else if(id==='repHistory')renderHistory();
  else if(id==='repWaLog')renderWaLog();
}

// ── DASHBOARD ─────────────────────────────────────────────────
function renderDashboard(){
  var enriched=getEnriched();
  var unpaid=enriched.filter(function(i){return i.displayStatus!=='paid';});
  var reminders=enriched.filter(function(i){return(i.displayStatus==='overdue'||i.displayStatus==='due-soon')&&state.dismissed.indexOf(i.id)===-1;});
  reminders.sort(function(a,b){return b.daysOverdue-a.daysOverdue;});
  var badge=document.getElementById('remBadge');
  if(reminders.length>0){badge.style.display='';badge.textContent=reminders.length;}else{badge.style.display='none';}
  var banner=document.getElementById('alertBanner');
  if(reminders.length>0){
    var items=reminders.slice(0,2).map(function(inv){
      return'<div class="flex-between fs13" style="color:#d97706;margin-bottom:4px">'
        +'<span class="flex1 text-ellipsis" style="margin-right:8px">• '+esc(inv.customer?inv.customer.name:'')+' — '+fshort(inv.outstanding)+(inv.daysOverdue>0?' ('+inv.daysOverdue+'d overdue)':'')+'</span>'
        +'<button style="background:none;border:none;color:#92400e;cursor:pointer;font-size:14px;padding:0 4px" onclick="dismiss('+inv.id+')">✕</button>'
      +'</div>';
    }).join('');
    var more=reminders.length>2?'<button style="font-size:12px;color:#92400e;background:none;border:none;cursor:pointer;padding:0" onclick="goTab(\'reminders\')">See all '+reminders.length+' →</button>':'';
    banner.innerHTML='<div class="alert-banner"><div class="flex gap10" style="align-items:flex-start"><span style="font-size:20px">🔔</span><div style="flex:1"><div class="fw7 text-yel mb4 fs14">'+reminders.length+' Payment Reminder'+(reminders.length>1?'s':'')+'</div>'+items+more+'</div></div></div>';
  }else{banner.innerHTML='';}
  var totalOut=unpaid.reduce(function(s,i){return s+i.outstanding;},0);
  var overdue=unpaid.filter(function(i){return i.displayStatus==='overdue';});
  var dueSoon=unpaid.filter(function(i){return i.displayStatus==='due-soon';});
  var current=unpaid.filter(function(i){return i.displayStatus==='current';});
  var stats=[
    {l:'Outstanding',v:fshort(totalOut),c:'#60a5fa'},
    {l:'Overdue',v:fshort(overdue.reduce(function(s,i){return s+i.outstanding;},0)),s:overdue.length+' inv',c:'#f87171'},
    {l:'Due Soon',v:fshort(dueSoon.reduce(function(s,i){return s+i.outstanding;},0)),s:dueSoon.length+' inv',c:'#fbbf24'},
    {l:'Current',v:fshort(current.reduce(function(s,i){return s+i.outstanding;},0)),c:'#4ade80'},
  ];
  document.getElementById('statsGrid').innerHTML=stats.map(function(x){
    return'<div class="stat-card" style="border:1px solid '+x.c+'22"><div class="stat-label">'+x.l+'</div><div class="stat-value" style="color:'+x.c+'">'+x.v+'</div>'+(x.s?'<div class="stat-sub">'+x.s+'</div>':'')+'</div>';
  }).join('');
  var aging={current:0,'1-30':0,'31-60':0,'61-90':0,'90+':0};
  unpaid.forEach(function(i){aging[i.aging]=(aging[i.aging]||0)+i.outstanding;});
  var maxVal=Math.max.apply(null,Object.values(aging).concat([1]));
  document.getElementById('agingBars').innerHTML=[{k:'current',l:'Current'},{k:'1-30',l:'1–30 Days'},{k:'31-60',l:'31–60 Days'},{k:'61-90',l:'61–90 Days'},{k:'90+',l:'90+ Days'}].map(function(b){
    var v=aging[b.k]||0,pct=(v/maxVal)*100,col=AGE_COLOR[b.k];
    return'<div class="aging-row"><div class="aging-meta"><span class="fs12 text-mut">'+b.l+'</span><span class="fs12 fw7" style="color:'+col+'">'+fshort(v)+'</span></div><div class="aging-bar-bg"><div class="aging-bar" style="width:'+pct+'%;background:'+col+'"></div></div></div>';
  }).join('');
  var outstanding=enriched.filter(function(i){return i.displayStatus!=='paid';}).slice(0,5);
  document.getElementById('dashInvList').innerHTML=outstanding.length===0?'<div class="empty">All invoices settled 🎉</div>':outstanding.map(function(inv){return invRowHtml(inv,'openInvDetail');}).join('');
}

function setInvView(v){
  invView=v;
  document.getElementById('btnByInv').className='btn btn-sm '+(v==='invoice'?'btn-primary':'btn-ghost');

function renderInvoices(){
  var enriched=getEnriched();
  var search=(document.getElementById('invSearch').value||'').toLowerCase();
  var status=document.getElementById('invStatus').value;
  var filtered=enriched.filter(function(i){
    if(status!=='all'&&i.displayStatus!==status)return false;
    if(search&&i.invoiceNo.toLowerCase().indexOf(search)===-1&&(!i.customer||i.customer.name.toLowerCase().indexOf(search)===-1))return false;
    return true;
  });
  filtered.sort(function(a,b){return b.daysOverdue-a.daysOverdue;});
  var sel=document.getElementById('newInvCust');
  sel.innerHTML='<option value="">Select customer…</option>'+state.customers.map(function(c){return'<option value="'+c.id+'">'+esc(c.name)+' (Net '+c.creditTerm+'d)</option>';}).join('');
  if(filtered.length===0){document.getElementById('invList').innerHTML='<div class="card"><div class="empty">No invoices found</div></div>';return;}
  if(invView==='invoice'){
    document.getElementById('invList').innerHTML='<div class="card">'+filtered.map(function(inv){return invRowHtml(inv,'openInvDetail');}).join('')+'</div>';
  }else{
    var groups={};
    filtered.forEach(function(inv){
      var cid=inv.customerId;
      if(!groups[cid])groups[cid]={customer:inv.customer,invoices:[],totalOS:0,maxDO:-9999,hasOD:false};
      groups[cid].invoices.push(inv);groups[cid].totalOS+=inv.outstanding;
      if(inv.daysOverdue>groups[cid].maxDO)groups[cid].maxDO=inv.daysOverdue;
      if(inv.displayStatus==='overdue')groups[cid].hasOD=true;
    });
    var gl=Object.values(groups).sort(function(a,b){return b.maxDO-a.maxDO;});
    document.getElementById('invList').innerHTML=gl.map(function(g,gi){
      var bc=g.hasOD?'#f87171':g.maxDO>-7?'#fbbf24':'#4ade80';
      var odCount=g.invoices.filter(function(i){return i.displayStatus==='overdue';}).length;
      var gid='grp'+gi;
      return'<div class="card mb12" style="border-left:4px solid '+bc+'">'
        +'<div style="padding:14px 16px;cursor:pointer" onclick="toggleGrp(\''+gid+'\')">'
          +'<div class="flex-between">'
            +'<div class="flex1"><div class="fw7 fs15 text-ellipsis">'+esc(g.customer?g.customer.name:'Unknown')+'</div>'
            +'<div class="fs12 text-mut" style="margin-top:3px">'+g.invoices.length+' invoice'+(g.invoices.length!==1?'s':'')+(odCount>0?' · <span style="color:#f87171;font-weight:700">'+odCount+' overdue</span>':'')+'</div></div>'
            +'<div style="text-align:right;margin-left:12px"><div class="fw7 fs15" style="color:'+bc+'">'+fmyr(g.totalOS)+'</div><div class="fs13 text-mut" id="arr'+gid+'">▼</div></div>'
          +'</div>'
        +'</div>'
        +'<div id="'+gid+'" style="border-top:1px solid #1e2d4a;display:none">'
          +g.invoices.map(function(inv){
            var col=STATUS_COLOR[inv.displayStatus]||'#1e2d4a';
            return'<div class="inv-row" style="padding-left:20px;border-left:none" onclick="openInvDetail('+inv.id+')">'
              +'<div class="flex1"><div class="fs13 fw7 text-blue mb4">'+esc(inv.invoiceNo)+'</div>'
              +'<div class="fs12 text-mut">Due '+fdshort(inv.dueDate)+(inv.daysOverdue>0?' · <span style="color:#f87171;font-weight:700">'+inv.daysOverdue+'d late</span>':'')+'</div></div>'
              +'<div style="text-align:right;flex-shrink:0"><div class="fw7 fs14 mb4" style="color:'+(inv.outstanding>0&&inv.daysOverdue>0?'#f87171':'#e2e8f0')+'">'+fmyr(inv.outstanding)+'</div>'+badgeHtml(inv.displayStatus)+'</div>'
            +'</div>';
          }).join('')
        +'</div>'
      +'</div>';
    }).join('');
  }
}
function toggleGrp(gid){
  var el=document.getElementById(gid),arr=document.getElementById('arr'+gid);
  if(!el)return;
  var show=el.style.display==='none';
  el.style.display=show?'block':'none';
  if(arr)arr.textContent=show?'▲':'▼';
}

function confirmPay(){
  var a=parseFloat(document.getElementById('payAmt').value);
  var note=document.getElementById('payNote').value;
  if(!a||!currentPayInv)return;
  var inv=currentPayInv;
  var cust=state.customers.find(function(c){return c.id===inv.customerId;});
  state.payments.unshift({id:Date.now(),invoiceId:inv.id,customerId:inv.customerId,invoiceNo:inv.invoiceNo,customerName:cust?cust.name:'',amount:a,date:new Date().toISOString().split('T')[0],note:note||'Payment recorded'});
  state.invoices=state.invoices.map(function(i){
    if(i.id!==inv.id)return i;
    var np=Math.min(i.paidAmount+a,i.amount);
    return Object.assign({},i,{paidAmount:np,status:np>=i.amount?'paid':'partial'});
  });
  save();hideModal('payModal');renderTab(currentTab);
}

// ── WHATSAPP ──────────────────────────────────────────────────
function getWaStats(){
  var s={};
  state.waLog.forEach(function(l){
    if(!s[l.customerId])s[l.customerId]={count:0,lastDate:null};
    s[l.customerId].count++;
    if(!s[l.customerId].lastDate||l.date>s[l.customerId].lastDate)s[l.customerId].lastDate=l.date;
  });
  return s;
}
function daysSinceWa(cid){var ws=getWaStats()[cid];if(!ws)return null;return Math.floor((new Date()-new Date(ws.lastDate))/86400000);}
function genWaMsg(cid){
  var cust=state.customers.find(function(c){return c.id===Number(cid);});
  if(!cust)return'';
  var enriched=getEnriched();
  var invs=enriched.filter(function(i){return i.customerId===cust.id&&i.displayStatus!=='paid';});
  if(!invs.length)return'';
  var total=invs.reduce(function(s,i){return s+i.outstanding;},0);
  var hasOD=invs.some(function(i){return i.displayStatus==='overdue';});
  var lines=invs.map(function(i){return'• '+i.invoiceNo+' | Due: '+fdate(i.dueDate)+' | '+fmyr(i.outstanding)+(i.daysOverdue>0?' *('+i.daysOverdue+' days overdue)*':'');}).join('\n');
  var opener=hasOD?'We would like to kindly remind you that the following invoice(s) are now overdue:':'This is a friendly reminder that the following invoice(s) will be due soon:';
  return'Dear *'+cust.name+'*,\n\nWe hope this message finds you well.\n\n'+opener+'\n\n'+lines+'\n\n*Total Outstanding: '+fmyr(total)+'*\n\nKindly arrange payment at your earliest convenience. If payment has already been made, please disregard this message.\n\nThank you for your continued support.\n\nBest regards,\n*'+state.company+'*';
}
function logWa(cid){
  var cust=state.customers.find(function(c){return c.id===Number(cid);});
  state.waLog.unshift({id:Date.now(),customerId:Number(cid),customerName:cust?cust.name:'',date:new Date().toISOString().split('T')[0]});
  save();
}
function copyWa(cid,btn){
  var msg=genWaMsg(cid);
  navigator.clipboard.writeText(msg).then(function(){
    logWa(cid);var orig=btn.textContent;btn.textContent='✅ Copied!';
    setTimeout(function(){btn.textContent=orig;renderWa();},2500);
  });
}
function openWa(cid){
  var cust=state.customers.find(function(c){return c.id===Number(cid);});
  var phone=(cust&&cust.phone||'').replace(/[^0-9]/g,'');
  var intl=phone.startsWith('0')?'60'+phone.slice(1):phone;
  logWa(cid);window.open('https://wa.me/'+intl+'?text='+encodeURIComponent(genWaMsg(cid)),'_blank');
  setTimeout(renderWa,500);
}
function addPhonePrompt(cid){
  var phone=prompt('Enter phone number (e.g. 012-3456789):');
  if(!phone)return;
  state.customers=state.customers.map(function(c){return c.id===cid?Object.assign({},c,{phone:phone}):c;});
  save();renderWa();
}
function renderWa(){
  var el=document.getElementById('remWa');if(!el)return;
  var enriched=getEnriched();
  var searchEl=el.querySelector('#waSearch');
  var search=searchEl?searchEl.value.toLowerCase():'';
  var allCustsOS=state.customers.filter(function(c){return enriched.some(function(i){return i.customerId===c.id&&i.displayStatus!=='paid';});});
  var custsFiltered=allCustsOS.filter(function(c){
    if(!search)return true;
    return c.name.toLowerCase().indexOf(search)!==-1||(c.phone&&c.phone.indexOf(search)!==-1)||(c.contact&&c.contact.toLowerCase().indexOf(search)!==-1);
  });
  var waStats=getWaStats();
  custsFiltered.sort(function(a,b){
    var aOD=enriched.some(function(i){return i.customerId===a.id&&i.displayStatus==='overdue';});
    var bOD=enriched.some(function(i){return i.customerId===b.id&&i.displayStatus==='overdue';});
    return aOD===bOD?0:aOD?-1:1;
  });
  var html='<div class="card mb12 p14" style="background:linear-gradient(90deg,#0a1a0f,#111827)">'
    +'<div class="fw7 fs15 mb4" style="color:#25d366">💬 WhatsApp Reminder Generator</div>'
    +'<div class="fs13 text-mut">Search a customer and send a personalised reminder.</div>'
    +'</div>'
    +'<input id="waSearch" class="inp mb12" placeholder="🔍 Search customer name or phone…" oninput="renderWa()" value="'+esc(search)+'"/>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">'
      +'<div style="background:#111827;border:1px solid #1e2d4a;border-radius:12px;padding:10px;text-align:center"><div class="fw7 fs18 text-blue">'+allCustsOS.length+'</div><div class="fs11 text-mut">Customers</div></div>'
      +'<div style="background:#111827;border:1px solid #991b1b;border-radius:12px;padding:10px;text-align:center"><div class="fw7 fs18 text-red">'+allCustsOS.filter(function(c){return enriched.some(function(i){return i.customerId===c.id&&i.displayStatus==='overdue';});}).length+'</div><div class="fs11 text-mut">Overdue</div></div>'
      +'<div style="background:#111827;border:1px solid #166534;border-radius:12px;padding:10px;text-align:center"><div class="fw7 fs18 text-grn">'+Object.keys(waStats).length+'</div><div class="fs11 text-mut">Reminded</div></div>'
    +'</div>'
    +'<div class="form-group"><label class="lbl">Your Company Name</label><input class="inp" value="'+esc(state.company)+'" oninput="state.company=this.value;save()"/></div>';
  if(custsFiltered.length===0){
    html+=search?'<div class="card p14" style="text-align:center"><div style="font-size:28px;margin-bottom:8px">🔍</div><div class="fw7 text-mut">No customer found for "'+esc(search)+'"</div></div>':'<div class="card p14" style="text-align:center"><div style="font-size:28px;margin-bottom:8px">🎉</div><div class="fw7 text-grn">No outstanding invoices!</div></div>';
  }else{
    custsFiltered.forEach(function(cust){
      var custInvs=enriched.filter(function(i){return i.customerId===cust.id&&i.displayStatus!=='paid';});
      var totalOS=custInvs.reduce(function(s,i){return s+i.outstanding;},0);
      var hasOD=custInvs.some(function(i){return i.displayStatus==='overdue';});
      var ws=waStats[cust.id];var ds=daysSinceWa(cust.id);
      var needsChase=ds===null||(hasOD&&ds>=3)||(!hasOD&&ds>=7);
      var borderCol=needsChase?(hasOD?'#f87171':'#fbbf24'):'#25d366';
      var tags='';
      if(ws){
        tags+='<div class="tag" style="background:#0a1a0f;border:1px solid #166534">💬 <span class="fw7 text-grn">'+ws.count+'x</span> <span class="text-mut">reminded</span></div>';
        tags+='<div class="tag" style="background:#0d0f14;border:1px solid #1e2d4a">🕐 <span class="text-mut">Last:</span> <span class="fw7">'+(ds===0?'Today':ds===1?'Yesterday':ds+'d ago')+'</span></div>';
        if(needsChase)tags+='<div class="tag" style="background:'+(hasOD?'#3a0a0a':'#3a2a0a')+';border:1px solid '+(hasOD?'#991b1b':'#92400e')+'">🔔 <span class="fw7" style="color:'+(hasOD?'#f87171':'#fbbf24')+'">Follow up!</span></div>';
      }else{
        tags='<div class="tag" style="background:#3a2a0a;border:1px solid #92400e">⚠️ <span class="fw7 text-yel">Not reminded yet</span></div>';
      }
      html+='<div class="card mb12" style="border-left:4px solid '+borderCol+'">'
        +'<div class="p14">'
          +'<div class="flex-between mb12"><div class="flex1"><div class="fw7 fs15 text-ellipsis">'+esc(cust.name)+'</div><div class="fs12 text-mut" style="margin-top:2px">'+(cust.contact||'—')+' · '+(cust.phone||'<span style="color:#f87171">No phone</span>')+'</div></div>'
          +'<div style="text-align:right;flex-shrink:0;margin-left:10px"><div class="fw7 fs15" style="color:'+(hasOD?'#f87171':'#fbbf24')+'">'+fmyr(totalOS)+'</div><div class="fs12 text-mut">'+custInvs.length+' inv</div></div></div>'
          +'<div class="flex gap8 mb12" style="flex-wrap:wrap">'+tags+'</div>'
          +'<div class="wa-msg">'+esc(genWaMsg(cust.id))+'</div>'
          +'<div class="btn-row">'
            +'<button class="btn btn-ghost" style="flex:1;font-size:13px" onclick="copyWa('+cust.id+',this)">📋 Copy</button>'
            +(cust.phone?'<button class="btn btn-wa" style="flex:1;font-size:13px" onclick="openWa('+cust.id+')">📱 Send WA</button>':'<button class="btn btn-ghost" style="flex:1;font-size:13px;color:#f87171" onclick="addPhonePrompt('+cust.id+')">📞 Add Phone</button>')
          +'</div>'
        +'</div>'
      +'</div>';
    });
  }
  el.innerHTML=html;
  if(search){var s=el.querySelector('#waSearch');if(s){s.focus();s.setSelectionRange(s.value.length,s.value.length);}}
}

function renderReports(){renderMonthly();}
function renderMonthly(){
  var el=document.getElementById('repMonthly');if(!el)return;
  var months={};
  state.payments.forEach(function(p){var k=mKey(p.date);if(!months[k])months[k]={key:k,label:mLabel(k)};});
  state.invoices.forEach(function(i){var k=mKey(i.invoiceDate);if(!months[k])months[k]={key:k,label:mLabel(k)};});
  var list=Object.values(months).sort(function(a,b){return b.key.localeCompare(a.key);});
  if(!list.length){el.innerHTML='<div class="card p14" style="text-align:center;color:#64748b">No data yet.</div>';return;}
  el.innerHTML='<div class="fw7 fs16 mb4">📅 Monthly Collection Report</div><div class="fs13 text-mut mb16">Tap a month to see payments.</div>'
    +list.map(function(m){
      var mPays=state.payments.filter(function(p){return mKey(p.date)===m.key;});
      var mInvs=state.invoices.filter(function(i){return mKey(i.invoiceDate)===m.key;});
      var invoiced=mInvs.reduce(function(s,i){return s+i.amount;},0);
      var collected=mPays.reduce(function(s,p){return s+p.amount;},0);
      var rate=invoiced>0?Math.round((collected/invoiced)*100):0;
      var barCol=rate>=80?'#4ade80':rate>=50?'#fbbf24':'#f87171';
      var mid='md'+m.key;
      return'<div class="card mb12">'
        +'<div class="p14" style="cursor:pointer" onclick="toggleGrp(\''+mid+'\')">'
          +'<div class="flex-between mb12"><div class="fw7 fs15">'+m.label+'</div><div class="fs12 text-mut" id="arr'+mid+'">▼</div></div>'
          +'<div class="collection-grid">'
            +'<div class="collection-cell"><div class="collection-cell-label">Invoiced</div><div class="collection-cell-value text-mut">'+fshort(invoiced)+'</div></div>'
            +'<div class="collection-cell"><div class="collection-cell-label">Collected</div><div class="collection-cell-value text-grn">'+fshort(collected)+'</div></div>'
            +'<div class="collection-cell"><div class="collection-cell-label">Rate</div><div class="collection-cell-value" style="color:'+barCol+'">'+rate+'%</div></div>'
          +'</div>'
          +'<div class="aging-bar-bg"><div class="aging-bar" style="width:'+Math.min(rate,100)+'%;background:'+barCol+'"></div></div>'
        +'</div>'
        +(mPays.length>0?'<div id="'+mid+'" style="display:none;border-top:1px solid #1e2d4a;padding:12px 16px">'
          +'<div class="fs12 fw7 text-mut mb8" style="text-transform:uppercase">Payments</div>'
          +mPays.map(function(p){return'<div class="flex-between" style="padding:8px 0;border-bottom:1px solid #1e2d4a"><div><div class="fs13 fw7">'+esc(p.customerName)+'</div><div class="fs12 text-mut">'+esc(p.invoiceNo)+' · '+fdate(p.date)+'</div></div><div class="fw7 text-grn fs14">'+fmyr(p.amount)+'</div></div>';}).join('')
          +'</div>':'<div id="'+mid+'" style="display:none"></div>')
      +'</div>';
    }).join('');
}

function exportData(){
  var backup={version:'paytrack-v8',exportDate:new Date().toISOString(),customers:state.customers,invoices:state.invoices,payments:state.payments,waLog:state.waLog,company:state.company,dismissed:state.dismissed};
  var blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var d=new Date();
  a.href=url;
  a.download='zeus-paytrack-backup-'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'.json';
  document.body.appendChild(a);a.click();
  setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
}
function restoreData(inp){
  if(!inp.files[0])return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);
      if(!d.customers||!d.invoices){alert('Invalid backup file!');return;}
      if(!confirm('This will replace ALL your current data with the backup.\n\nCustomers: '+d.customers.length+'\nInvoices: '+d.invoices.length+'\nPayments: '+(d.payments||[]).length+'\n\nContinue?'))return;
      state.customers=d.customers||[];
      state.invoices=d.invoices||[];
      state.payments=d.payments||[];
      state.waLog=d.waLog||[];
      state.company=d.company||state.company;
      state.dismissed=d.dismissed||[];
      save();
      alert('✅ Restore successful!\n'+state.customers.length+' customers, '+state.invoices.length+' invoices loaded.');
      goTab('dashboard');
    }catch(err){alert('Could not read backup file: '+err.message);}
  };
  r.readAsText(inp.files[0]);
}
function pickFile(){var f=document.getElementById('xlsxFile');if(f)f.click();}
function handleDrop(e){e.preventDefault();document.getElementById('dropZone').classList.remove('dragover');var f=e.dataTransfer.files[0];if(f)readFile(f);}
function handleFileInput(inp){if(inp.files[0])readFile(inp.files[0]);}
function loadXlsx(cb){
  if(window.XLSX){cb();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload=cb;s.onerror=function(){alert('Could not load Excel reader. Check internet connection.');};
  document.head.appendChild(s);
}
function readFile(file){
  var ext=file.name.split('.').pop().toLowerCase();
  if(ext==='csv'){var r=new FileReader();r.onload=function(e){parseCSV(e.target.result);};r.readAsText(file);return;}
  var dz=document.getElementById('dropZone');
  if(dz)dz.innerHTML='<div style="font-size:32px;margin-bottom:8px">⏳</div><div class="fw7 fs15">Reading file…</div>';
  loadXlsx(function(){
    var r=new FileReader();
    r.onload=function(e){
      try{
        var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:false});
        var raw=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:null,raw:false});
        parseAutocountRows(raw);
      }catch(err){alert('Could not read Excel: '+err.message);renderImport();}
    };
    r.readAsArrayBuffer(file);
  });
}
function parseMYDate(val){
  if(!val)return'';
  // With raw:false, SheetJS formats date cells using Excel's own format = dd/MM/yyyy
  // So "16/12/2025" = 16 Dec 2025 (DD/MM/YYYY) — Malaysian format ✓
  var s=String(val).trim();
  // DD/MM/YYYY or D/M/YYYY
  var m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m){
    var d=m[1].padStart(2,'0'),mo=m[2].padStart(2,'0'),y=m[3];
    return y+'-'+mo+'-'+d;
  }
  // Already YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  return'';
}
function parseAutocountRows(raw){
  var invoices=[];
  raw.forEach(function(row){
    if(!row||row.length<38)return;
    // Autocount: col0=invDate, col4='IN', col7=invNo, col17=custName, col21=amount, col29=dueDate, col33=ageDays, col37=outstanding
    if(String(row[4]||'').trim()!=='IN')return;
    var invNo=String(row[7]||'').trim();
    var custName=String(row[17]||'').trim();
    if(!invNo||!custName)return;
    var invDate=parseMYDate(row[0]);
    var dueDate=parseMYDate(row[29]);  // read directly from Excel!
    var amount=parseFloat(String(row[21]||'0').replace(/[^0-9.\-]/g,''))||0;
    var outstanding=parseFloat(String(row[37]||row[21]||'0').replace(/[^0-9.\-]/g,''))||0;
    var paid=Math.max(0,amount-outstanding);
    invoices.push({invNo:invNo,custName:custName,amount:amount,paid:paid,invDate:invDate,dueDate:dueDate,status:paid>=amount?'paid':paid>0?'partial':'unpaid'});
  });
  if(!invoices.length){alert('No invoice rows found.\n\nPlease export "Outstanding AR Invoice" from Autocount as .xlsx');renderImport();return;}
  doImport(invoices);
}
function parseCSV(text){
  var lines=text.split('\n').filter(function(l){return l.trim();});
  if(!lines.length){alert('File is empty');return;}
  var headers=lines[0].split(',').map(function(h){return h.trim().replace(/"/g,'').toLowerCase();});
  var ci=-1,ii=-1,ai=-1,oi=-1,di=-1;
  headers.forEach(function(h,i){
    if(['customer name','debtor name','company name','name'].indexOf(h)!==-1)ci=i;
    if(['invoice no','inv no','doc no'].indexOf(h)!==-1)ii=i;
    if(['amount','invoice amount','total'].indexOf(h)!==-1)ai=i;
    if(['outstanding','balance','o/s'].indexOf(h)!==-1)oi=i;
    if(['invoice date','inv date','date'].indexOf(h)!==-1)di=i;
  });
  if(ci===-1||ii===-1){alert('Cannot find required columns.\nFound: '+headers.join(', '));return;}
  var invoices=[];
  for(var i=1;i<lines.length;i++){
    var cols=lines[i].split(',').map(function(c){return c.trim().replace(/"/g,'');});
    var custName=(cols[ci]||'').trim();var invNo=(cols[ii]||'').trim();
    if(!custName||!invNo)continue;
    var amount=ai!==-1?parseFloat((cols[ai]||'0').replace(/[^0-9.\-]/g,''))||0:0;
    var outstanding=oi!==-1?parseFloat((cols[oi]||'0').replace(/[^0-9.\-]/g,'')):amount;
    var paid=Math.max(0,amount-outstanding);
    var invDate=di!==-1?parseMYDate(cols[di]):'';
    invoices.push({invNo:invNo,custName:custName,amount:amount,paid:paid,invDate:invDate,status:paid>=amount?'paid':paid>0?'partial':'unpaid'});
  }
  doImport(invoices);
}
function doImport(invoices){
  var nc=[].concat(state.customers);
  var ni=[].concat(state.invoices);
  var added=0,updated=0,custCreated=0;
  invoices.forEach(function(row){
    var cust=nc.find(function(c){return c.name.toLowerCase()===row.custName.toLowerCase();});
    if(!cust){cust={id:Date.now()+Math.random(),name:row.custName,creditTerm:0,contact:'',phone:'',email:''};nc.push(cust);custCreated++;}
    var ex=ni.find(function(i){return i.invoiceNo===row.invNo;});
    if(ex){Object.assign(ex,{amount:row.amount,paidAmount:row.paid,status:row.status,invoiceDate:row.invDate||ex.invoiceDate,dueDate:row.dueDate||ex.dueDate});updated++;}
    else{ni.push({id:Date.now()+Math.random(),customerId:cust.id,invoiceNo:row.invNo,amount:row.amount,invoiceDate:row.invDate||new Date().toISOString().split('T')[0],dueDate:row.dueDate||'',paidAmount:row.paid,status:row.status,notes:'Imported'});added++;}
  });
  state.customers=nc;state.invoices=ni;save();
  importState.stage='done';importState.added=added;importState.updated=updated;importState.custCreated=custCreated;importState.total=invoices.length;
  renderImport();
}
